   desc:"Đạt được kết quả của hành động. 到(dào) là bổ ngữ kết quả, chỉ hành động đạt được/tiếp cận được đối tượng.",
   examples:[{zh:"你收到了吗？",pin:"Nǐ shōudào le ma?",vn:"Bạn nhận được chưa?"},{zh:"我还没收到你发给我的邮件。",pin:"Wǒ hái méi shōudào nǐ fā gěi wǒ de yóujiàn.",vn:"Tôi vẫn chưa nhận được email bạn gửi."}],
   common_error:"❌ 收到(shōudào) ≠ 收(shōu): 收到(shōudào) = nhận được (thành công); 收(shōu) = nhận (hành động).<br>✅ 看到(kàndào) (nhìn thấy), 听到(tīngdào) (nghe thấy), 想到(xiǎngdào) (nghĩ đến) — 到(dào) luôn chỉ kết quả đạt được.",
   related_patterns:[{title:"V+完",pin:"V+wán",hanviet:"V+HOÀN",desc:"Làm xong",ex:{zh:"作业做完了吗？",pin:"Zuòyè zuò wán le ma?",vn:"Làm xong bài tập chưa?"}},{title:"没+V+到",pin:"méi+V+dào",hanviet:"MỘT+V+ĐÁO",desc:"Không đạt được kết quả",ex:{zh:"我没收到你的邮件。",pin:"Wǒ méi shōudào nǐ de yóujiàn.",vn:"Tôi không nhận được email của bạn."}}]},
  {tag:"b2",title:"以前 / 以后",pattern:"[动词/时间]+以前/以后，……",
   desc:"Trước khi / Sau khi. Đứng sau cụm từ/mệnh đề để chỉ thời điểm tương đối.",
   examples:[{zh:"上课以前，我常在家预习课文。",pin:"Shàngkè yǐqián, wǒ cháng zàijiā yùxí kèwén.",vn:"Trước khi lên lớp, tôi thường chuẩn bị bài ở nhà."},{zh:"吃饭以后，我妈常看电视剧。",pin:"Chī fàn yǐhòu, wǒ mā cháng kàn diànshìjù.",vn:"Sau khi ăn cơm, mẹ tôi thường xem phim truyền hình."}],
   common_error:"❌ Không dùng 在(zài)...以前(yǐqián) trong khẩu ngữ: 吃饭以前(chīfàn yǐqián) (✅) / 在吃饭以前(zài chīfàn yǐqián) (văn viết).<br>✅ Câu chính thường đứng sau: 以前(yǐqián)/以后(yǐhòu)，[câu chính].",
   related_patterns:[{title:"…之前/之后",pin:"…zhīqián/zhīhòu",hanviet:"…CHI TIỀN/CHI HẬU",desc:"Phiên bản văn viết của 以前/以后(yǐqián/yǐhòu)",ex:{zh:"毕业之后，他去了中国。",pin:"Bìyè zhīhòu, tā qù le Zhōngguó.",vn:"Sau khi tốt nghiệp, anh ấy đến Trung Quốc."}},{title:"…前/后",pin:"…qián/hòu",hanviet:"…TIỀN/HẬU",desc:"Viết tắt thân mật",ex:{zh:"三天后见！",pin:"Sān tiān hòu jiàn!",vn:"Hẹn gặp lại sau 3 ngày!"}}]},
  {tag:"b3",title:"里 / 中 / 内",pattern:"名词+里/中/内",
   desc:"Ba cách nói 'trong' — phân biệt theo loại danh từ:\n• 里(lǐ) — không gian vật lý cụ thể\n• 中(zhōng) — trạng thái/quá trình trừu tượng\n• 内(nèi) — phạm vi thời gian hoặc quy định",
   examples:[{zh:"今天是星期日，所以超市里很拥挤。",pin:"Jīntiān shì xīngqīrì, suǒyǐ chāoshì lǐ hěn yōngjǐ.",vn:"(里) Hôm nay chủ nhật, siêu thị rất đông."},{zh:"两个小时内做完这道题。",pin:"Liǎng gè xiǎoshí nèi zuò wán zhè dào tí.",vn:"(内) Làm xong bài này trong vòng 2 tiếng."}],
   common_error:"❌ Nhầm 里(lǐ) vs 中(zhōng) với danh từ trừu tượng: 生活里(shēnghuó lǐ) (thường gặp, khẩu ngữ) vs 生活中(shēnghuó zhōng) (chuẩn).<br>❌ 内(nèi) không dùng với không gian: 房间内(fángjiān nèi) (văn viết) — khẩu ngữ dùng 房间里(fángjiān lǐ).",
   related_patterns:[{title:"在……里/中",pin:"zài……lǐ/zhōng",hanviet:"TẠI……LÝ/TRUNG",desc:"Ở bên trong (không gian/quá trình)",ex:{zh:"书包里有什么？",pin:"Shūbāo lǐ yǒu shénme?",vn:"Trong cặp có gì?"}},{title:"N+上/下/左/右/前/后",pin:"N+shàng/xià/zuǒ/yòu/qián/hòu",hanviet:"N+THƯỢNG/HẠ/TẢ/HỮU/TIỀN/HẬU",desc:"Các hướng vị trí",ex:{zh:"书在桌子上。",pin:"Shū zài zhuōzi shàng.",vn:"Sách ở trên bàn."}}]},
  {tag:"b3",title:"这样才能……",pattern:"这样+才+能+动词",
   desc:"Như vậy mới có thể… Cấu trúc nhấn mạnh điều kiện cần thiết: chỉ khi làm điều X, mới có thể đạt được Y.",
   examples:[{zh:"你应该多练习口语，这样才能跟中国人交流。",pin:"Nǐ yīnggāi duō liànxí kǒuyǔ, zhèyàng cái néng gēn Zhōngguórén jiāoliú.",vn:"Bạn nên luyện khẩu ngữ thêm, như vậy mới có thể giao lưu với người TQ."},{zh:"你要多复习，这样才不会忘记。",pin:"Nǐ yào duō fùxí, zhèyàng cái bù huì wàngjì.",vn:"Bạn phải ôn nhiều, như vậy mới không quên."}],
   common_error:"❌ 才(cái) ở đây là phó từ (mới), KHÔNG phải 才能(cáinéng) (tài năng).<br>✅ 才(cái) nhấn mạnh điều kiện tiên quyết: chỉ khi thỏa điều kiện thì mới được kết quả.<br>✅ Có thể dùng 才能(cái néng): 这样才能成功(Zhèyàng cái néng chénggōng)。",
   related_patterns:[{title:"只有……才……",pin:"zhǐyǒu……cái……",hanviet:"CHỈ HỮU……TÀI……",desc:"Chỉ có… mới… (điều kiện duy nhất)",ex:{zh:"只有努力，才能成功。",pin:"Zhǐyǒu nǔlì, cái néng chénggōng.",vn:"Chỉ có cố gắng mới có thể thành công."}},{title:"才 (mới - muộn hơn dự kiến)",pin:"cái",hanviet:"TÀI",desc:"Nhấn mạnh thời điểm muộn hơn mong đợi",ex:{zh:"他才来。",pin:"Tā cái lái.",vn:"Anh ấy mới đến (muộn hơn dự kiến)."}}]},
  {tag:"b4",title:"一点儿 vs 有点儿",pattern:"ADJ+一点儿 / 有点儿+ADJ",
   desc:"Phân biệt hai cách nói 'một chút' và 'hơi':\n• ADJ + 一点儿(yīdiǎnr) — dùng khi so sánh, yêu cầu, gợi ý (trung tính/tích cực)\n• 有点儿(yǒudiǎnr) + ADJ — mức độ thấp, thường có sắc thái phàn nàn, không hài lòng",
   examples:[{zh:"你可以说慢一点儿吗？",pin:"Nǐ kěyǐ shuō màn yīdiǎnr ma?",vn:"(一点儿) Bạn có thể nói chậm một chút không?"},{zh:"这件衣服有点儿贵，有便宜一点儿的吗？",pin:"Zhè jiàn yīfu yǒudiǎnr guì, yǒu piányí yīdiǎnr de ma?",vn:"(有点儿) Cái áo này hơi đắt, có cái rẻ hơn một chút không?"}],
   common_error:"❌ Nhầm vị trí: 有点儿(yǒudiǎnr)+ADJ (✅) ≠ ADJ+有点儿(yǒudiǎnr) (❌).<br>❌ 一点儿(yīdiǎnr) không đứng trước tính từ: 一点儿贵(yīdiǎnr guì) (❌) → 贵一点儿(guì yīdiǎnr) (✅) hoặc 有点儿贵(yǒudiǎnr guì) (✅ nhưng nghĩa khác).<br>✅ 有点儿(yǒudiǎnr) thường chỉ tính từ tiêu cực/phàn nàn.",
   related_patterns:[{title:"一点都不+ADJ",pin:"yīdiǎn dōu bù+ADJ",hanviet:"NHẤT ĐIỂM ĐÔ BẤT+ADJ",desc:"Không chút nào (phủ định tuyệt đối)",ex:{zh:"一点都不贵。",pin:"Yīdiǎn dōu bù guì.",vn:"Không đắt chút nào."}},{title:"多/少+一点儿",pin:"duō/shǎo+yīdiǎnr",hanviet:"ĐA/THIỂU+NHẤT ĐIỂM NHI",desc:"Nhiều/ít hơn một chút",ex:{zh:"多吃一点儿 / 少说一点儿。",pin:"Duō chī yīdiǎnr / Shǎo shuō yīdiǎnr.",vn:"Ăn thêm một chút / Nói ít đi một chút."}}]},
  {tag:"b4",title:"[S+V+O]+的+N",pattern:"[主语+动词+(宾语)]+的+名词",
   desc:"Mệnh đề quan hệ (định ngữ). Tiếng Trung đặt mệnh đề bổ nghĩa TRƯỚC danh từ, nối bằng 的(de). Khác tiếng Việt/Anh đặt sau.",
   examples:[{zh:"这是他给我买的书。",pin:"Zhè shì tā gěi wǒ mǎi de shū.",vn:"Đây là sách mà anh ấy mua cho tôi."},{zh:"昨天我看的电影不太好看。",pin:"Zuótiān wǒ kàn de diànyǐng bù tài hǎokàn.",vn:"Phim mà hôm qua tôi xem không hay lắm."}],
   common_error:"❌ Không đặt mệnh đề sau danh từ như tiếng Việt: 书他买的(shū tā mǎi de) (❌) → 他买的书(tā mǎi de shū) (✅).<br>✅ Công thức: [ai + làm gì + cho ai] + 的(de) + đồ vật/người.<br>✅ Mệnh đề càng dài, 的(de) càng quan trọng để tách bạch.",
   related_patterns:[{title:"N+的+N",pin:"N+de+N",hanviet:"N+ĐÍch+N",desc:"Quan hệ sở hữu",ex:{zh:"我的书 / 公司的员工",pin:"wǒ de shū / gōngsī de yuángōng",vn:"sách của tôi / nhân viên của công ty"}},{title:"ADJ+的+N",pin:"ADJ+de+N",hanviet:"ADJ+ĐÍch+N",desc:"Tính từ bổ nghĩa cho danh từ",ex:{zh:"安静的地方。",pin:"Ānjìng de dìfang.",vn:"Nơi yên tĩnh."}}]},
  {tag:"b5",title:"不用 + V",pattern:"不用+动词",
   desc:"Không cần làm gì. Phủ định của sự cần thiết, nhẹ nhàng hơn 不必(bùbì), thân thiện hơn 不要(bùyào).",
   examples:[{zh:"不用介绍，我们早就认识了。",pin:"Bú yòng jièshào, wǒmen zǎo jiù rènshi le.",vn:"Không cần giới thiệu, chúng tôi đã quen biết từ lâu rồi."},{zh:"这件事我能自己做，不用你帮助。",pin:"Zhè jiàn shì wǒ néng zìjǐ zuò, bú yòng nǐ bāngzhù.",vn:"Việc này tôi có thể tự làm, không cần bạn giúp."}],
   common_error:"❌ Phân biệt 不用(búyòng) vs 不要(bùyào) vs 不必(bùbì):<br>不用(búyòng)+V = không cần (lời khuyên nhẹ nhàng)<br>不要(bùyào)+V = đừng làm (lệnh cấm)<br>不必(bùbì)+V = không cần (trang trọng hơn 不用(búyòng)).<br>✅ 不用(búyòng) thường dùng để từ chối sự giúp đỡ lịch sự.",
   related_patterns:[{title:"没必要+V",pin:"méi bìyào+V",hanviet:"MỘT TẤT YẾU+V",desc:"Không cần thiết (trực tiếp hơn 不用(búyòng))",ex:{zh:"没必要去那么远。",pin:"Méi bìyào qù nàme yuǎn.",vn:"Không cần thiết đi xa như vậy."}},{title:"需要+V",pin:"xūyào+V",hanviet:"NHU YẾU+V",desc:"Cần làm (đối lập với 不用(búyòng))",ex:{zh:"需要帮助吗？",pin:"Xūyào bāngzhù ma?",vn:"Bạn cần giúp đỡ không?"}}]},
  {tag:"b5",title:"用……+ V",pattern:"用+工具/语言+动词",
   desc:"Dùng… để làm gì. 用(yòng) chỉ phương tiện, công cụ hoặc ngôn ngữ được dùng để thực hiện hành động.",
   examples:[{zh:"越南人用筷子吃饭。",pin:"Yuènán rén yòng kuàizi chī fàn.",vn:"Người Việt Nam dùng đũa ăn cơm."},{zh:"他常用中文跟中国人说话，所以中文才这么好。",pin:"Tā cháng yòng Zhōngwén gēn Zhōngguórén shuōhuà, suǒyǐ Zhōngwén cái zhème hǎo.",vn:"Anh ấy thường dùng tiếng Trung nói chuyện với người TQ, nên mới giỏi như vậy."}],
   common_error:"✅ 用(yòng) đứng trước danh từ công cụ/ngôn ngữ, không cần 来(lái): 用筷子吃(yòng kuàizi chī) (✅) / 用筷子来吃(yòng kuàizi lái chī) (✅ nhưng dài hơn).<br>❌ Không nhầm với 用于(yòng yú) (văn viết, dùng cho mục đích): 用于研究(yòng yú yánjiū) (dùng cho nghiên cứu).",
   related_patterns:[{title:"以……方式+V",pin:"yǐ……fāngshì+V",hanviet:"DĨ……PHƯƠNG THỨC+V",desc:"Theo phương thức… (văn viết hơn 用(yòng))",ex:{zh:"以中文回答。",pin:"Yǐ Zhōngwén huídá.",vn:"Trả lời bằng tiếng Trung."}},{title:"V+着",pin:"V+zhe",hanviet:"V+TRƯỚC",desc:"Trạng thái kèm theo (đang giữ/mang)",ex:{zh:"他拿着筷子。",pin:"Tā ná zhe kuàizi.",vn:"Anh ấy cầm đũa."}}]},
  {tag:"b5",title:"当 + 职位/职业",pattern:"当+名词（职务/职业）",
   desc:"Làm chức vụ/nghề nghiệp. 当(dāng) dùng với danh từ chỉ chức danh. Khác 做(zuò) (làm việc/hành động chung).",
   examples:[{zh:"大学毕业以后，他当一家大公司的翻译。",pin:"Dàxué bìyè yǐhòu, tā dāng yī jiā dà gōngsī de fānyì.",vn:"Sau khi tốt nghiệp đại học, anh ấy làm phiên dịch cho công ty lớn."},{zh:"他当经理以后，越来越多的员工辞职。",pin:"Tā dāng jīnglǐ yǐhòu, yuè lái yuè duō de yuángōng cízhí.",vn:"Sau khi anh ấy làm giám đốc, càng ngày càng nhiều nhân viên từ chức."}],
   common_error:"❌ Phân biệt 当(dāng) vs 做(zuò): 当老师(dāng lǎoshī) (làm giáo viên — chức danh ✅) / 做老师(zuò lǎoshī) (làm giáo viên — nghề nghiệp ✅, cũng đúng).<br>✅ 当(dāng) thường dùng với chức vụ cụ thể: 当翻译(dāng fānyì)/当经理(dāng jīnglǐ)/当代表(dāng dàibiǎo).<br>❌ Không dùng 当(dāng) với động từ: 当学习(dāng xuéxí) (❌).",
   related_patterns:[{title:"做+工作类",pin:"zuò+gōngzuò lèi",hanviet:"TÁC+CÔNG TÁC LOẠI",desc:"Làm (việc chung, không nhấn mạnh chức danh)",ex:{zh:"我喜欢做饭。",pin:"Wǒ xǐhuān zuò fàn.",vn:"Tôi thích nấu ăn."}},{title:"担任+职务",pin:"dānrèn+zhíwù",hanviet:"ĐẢM NHẬM+CHỨC VỤ",desc:"Đảm nhiệm chức vụ (trang trọng hơn 当(dāng))",ex:{zh:"担任经理一职。",pin:"Dānrèn jīnglǐ yī zhí.",vn:"Đảm nhiệm vị trí giám đốc."}}]},
  {tag:"b6",title:"怎么 + V (thắc mắc/ngạc nhiên)",pattern:"S + 怎么 + V + 了/呢？",
   desc:"Dùng 怎么(zěnme) để bày tỏ thắc mắc hoặc ngạc nhiên, không phải hỏi cách thực hiện.\n• 怎么(zěnme) đứng trước động từ, nhấn mạnh sự bất ngờ.\n• Không thể thay bằng 为什么(wèishénme) trong trường hợp này.",
   examples:[{zh:"时间不早了，他们怎么还没回来？",pin:"Shíjiān bù zǎo le, tāmen zěnme hái méi huí lái?",vn:"Thời gian không còn sớm nữa, sao họ vẫn chưa về?"},{zh:"这么简单的题，你怎么不会？",pin:"Zhème jiǎndān de tí, nǐ zěnme bù huì?",vn:"Bài đơn giản vậy, sao bạn không biết làm?"}],
   common_error:"❌ Nhầm 怎么(zěnme) với 怎么样(zěnmeyàng): 他怎么了？(tā zěnme le?) = Sao anh ấy vậy? (thắc mắc) ≠ 他怎么样？(tā zěnmeyàng?) = Anh ấy thế nào? (hỏi tình trạng).\n✅ 怎么(zěnme) + V để thắc mắc. 怎么样(zěnmeyàng) để hỏi đánh giá/tình trạng.",
   related_patterns:[{title:"为什么…",pin:"wèishénme…",hanviet:"VỊ THẬP MA…",desc:"Hỏi lý do khách quan (vì sao, tại sao)",ex:{zh:"你为什么不去？",pin:"Nǐ wèishénme bù qù?",vn:"Tại sao bạn không đi?"}},{title:"怎么样",pin:"zěnmeyàng",hanviet:"CHẨM MA DẠNG",desc:"Hỏi tình trạng/đánh giá (thế nào)",ex:{zh:"这家餐厅怎么样？",pin:"Zhè jiā cāntīng zěnmeyàng?",vn:"Nhà hàng này thế nào?"}}]},
  {tag:"b6",title:"早就 + V + 了",pattern:"S + 早就 + V + 了",
   desc:"Diễn đạt việc đã hoàn thành từ sớm/từ lâu, nhấn mạnh tính trước thời điểm đang nói.\n• 早就(zǎojiù) = sớm đã, đã...từ lâu\n• Cuối câu thường có 了(le) để xác nhận hoàn thành.\n• Thường kèm theo hàm ý 'đương nhiên rồi' hoặc nhẹ nhàng phản bác.",
   examples:[{zh:"去中国的手续我早就办完了。",pin:"Qù Zhōngguó de shǒuxù wǒ zǎo jiù bàn wán le.",vn:"Thủ tục đi Trung Quốc tôi sớm đã làm xong rồi."},{zh:"这个消息我早就知道了。",pin:"Zhège xiāoxi wǒ zǎo jiù zhīdào le.",vn:"Tin này tôi đã biết từ lâu rồi."}],
   common_error:"❌ Bỏ 了(le) cuối câu: 我早就知道(wǒ zǎojiù zhīdào) → ✅ 我早就知道了(wǒ zǎojiù zhīdào le).\n❌ Nhầm vị trí: 早就我完成了(zǎojiù wǒ wánchéng le) → ✅ 我早就完成了(wǒ zǎojiù wánchéng le) — 早就(zǎojiù) phải đứng sau chủ ngữ.",
   related_patterns:[{title:"已经…了",pin:"yǐjīng…le",hanviet:"DĨ KINH…LE",desc:"Đã...rồi (đơn giản, không nhấn mạnh thời điểm sớm)",ex:{zh:"我已经吃饭了。",pin:"Wǒ yǐjīng chī fàn le.",vn:"Tôi đã ăn cơm rồi."}},{title:"刚…",pin:"gāng…",hanviet:"CƯƠNG…",desc:"Vừa mới... (hoàn thành rất gần đây)",ex:{zh:"他刚回来。",pin:"Tā gāng huí lái.",vn:"Anh ấy vừa về."}}]},
  {tag:"b6",title:"在……下 (trong điều kiện)",pattern:"在 + [điều kiện/hoàn cảnh] + 下，S + V",
   desc:"Diễn đạt hành động xảy ra trong điều kiện, hoàn cảnh hoặc dưới tác động của ai/cái gì.\n• 在(zài)...下(xià) kẹp lấy danh từ chỉ điều kiện/hoàn cảnh.\n• Thường dùng: 在帮助下(zài bāngzhù xià)、在压力下(zài yālì xià)、在父母的支持下(zài fùmǔ de zhīchí xià).",
   examples:[{zh:"在他们的帮助下，我的收入不少。",pin:"Zài tāmen de bāngzhù xià, wǒ de shōurù bù shǎo.",vn:"Dưới sự giúp đỡ của họ, thu nhập của tôi không ít."},{zh:"在老师的鼓励下，他越来越努力。",pin:"Zài lǎoshī de gǔlì xià, tā yuè lái yuè nǔlì.",vn:"Dưới sự động viên của thầy giáo, anh ấy càng ngày càng cố gắng."}],
   common_error:"❌ Thiếu 的(de) nối: 在他们帮助下(zài tāmen bāngzhù xià) → ✅ 在他们的帮助下(zài tāmen de bāngzhù xià).\n❌ Nhầm với 在...上(zài...shàng): 在帮助上(zài bāngzhù shàng) (❌, vô nghĩa) — 下(xià) chỉ điều kiện, 上(shàng) chỉ khía cạnh.",
   related_patterns:[{title:"在…中",pin:"zài…zhōng",hanviet:"TẠI…TRUNG",desc:"Trong quá trình... (đang diễn ra)",ex:{zh:"在学习中，我遇到了很多问题。",pin:"Zài xuéxí zhōng, wǒ yùdào le hěn duō wèntí.",vn:"Trong quá trình học, tôi gặp rất nhiều vấn đề."}}]},
  {tag:"b6",title:"又…又… (vừa...vừa...)",pattern:"S + 又 + ADJ/V + 又 + ADJ/V",
   desc:"Diễn đạt hai tính chất hoặc trạng thái cùng tồn tại đồng thời.\n• 又(yòu)...又(yòu)... dùng với tính từ: vừa...vừa... (song song)\n• Cả hai vế thường cùng tích cực hoặc cùng tiêu cực.\n• Khác 一边...一边...(yìbiān...yìbiān...): 又...又... = tính chất; 一边...一边... = hành động.",
   examples:[{zh:"这件羽绒服又便宜又好看。",pin:"Zhè jiàn yǔróng fú yòu pián yi yòu hǎo kàn.",vn:"Cái áo phao này vừa rẻ vừa đẹp."},{zh:"这家餐厅的菜又贵又不好吃。",pin:"Zhè jiā cāntīng de cài yòu guì yòu bù hǎo chī.",vn:"Đồ ăn của nhà hàng này vừa đắt vừa không ngon."}],
   common_error:"❌ Dùng với động từ hành động: 他又吃饭又看电视(tā yòu chīfàn yòu kàn diànshì) — không tự nhiên → ✅ 他一边吃饭一边看电视(tā yìbiān chīfàn yìbiān kàn diànshì).\n✅ Quy tắc: 又...又... = tính chất/trạng thái song song; 一边...一边... = hành động đồng thời.",
   related_patterns:[{title:"一边…一边…",pin:"yìbiān…yìbiān…",hanviet:"NHẤT BIÊN…NHẤT BIÊN…",desc:"Vừa...vừa... (hai hành động cùng lúc)",ex:{zh:"她一边吃饭，一边看电影。",pin:"Tā yìbiān chī fàn, yìbiān kàn diànyǐng.",vn:"Cô ấy vừa ăn cơm vừa xem phim."}},{title:"既…又…",pin:"jì…yòu…",hanviet:"KÝ…HỮU…",desc:"Vừa...lại còn... (nhấn mạnh hơn, văn viết)",ex:{zh:"他既聪明又努力。",pin:"Tā jì cōngmíng yòu nǔlì.",vn:"Anh ấy vừa thông minh lại còn chăm chỉ."}}]},
  {tag:"b6",title:"一边…一边…(hai hành động cùng lúc)",pattern:"S + 一边 + V₁ + (，) + 一边 + V₂",
   desc:"Diễn đạt hai hành động xảy ra đồng thời cùng một chủ thể.\n• 一边(yìbiān) đứng trước mỗi động từ.\n• Chủ ngữ phải là một người thực hiện cả hai việc.\n• Khác 又...又...(yòu...yòu...): 一边...一边... = hành động; 又...又... = tính chất.",
   examples:[{zh:"她一边吃饭，一边看电影。",pin:"Tā yìbiān chī fàn, yìbiān kàn diànyǐng.",vn:"Cô ấy vừa ăn cơm vừa xem phim."},{zh:"他在房间里一边看书一边听音乐。",pin:"Tā zài fángjiān lǐ yìbiān kàn shū yìbiān tīng yīnyuè.",vn:"Anh ấy vừa đọc sách vừa nghe nhạc ở trong phòng."}],
   common_error:"❌ Hai chủ ngữ khác nhau: 我一边做饭，一边她看电视(wǒ yìbiān zuòfàn, yìbiān tā kàn diànshì) (❌) — phải cùng chủ ngữ.\n❌ Dùng cho tính chất: 这里一边安静一边热闹(zhèlǐ yìbiān ānjìng yìbiān rènào) (❌) → ✅ 这里又安静又热闹(zhèlǐ yòu ānjìng yòu rènào).",
   related_patterns:[{title:"又…又…",pin:"yòu…yòu…",hanviet:"HỮU…HỮU…",desc:"Vừa...vừa... (hai tính chất song song)",ex:{zh:"这件衣服又便宜又好看。",pin:"Zhè jiàn yīfu yòu pián yi yòu hǎo kàn.",vn:"Cái áo này vừa rẻ vừa đẹp."}},{title:"同时",pin:"tóngshí",hanviet:"ĐỒNG THỜI",desc:"Đồng thời (văn viết, nhấn mạnh hai việc xảy ra cùng lúc)",ex:{zh:"他同时学两门语言。",pin:"Tā tóngshí xué liǎng mén yǔyán.",vn:"Anh ấy đồng thời học hai ngôn ngữ."}}]},  {tag:"b7",title:"能 vs 可以 (khả năng vs cho phép)",pattern:"能+V (khả năng cá nhân)  /  可以+V (xin phép/thương lượng)",
   desc:"Hai trợ động từ đều mang nghĩa 'có thể' nhưng dùng khác nhau.\n• 能(néng): khả năng cá nhân, năng lực thực tế. Có thể kết hợp phó từ mức độ để nhấn mạnh khả năng.\n• 可以(kěyǐ): xin phép, cho phép, thương lượng. Có thể đứng một mình để trả lời.",
   examples:[{zh:"我能用中文说话。",pin:"Wǒ néng yòng Zhōngwén shuōhuà.",vn:"Tôi có thể dùng tiếng Trung nói chuyện. (khả năng)"},{zh:"我可以试这件衣服吗？",pin:"Wǒ kěyǐ shì zhè jiàn yīfu ma?",vn:"Tôi có thể thử bộ quần áo này không? (xin phép)"}],
   common_error:"❌ Nhầm khi xin phép: 我能试这件衣服吗？(wǒ néng shì zhè jiàn yīfu ma?) → ✅ 可以(kěyǐ) tự nhiên hơn khi xin phép.\n❌ 可以(kěyǐ) không dùng được với phó từ mức độ: 我很可以游泳(wǒ hěn kěyǐ yóuyǒng) (❌) → ✅ 我很能游泳(wǒ hěn néng yóuyǒng) (✅).",
   related_patterns:[{title:"会+V",pin:"huì+V",hanviet:"HỘI+V",desc:"Có kỹ năng (học qua = biết làm)",ex:{zh:"我会说中文。",pin:"Wǒ huì shuō Zhōngwén.",vn:"Tôi biết nói tiếng Trung (đã học)."}},{title:"应该+V",pin:"yīnggāi+V",hanviet:"ỨNG CÁI+V",desc:"Nên, đáng phải làm",ex:{zh:"你应该多锻炼身体。",pin:"Nǐ yīnggāi duō duànliàn shēntǐ.",vn:"Bạn nên tập thể dục nhiều hơn."}}]},
  {tag:"b7",title:"动词重叠 V/VV + ABAB",pattern:"V → VV (AA) / ABAB (lặp lại động từ)",
   desc:"Lặp lại động词 để diễn đạt hành động nhẹ nhàng, thử xem, hoặc nhờ vả lịch sự.\n• Dạng AA: 看看(kànkan)、试试(shìshi)、想想(xiǎngxiǎng)\n• Dạng ABAB: 休息休息(xiūxi xiūxi)、参加参加(cānjia cānjia)\n• ⚠️ Khi V重叠 KHÔNG kết hợp với: 一下(yīxià)、一点(yīdiǎn)、一会(yīhuì).",
   examples:[{zh:"这件衣服很漂亮，你试试吧。",pin:"Zhè jiàn yīfu hěn piàoliang, nǐ shìshi ba.",vn:"Bộ quần áo này đẹp lắm, bạn thử thử xem."},{zh:"周末我们去休息休息吧。",pin:"Zhōumò wǒmen qù xiūxi xiūxi ba.",vn:"Cuối tuần chúng ta đi nghỉ ngơi một chút nhé."}],
   common_error:"❌ Kết hợp với 一下(yīxià): 看看一下(kànkan yīxià) (❌) → ✅ 看一下(kàn yīxià) hoặc ✅ 看看(kànkan).\n❌ Dùng cho tính từ: 高高(gāogāo) — không dùng để nói 'cao thêm một chút' theo cấu trúc này.\n✅ Chỉ dùng với động từ hành động cụ thể.",
   related_patterns:[{title:"V + 一下",pin:"V+yīxià",hanviet:"V+NHẤT HẠ",desc:"Làm một chút, làm một cái (đơn giản hóa yêu cầu)",ex:{zh:"请你等一下。",pin:"Qǐng nǐ děng yīxià.",vn:"Xin bạn đợi một chút."}},{title:"V + 一会儿",pin:"V+yīhuìr",hanviet:"V+NHẤT HỒI NHI",desc:"Làm trong một lúc, một lát",ex:{zh:"我想休息一会儿。",pin:"Wǒ xiǎng xiūxi yīhuìr.",vn:"Tôi muốn nghỉ ngơi một lúc."}}]},
  {tag:"b9",title:"一定 (yídìng) — nhất định",pattern:"S + 一定 + VP  /  一定 + 不/没 + VP",
   desc:"一定(yídìng) diễn đạt sự chắc chắn hoặc quyết tâm:\n\n【A】 Khẳng định chắc chắn: S + 一定 + VP\n  → Nhất định, chắc chắn sẽ...\n\n【B】 Phủ định mạnh: S + 一定 + 不/没 + VP\n  → Nhất định không...\n\n【C】 Dùng với 要(yào) = nhất định phải:\n  S + 一定 + 要 + VP → Nhất định phải làm...\n\n⚠️ Phân biệt:\n• 一定(yídìng) = nhất định (dùng cả khẳng định & phủ định)\n• 千万(qiānwàn) = tuyệt đối đừng (CHỈ dùng phủ định: 千万不要/别)",
   examples:[{zh:"你一定要认真学习，才能进步。",pin:"Nǐ yídìng yào rènzhēn xuéxí, cái néng jìnbù.",vn:"Bạn nhất định phải học tập nghiêm túc, mới có thể tiến bộ."},{zh:"他一定在图书馆，因为今天有考试。",pin:"Tā yídìng zài túshūguǎn, yīnwèi jīntiān yǒu kǎoshì.",vn:"Anh ấy nhất định đang ở thư viện, vì hôm nay có thi."},{zh:"你千万不要告诉他！",pin:"Nǐ qiānwàn bú yào gàosu tā!",vn:"Bạn tuyệt đối đừng nói với anh ấy!"}],
   common_error:"❌ Nhầm 一定(yídìng) với 千万(qiānwàn):\n  千万(qiānwàn) CHỈ dùng trong câu phủ định (千万不要/千万别).\n  ❌ 千万你要努力学习 → ✅ 你一定要努力学习\n  ✅ 千万不要迟到 / ✅ 你一定不要迟到 (cả hai đúng trong câu phủ định)\n\n❌ Không dùng 一定 thay cho 肯定(kěndìng) khi đoán sự thật:\n  Khi đoán việc gì đã xảy ra: 他肯定回家了(tā kěndìng huí jiā le) = Chắc chắn anh ấy về nhà rồi.\n  一定 thiên về quyết tâm/kế hoạch, 肯定 thiên về đoán/khẳng định.",
   related_patterns:[{title:"千万不要/别",pin:"qiānwàn bú yào/bié",hanviet:"THIÊN VẠN BẤT YÊU/BIỆT",desc:"Tuyệt đối đừng... (phủ định mạnh, nhấn mạnh cảnh báo)",ex:{zh:"开车的时候千万别喝酒。",pin:"Kāi chē de shíhou qiānwàn bié hējiǔ.",vn:"Khi lái xe tuyệt đối đừng uống rượu."}},{title:"肯定 + VP",pin:"kěndìng+VP",hanviet:"KHẲNG ĐỊNH+VP",desc:"Chắc chắn... (đoán, nhận định)",ex:{zh:"他肯定知道这件事。",pin:"Tā kěndìng zhīdào zhè jiàn shì.",vn:"Chắc chắn anh ấy biết việc này."}}]},
  {tag:"b9",title:"每 (měi) — mỗi",pattern:"每 + 量词 + N + 都 + VP",
   desc:"每(měi) dùng để chỉ từng cá thể trong một tập hợp, nghĩa là 'mỗi'.\n\n【A】 每 + 量词 + N: Mỗi + [lượng từ] + danh từ\n  → 每个人(měi gè rén) = mỗi người\n  → 每次(měi cì) = mỗi lần\n  → 每天(měi tiān) = mỗi ngày\n\n【B】 Thường đi kèm 都(dōu) = đều:\n  每 + ... + 都 + VP → Mỗi... đều...\n\n⚠️ Ghi nhớ: Sau 每 PHẢI có lượng từ (或时间词) trước danh từ chính.\n  ❌ 每人 (trừ văn viết) → ✅ 每个人",
   examples:[{zh:"她每天晚上都练习中文。",pin:"Tā měi tiān wǎnshang dōu liànxí Zhōngwén.",vn:"Cô ấy mỗi tối đều luyện tập tiếng Trung."},{zh:"每个学生都有不同的学习方法。",pin:"Měi gè xuésheng dōu yǒu bùtóng de xuéxí fāngfǎ.",vn:"Mỗi học sinh đều có phương pháp học tập khác nhau."},{zh:"他每次来越南都带很多礼物。",pin:"Tā měi cì lái Yuènán dōu dài hěn duō lǐwù.",vn:"Mỗi lần anh ấy đến Việt Nam đều mang rất nhiều quà."}],
   common_error:"❌ Bỏ lượng từ giữa 每 và N: 每人(měi rén) → ✅ 每个人(měi gè rén) [khẩu ngữ].\n❌ Bỏ 都: 每天我锻炼(měi tiān wǒ duànliàn) → ✅ 我每天都锻炼(wǒ měi tiān dōu duànliàn) [tự nhiên hơn khi có 都].\n✅ Có thể không dùng 都 nhưng câu nghe tự nhiên hơn khi có 都.",
   related_patterns:[{title:"每…都…",pin:"měi…dōu…",hanviet:"MỖI…ĐỀU…",desc:"Mỗi... đều... (cấu trúc hoàn chỉnh)",ex:{zh:"每道菜都很好吃。",pin:"Měi dào cài dōu hěn hǎo chī.",vn:"Mỗi món ăn đều rất ngon."}},{title:"任何…都…",pin:"rènhé…dōu…",hanviet:"NHẬM HÀ…ĐỀU…",desc:"Bất kỳ... đều... (nhấn mạnh hơn 每)",ex:{zh:"任何人都可以参加。",pin:"Rènhé rén dōu kěyǐ cānjiā.",vn:"Bất kỳ ai cũng đều có thể tham gia."}}]},
  {tag:"b9",title:"S + V动 + 在 + địa điểm (在 sau động từ)",pattern:"S + V动作 + 在 + 地点 + 方位词",
   desc:"Cấu trúc 在(zài) đứng SAU động từ hành động, chỉ kết quả vị trí sau hành động.\n\n【Phân biệt 2 cách dùng của 在】:\n• 在 + địa điểm + V: S đang ở đâu → làm gì (在 chỉ nơi đang ở)\n  → 我在家吃饭(wǒ zài jiā chī fàn) = Tôi ăn cơm ở nhà\n• S + V动 + 在 + địa điểm: Hành động khiến S/O ở tại địa điểm đó (kết quả)\n  → 我坐在椅子上(wǒ zuò zài yǐzi shang) = Tôi ngồi ở trên ghế\n  → 他躺在床上(tā tǎng zài chuáng shang) = Anh ấy nằm trên giường\n\n⚠️ Các động từ hay đi với V + 在:\n  坐在(zuò zài) — ngồi ở\n  躺在(tǎng zài) — nằm ở\n  站在(zhàn zài) — đứng ở\n  住在(zhù zài) — sống ở\n  放在(fàng zài) — đặt ở",
   examples:[{zh:"他躺在床上看手机。",pin:"Tā tǎng zài chuáng shang kàn shǒujī.",vn:"Anh ấy nằm trên giường xem điện thoại."},{zh:"我坐在椅子上读书。",pin:"Wǒ zuò zài yǐzi shang dú shū.",vn:"Tôi ngồi trên ghế đọc sách."},{zh:"请把包放在桌子上。",pin:"Qǐng bǎ bāo fàng zài zhuōzi shang.",vn:"Xin hãy để túi lên trên bàn."}],
   common_error:"❌ Nhầm thứ tự 在:\n  我在椅子坐上(wǒ zài yǐzi zuò shang) (❌) → ✅ 我坐在椅子上(wǒ zuò zài yǐzi shang)\n\n❌ Thiếu phương vị từ 上/里/下 sau địa điểm:\n  他躺在床(tā tǎng zài chuáng) (❌) → ✅ 他躺在床上(tā tǎng zài chuáng shang)\n\n✅ Phân biệt:\n  我在家学习 = Tôi học ở nhà (在 = nơi hành động diễn ra)\n  我住在河内 = Tôi sống ở Hà Nội (住在 = kết quả nơi cư trú)",
   related_patterns:[{title:"在 + 地点 + V",pin:"zài+dìdiǎn+V",hanviet:"TẠI+ĐỊA ĐIỂM+V",desc:"Đang ở... làm... (在 chỉ nơi diễn ra hành động)",ex:{zh:"他在教室里复习。",pin:"Tā zài jiàoshì lǐ fùxí.",vn:"Anh ấy đang ôn bài trong phòng học."}},{title:"住在 + 地点",pin:"zhù zài+dìdiǎn",hanviet:"TRÚ TẠI+ĐỊA ĐIỂM",desc:"Sống ở, cư trú tại",ex:{zh:"我住在胡志明市。",pin:"Wǒ zhù zài Húzhìmíng Shì.",vn:"Tôi sống ở Thành phố Hồ Chí Minh."}}]},
  {tag:"b9",title:"以后 (yǐhòu) — sau này / sau khi",pattern:"时间N/V短语 + 以后  /  以后 + clause (tương lai)",
   desc:"以后(yǐhòu) có 2 cách dùng:\n\n【A】 Sau khi [sự việc]: V短语/时间N + 以后 + clause\n  → Diễn đạt sau khi điều gì xảy ra thì...\n  → 下课以后(xià kè yǐhòu) = sau khi tan học\n  → 五年以后(wǔ nián yǐhòu) = năm năm sau\n\n【B】 Đứng đầu câu = 'sau này, tương lai':\n  以后 + clause\n  → 以后我想学中文 = Sau này tôi muốn học tiếng Trung\n\n⚠️ Phân biệt 以后 / 以前 / 之后:\n• 以后(yǐhòu) = sau này, sau khi [dùng rộng]\n• 以前(yǐqián) = trước đây, trước khi [đối lập]\n• 之后(zhīhòu) = sau đó [văn viết, chỉ việc đã xảy ra]",
   examples:[{zh:"毕业以后，我打算去国外留学。",pin:"Bìyè yǐhòu, wǒ dǎsuàn qù guówài liúxué.",vn:"Sau khi tốt nghiệp, tôi dự định đi du học nước ngoài."},{zh:"以后你有问题可以随时来问我。",pin:"Yǐhòu nǐ yǒu wèntí kěyǐ suíshí lái wèn wǒ.",vn:"Sau này bạn có vấn đề gì có thể đến hỏi tôi bất cứ lúc nào."},{zh:"吃完饭以后，我们去散步吧。",pin:"Chī wán fàn yǐhòu, wǒmen qù sànbù ba.",vn:"Sau khi ăn xong, chúng ta đi dạo nhé."}],
   common_error:"❌ Nhầm 以后(yǐhòu) với 以前(yǐqián):\n  我毕业以前想去留学(wǒ bìyè yǐqián xiǎng qù liúxué) = Trước khi tốt nghiệp tôi muốn đi du học (thời điểm khác!)\n  ↔ 我毕业以后想去留学 = Sau khi tốt nghiệp tôi muốn đi du học\n\n❌ Không dùng 以后 cho quá khứ đã hoàn thành:\n  他回国以后，我就没见过他了 ✅ (vẫn đúng — xảy ra trước thời điểm nói)\n  Nhưng 之后(zhīhòu) tự nhiên hơn: 他回国之后，我就没见过他了 ✅",
   related_patterns:[{title:"以前 + VP",pin:"yǐqián+VP",hanviet:"DĨ TIỀN+VP",desc:"Trước đây, trước khi... (đối lập với 以后)",ex:{zh:"以前我不喜欢学中文，现在喜欢了。",pin:"Yǐqián wǒ bù xǐhuan xué Zhōngwén, xiànzài xǐhuan le.",vn:"Trước đây tôi không thích học tiếng Trung, bây giờ thích rồi."}},{title:"之后",pin:"zhīhòu",hanviet:"CHI HẬU",desc:"Sau đó (văn viết, chỉ sự kiện đã diễn ra)",ex:{zh:"他走了之后，大家都很安静。",pin:"Tā zǒu le zhīhòu, dàjiā dōu hěn ānjìng.",vn:"Sau khi anh ấy đi, mọi người đều im lặng."}}]},
  {tag:"b9",title:"差 (chā) — giờ kém",pattern:"差 + X分 + Y点  =  Y giờ kém X phút",
   desc:"差(chā) trong thời gian có nghĩa là 'kém, thiếu' → dùng để diễn đạt giờ chưa đến tròn.\n\n【Cấu trúc】: 差(chā) + số_phút + 分(fēn) + số_giờ + 点(diǎn)\n  → 差十分八点 = 8 giờ kém 10 = 7 giờ 50\n  → 差五分九点 = 9 giờ kém 5 = 8 giờ 55\n\n【So sánh 2 cách nói】:\n  差十分八点 = 七点五十分(qī diǎn wǔshí fēn) [đều đúng]\n  Cách dùng 差 mang tính khẩu ngữ, tự nhiên hơn.\n\n⚠️ Lưu ý:\n• 差(chā) = kém, thiếu [thời gian]\n• 差(chāi) = công tác [出差]\n• 差(chà) = kém chất lượng [水平差]",
   examples:[{zh:"现在差十分九点，快点走！",pin:"Xiànzài chā shí fēn jiǔ diǎn, kuài diǎn zǒu!",vn:"Bây giờ là 9 giờ kém 10, đi nhanh lên!"},{zh:"上课时间是八点，现在差五分了。",pin:"Shàng kè shíjiān shì bā diǎn, xiànzài chā wǔ fēn le.",vn:"Giờ vào lớp là 8h, bây giờ còn kém 5 phút rồi."},{zh:"差一刻三点他才到。",pin:"Chā yī kè sān diǎn tā cái dào.",vn:"3 giờ kém một khắc anh ấy mới đến."}],
   common_error:"❌ Nhầm thứ tự: 八点差十分(bā diǎn chā shí fēn) (❌) → ✅ 差十分八点(chā shí fēn bā diǎn)\n\n⚠️ Phân biệt đọc của 差:\n  差chā = kém, thiếu (thời gian / chênh lệch)\n  差chài = 出差(chūchāi) công tác\n  差chà = năng lực kém (水平很差 shuǐpíng hěn chà)",
   related_patterns:[{title:"X点Y分",pin:"Xdiǎn Yfēn",hanviet:"X ĐIỂM Y PHÂN",desc:"X giờ Y phút (cách nói đủ, không cần 差)",ex:{zh:"现在是七点五十分。",pin:"Xiànzài shì qī diǎn wǔshí fēn.",vn:"Bây giờ là 7 giờ 50 phút."}},{title:"还有X分",pin:"háiyǒu Xfēn",hanviet:"HOÀN HỮU X PHÂN",desc:"Còn X phút nữa (đến giờ nào đó)",ex:{zh:"还有十分钟上课。",pin:"Háiyǒu shí fēnzhōng shàng kè.",vn:"Còn 10 phút nữa thì vào lớp."}}]},

  {tag:"b10",title:"一…就… (yī…jiù…) — vừa…thì…",pattern:"S + 一 + V1 + 就 + V2",
   desc:"一...就... diễn đạt hai hành động nối tiếp nhau ngay lập tức.\n\n【Cấu trúc】: S + 一 + V1 + 就 + V2\n→ Vừa V1 thì/liền V2 (V2 xảy ra ngay sau V1)\n\n【Ví dụ thực tế】:\n• 一回家就洗澡 = vừa về nhà liền tắm\n• 一下课就去吃饭 = vừa tan học liền đi ăn\n• 一看到她就笑了 = vừa nhìn thấy cô ấy liền cười\n\n⚠️ Phân biệt với 先...然后...:\n• 一...就... = ngay lập tức, không có độ trễ\n• 先...然后... = tuần tự, có thể có thời gian giữa hai việc",
   examples:[{zh:"他一回家就打开电脑玩游戏。",pin:"Tā yī huí jiā jiù dǎkāi diànnǎo wán yóuxì.",vn:"Anh ấy vừa về nhà liền mở máy tính chơi game."},{zh:"我一看到那道题就知道怎么做了。",pin:"Wǒ yī kàndào nà dào tí jiù zhīdào zěnme zuò le.",vn:"Tôi vừa nhìn thấy đề bài kia liền biết làm thế nào rồi."},{zh:"她一听到这个消息就哭了。",pin:"Tā yī tīngdào zhège xiāoxi jiù kū le.",vn:"Cô ấy vừa nghe tin này liền khóc."}],
   common_error:"❌ Bỏ 一: 他回家就洗澡 → ✅ (vẫn đúng nhưng 一...就... nhấn mạnh hơn về tính tức thì)\n\n❌ Nhầm với 只要...就... (miễn là...thì...):\n  只要努力就能成功 = Chỉ cần cố gắng thì có thể thành công (điều kiện)\n  ≠ 一努力就成功 (không tự nhiên — 一...就... dùng cho hành động cụ thể, không phải quy luật chung)\n\n✅ Phân biệt:\n  一...就... = ngay khi... thì... (tức thì)\n  只要...就... = miễn là... thì... (điều kiện)",
   related_patterns:[{title:"只要…就…",pin:"zhǐyào…jiù…",hanviet:"CHỈ YÊU…TẮC…",desc:"Miễn là... thì... (điều kiện)",ex:{zh:"只要努力，就能成功。",pin:"Zhǐyào nǔlì, jiù néng chénggōng.",vn:"Miễn là cố gắng, thì có thể thành công."}},{title:"先…再/然后…",pin:"xiān…zài/ránhòu…",hanviet:"TIÊN…TÁI/NHIÊN HẬU…",desc:"Trước...rồi... (tuần tự, có khoảng cách)",ex:{zh:"先洗手，再吃饭。",pin:"Xiān xǐ shǒu, zài chī fàn.",vn:"Rửa tay trước rồi ăn cơm."}}]},
  {tag:"b10",title:"首先…然后…最后 — trình tự sự việc",pattern:"首先 + A，然后 + B，最后 + C",
   desc:"Ba từ nối chỉ trình tự thực hiện các bước:\n• 首先(shǒuxiān) = đầu tiên / trước hết\n• 然后(ránhòu) = sau đó\n• 最后(zuìhòu) = cuối cùng\n\n⚠️ Ghi nhớ:\n• 首先 thường dùng ở đầu câu, không đứng sau chủ ngữ.\n• 然后 có thể đứng đầu câu hoặc sau chủ ngữ.\n• 最后 có thể đứng đầu câu hoặc sau chủ ngữ.\n• Không nhất thiết phải dùng đủ cả 3, có thể dùng 先...然后... hoặc chỉ 最后...",
   examples:[{zh:"首先准备食材，然后开始做菜，最后上桌。",pin:"Shǒuxiān zhǔnbèi shícái, ránhòu kāishǐ zuò cài, zuìhòu shàng zhuō.",vn:"Đầu tiên chuẩn bị nguyên liệu, sau đó bắt đầu nấu, cuối cùng dọn lên bàn."},{zh:"学中文首先要学拼音，然后学汉字。",pin:"Xué Zhōngwén shǒuxiān yào xué pīnyīn, ránhòu xué hànzì.",vn:"Học tiếng Trung trước hết phải học phiên âm, sau đó học chữ Hán."}],
   common_error:"❌ Đặt 首先 sau chủ ngữ là không tự nhiên:\n  我首先去上海... → ✅ 首先我们去上海...\n\n❌ Dùng 首先 mà không có vế tiếp theo:\n  首先... (câu kết thúc ở đây) → cần có 然后 hoặc ý tiếp theo.",
   related_patterns:[{title:"先…再…",pin:"xiān…zài…",hanviet:"TIÊN…TÁI…",desc:"Trước... rồi...(2 bước, không trang trọng bằng 首先)",ex:{zh:"先做作业，再玩游戏。",pin:"Xiān zuò zuòyè, zài wán yóuxì.",vn:"Làm bài tập trước rồi mới chơi game."}},{title:"接着",pin:"jiēzhe",hanviet:"TIẾP GIẢ",desc:"Tiếp theo, kế đó (nối tiếp hành động)",ex:{zh:"首先介绍自己，接着说明来意。",pin:"Shǒuxiān jièshào zìjǐ, jiēzhe shuōmíng láiyì.",vn:"Đầu tiên giới thiệu bản thân, tiếp theo giải thích mục đích đến."}}]},
  {tag:"b10",title:"…前 (qián) — trước khi",pattern:"时间N/V短语 + 前  =  trước [thời điểm / hành động đó]",
   desc:"前(qián) sau danh từ/cụm động từ = trước khi / trước đó.\n\n【Cấu trúc】: [thời gian/V短语] + 前 + [hành động]\n• 睡觉前 = trước khi ngủ\n• 出发前 = trước khi xuất phát\n• 十年前 = 10 năm trước\n• 饭前 = trước bữa ăn\n\n⚠️ Phân biệt 前(qián) / 以前(yǐqián):\n• [时间N] + 前: chỉ thời điểm cụ thể (10 năm trước, trước bữa ăn)\n• 以前: chỉ quá khứ chung (trước đây, ngày xưa)\n• 以前 đứng đầu câu; [N]+前 thường đứng trước vế chính",
   examples:[{zh:"睡觉前喝一杯牛奶有助于睡眠。",pin:"Shuìjiào qián hē yī bēi niúnǎi yǒuzhùyú shuìmián.",vn:"Uống một ly sữa trước khi ngủ giúp ích cho giấc ngủ."},{zh:"出发前请检查一下护照和机票。",pin:"Chūfā qián qǐng jiǎnchá yīxià hùzhào hé jīpiào.",vn:"Trước khi xuất phát xin kiểm tra hộ chiếu và vé máy bay."},{zh:"吃饭前要洗手。",pin:"Chī fàn qián yào xǐ shǒu.",vn:"Trước khi ăn phải rửa tay."}],
   common_error:"❌ Nhầm 前(qián) với 以前(yǐqián) trong một số trường hợp:\n  以前我不喜欢吃蔬菜 ✅ (trước đây chung)\n  吃饭以前要洗手 ✅ (= 吃饭前要洗手 — cả hai đúng, nhưng 前 gọn hơn)\n\n✅ Mẹo nhớ:\n  [thời gian cụ thể] + 前 = trước [thời điểm đó]\n  以前 (không có gì đứng trước) = trước đây, hồi xưa",
   related_patterns:[{title:"以前",pin:"yǐqián",hanviet:"DĨ TIỀN",desc:"Trước đây, hồi xưa (quá khứ chung)",ex:{zh:"以前我不会说中文。",pin:"Yǐqián wǒ bú huì shuō Zhōngwén.",vn:"Trước đây tôi không biết nói tiếng Trung."}},{title:"…后/以后",pin:"hòu/yǐhòu",hanviet:"HẬU/DĨ HẬU",desc:"Sau khi... / sau này (đối lập với 前)",ex:{zh:"吃完饭后，我们去散步。",pin:"Chī wán fàn hòu, wǒmen qù sànbù.",vn:"Sau khi ăn xong, chúng ta đi dạo."}}]},
  {tag:"b11",title:"让/叫 (ràng/jiào) — 4 cách dùng",pattern:"S + 让/叫 + 人 + V  (để/khiến/cho phép/bảo)",
   desc:"让(ràng) và 叫(jiào) đều có thể dùng với cấu trúc S + 让/叫 + 人 + V, nhưng mang 4 sắc thái khác nhau:\n\n【1】 Để cho, nhờ (make/let):\n  妈妈让我去买东西 = Mẹ bảo tôi đi mua đồ\n\n【2】 Khiến, làm cho (cause):\n  他的话让我很感动 = Lời anh ấy khiến tôi rất xúc động\n\n【3】 Cho phép (allow/permit):\n  爸爸不让我玩游戏 = Bố không cho phép tôi chơi game\n\n【4】 Nhường nhịn (yield — chỉ 让, không dùng 叫):\n  你应该让弟弟 = Bạn nên nhường em trai\n\n⚠️ Phân biệt 让 vs 叫:\n• 让(ràng) dùng cả 4 nghĩa\n• 叫(jiào) chủ yếu dùng nghĩa 1 (bảo/nhờ) và nghĩa 2 (khiến)\n• 叫 KHÔNG dùng nghĩa 4 (nhường)",
   examples:[{zh:"老师叫我们回答问题。",pin:"Lǎoshī jiào wǒmen huídá wèntí.",vn:"Thầy giáo bảo chúng tôi trả lời câu hỏi. [叫=bảo]"},{zh:"这件事让我想了很久。",pin:"Zhè jiàn shì ràng wǒ xiǎng le hěn jiǔ.",vn:"Chuyện này khiến tôi suy nghĩ rất lâu. [让=khiến]"},{zh:"父母不让他一个人出去。",pin:"Fùmǔ bù ràng tā yī gè rén chūqù.",vn:"Bố mẹ không cho phép anh ấy một mình ra ngoài. [让=cho phép]"}],
   common_error:"❌ Nhầm thứ tự: 让我妈妈去 (❌) → ✅ 妈妈让我去\n  [Chủ thể sai khiến] + 让/叫 + [người bị sai] + V\n\n❌ Dùng 叫 cho nghĩa nhường:\n  你应该叫弟弟 (❌ trong nghĩa nhường) → ✅ 你应该让弟弟\n\n⚠️ Phân biệt让 vs 请(qǐng):\n  让+V = bảo/khiến (mang tính áp đặt hơn)\n  请+V = mời/xin (lịch sự, đề nghị nhẹ nhàng)",
   related_patterns:[{title:"请+V",pin:"qǐng+V",hanviet:"THỈNH+V",desc:"Mời/Xin (lịch sự, không áp đặt)",ex:{zh:"请大家安静一下。",pin:"Qǐng dàjiā ānjìng yīxià.",vn:"Xin mọi người im lặng một chút."}},{title:"使/令",pin:"shǐ/lìng",hanviet:"SỬ/LỆNH",desc:"Khiến (văn viết, trang trọng hơn 让/叫)",ex:{zh:"这首歌令我非常感动。",pin:"Zhè shǒu gē lìng wǒ fēicháng gǎndòng.",vn:"Bài hát này khiến tôi rất xúc động."}}]},
  {tag:"b11",title:"自己 (zìjǐ) — tự mình, bản thân",pattern:"S + 自己 + V  /  S + V + 自己的 + N",
   desc:"自己(zìjǐ) dùng làm đại từ phản thân (reflexive pronoun), chỉ bản thân chủ thể.\n\n【Cấu trúc】:\n【A】 Tự mình làm: S + 自己 + V\n  你自己去吧 = Bạn tự đi đi\n  我自己来 = Để tôi tự làm\n\n【B】 Của bản thân: S + V + 自己的 + N\n  他喜欢自己的工作 = Anh ấy thích công việc của bản thân\n\n【C】 Nhấn mạnh bản thân: 亲自(qīnzì) so với 自己(zìjǐ)\n  亲自 = đích thân (nhấn mạnh người đó trực tiếp làm, không qua người khác)\n  自己 = tự mình (có thể kiêm chủ ngữ)",
   examples:[{zh:"这件事你自己决定，不用问我。",pin:"Zhè jiàn shì nǐ zìjǐ juédìng, bú yòng wèn wǒ.",vn:"Chuyện này bạn tự quyết định, không cần hỏi tôi."},{zh:"要相信自己，你一定能做到。",pin:"Yào xiāngxìn zìjǐ, nǐ yídìng néng zuòdào.",vn:"Hãy tin tưởng bản thân, bạn nhất định làm được."}],
   common_error:"❌ Nhầm vị trí 自己:\n  自己我来做 (❌) → ✅ 我自己来做\n  (自己 phải đứng SAU chủ ngữ, không đứng trước)\n\n✅ 自己 có thể làm chủ ngữ:\n  自己的事自己做 = Việc của mình thì tự mình làm\n  (自己的 = của bản thân → sở hữu)",
   related_patterns:[{title:"亲自",pin:"qīnzì",hanviet:"THÂN TỰ",desc:"Đích thân (nhấn mạnh không qua trung gian)",ex:{zh:"他亲自来接我们。",pin:"Tā qīnzì lái jiē wǒmen.",vn:"Anh ấy đích thân đến đón chúng tôi."}},{title:"独自",pin:"dúzì",hanviet:"ĐỘC TỰ",desc:"Một mình (nhấn mạnh không có ai đi cùng)",ex:{zh:"她独自生活已经三年了。",pin:"Tā dúzì shēnghuó yǐjīng sān nián le.",vn:"Cô ấy sống một mình đã ba năm rồi."}}]},
  {tag:"b8",title:"就 (jiù) — hai cách dùng",pattern:"[điều kiện] + S + 就 + V  /  [thời gian sớm] + 就 + V + 了",
   desc:"就(jiù) có 2 cách dùng chính:\n\n【A】 Điều kiện/thời gian → hành động sẽ xảy ra (\"thì\"):\n  Cấu trúc: [điều kiện/thời gian] + S + 就 + V\n  → Diễn đạt: khi...thì..., ngay khi...sẽ...\n\n【B】 Hành động xảy ra sớm hơn dự kiến:\n  Cấu trúc: [thời gian/điều kiện] + 就 + V + 了\n  → Nhấn mạnh: đã...rồi (sớm hơn mong đợi)",
   examples:[{zh:"他回来我们就吃饭。",pin:"Tā huí lái wǒmen jiù chī fàn.",vn:"[A] Anh ấy về thì chúng ta ăn cơm."},{zh:"下午五点他就回家了。",pin:"Xiàwǔ wǔ diǎn tā jiù huí jiā le.",vn:"[B] 5h chiều anh ấy đã về nhà rồi (sớm hơn dự kiến)."},{zh:"他开车15分就到机场了。",pin:"Tā kāi chē 15 fēn jiù dào jīchǎng le.",vn:"[B] Anh ấy lái xe 15 phút đã đến sân bay rồi."}],
   common_error:"❌ Nhầm 就(jiù) [B] với 才(cái): 就(jiù)+了 = sớm hơn dự kiến ≠ 才+V = muộn hơn dự kiến.\n  他5点才回家 (tā wǔ diǎn cái huí jiā) = Tận 5h anh ấy mới về (muộn) ↔ 他5点就回家了 (tā wǔ diǎn jiù huí jiā le) = Mới 5h anh ấy đã về rồi (sớm).\n✅ Phân biệt: 就...了 = sớm hơn mong đợi; 才...V = muộn hơn mong đợi.",
   related_patterns:[{title:"才 + V",pin:"cái+V",hanviet:"PHƯƠNG+V",desc:"Mới làm (muộn hơn dự kiến, hoặc cuối cùng mới xảy ra)",ex:{zh:"他十点才回来。",pin:"Tā shí diǎn cái huí lái.",vn:"Tận 10h anh ấy mới về."}},{title:"已经…了",pin:"yǐjīng…le",hanviet:"DĨ KINH…LE",desc:"Đã...rồi (trung tính, không so sánh với dự kiến)",ex:{zh:"他已经回家了。",pin:"Tā yǐjīng huí jiā le.",vn:"Anh ấy đã về nhà rồi."}}]},
  {tag:"b12",title:"一边…一边…",pin:"yìbiān…yìbiān…",hanviet:"NHẤT BIÊN…NHẤT BIÊN…",pattern:"主语 + 一边 + V1 + 一边 + V2",desc:"Diễn đạt hai hành động xảy ra đồng thời. Cả V1 và V2 phải là động từ hành động (không dùng với trạng thái như 是, 有, 喜欢).",examples:[{zh:"他一边吃饭，一边看电视。",pin:"Tā yìbiān chīfàn, yìbiān kàn diànshì.",vn:"Anh ấy vừa ăn cơm vừa xem tivi."},{zh:"我有空的时候，一边玩游戏，一边听音乐。",pin:"Wǒ yǒukōng de shíhou, yìbiān wán yóuxì, yìbiān tīng yīnyuè.",vn:"Lúc rảnh, tôi vừa chơi game vừa nghe nhạc."},{zh:"她一边走路，一边打电话。",pin:"Tā yìbiān zǒulù, yìbiān dǎ diànhuà.",vn:"Cô ấy vừa đi bộ vừa nói điện thoại."}],common_error:"❌ 他一边喜欢音乐，一边喜欢画画。→ 喜欢 là trạng thái, không dùng được. ✅ 他一边听音乐，一边画画。",related_patterns:[{title:"又…又…",pin:"yòu…yòu…",hanviet:"HỰU…HỰU…",desc:"Vừa...vừa... (mô tả hai đặc điểm/trạng thái, không phải hành động đồng thời)"},{title:"同时",pin:"tóngshí",hanviet:"ĐỒNG THỜI",desc:"Đồng thời — dùng nối mệnh đề, trang trọng hơn"}]},
  {tag:"b12",title:"对…感兴趣",pin:"duì…gǎn xìngqù",hanviet:"ĐỐI…CẢM HỨNG THÚ",pattern:"主语 + 对 + 事物/活动 + 感兴趣",desc:"表示对某事物有兴趣。对 (đối với) chỉ đối tượng gây ra cảm xúc. Phủ định: 对…不感兴趣 hoặc 对…没有兴趣.",examples:[{zh:"外国留学生对中国书法非常感兴趣。",pin:"Wàiguó liúxuéshēng duì Zhōngguó shūfǎ fēicháng gǎn xìngqù.",vn:"Du học sinh nước ngoài rất có hứng thú với thư pháp Trung Quốc."},{zh:"如果你对学中文感兴趣，就要多听多说。",pin:"Rúguǒ nǐ duì xué Zhōngwén gǎn xìngqù, jiù yào duō tīng duō shuō.",vn:"Nếu bạn có hứng thú với việc học tiếng Trung thì phải nghe nhiều, nói nhiều."},{zh:"我对历史一点兴趣也没有。",pin:"Wǒ duì lìshǐ yìdiǎn xìngqù yě méiyǒu.",vn:"Tôi không có một chút hứng thú nào với lịch sử."}],common_error:"❌ 我感兴趣中文。→ Thiếu 对. ✅ 我对中文感兴趣。",related_patterns:[{title:"对…满意",pin:"duì…mǎnyì",hanviet:"ĐỐI…MÃN Ý",desc:"Hài lòng về... — cùng cấu trúc 对+đối tượng+cảm xúc"},{title:"喜欢+V/N",pin:"xǐhuān+V/N",hanviet:"HỶ HOAN+V/N",desc:"Thích... — không cần giới từ 对"}]},
  {tag:"b12",title:"一点…也/都没有",pin:"yìdiǎn…yě/dōu méiyǒu",hanviet:"NHẤT ĐIỂM…DÃ/ĐÔ MỘT HỮU",pattern:"主语 + 一点 + (N) + 也/都 + 没有/不",desc:"强调完全否定，意为\"一点儿都不/没有\"。一点 nhấn mạnh sự phủ định hoàn toàn. Cả 也 lẫn 都 đều dùng được.",examples:[{zh:"我对这样的作品一点兴趣也没有。",pin:"Wǒ duì zhèyàng de zuòpǐn yìdiǎn xìngqù yě méiyǒu.",vn:"Tôi không có một chút hứng thú nào với những tác phẩm như vậy."},{zh:"他一点都不累，精神很好。",pin:"Tā yìdiǎn dōu bù lèi, jīngshén hěn hǎo.",vn:"Anh ấy không mệt một chút, tinh thần rất tốt."},{zh:"这道题一点都不难。",pin:"Zhè dào tí yìdiǎn dōu bù nán.",vn:"Bài tập này không khó một chút nào."}],common_error:"❌ 我一点兴趣没有。→ Thiếu 也/都. ✅ 我一点兴趣也没有。",related_patterns:[{title:"根本不/没",pin:"gēnběn bù/méi",hanviet:"CĂN BẢN BẤT/MỘT",desc:"Hoàn toàn không — phủ định mạnh tương tự"},{title:"一点儿+adj/v",pin:"yìdiǎnr+adj/v",hanviet:"NHẤT ĐIỂM NHI+adj/v",desc:"一点儿 dùng độc lập: 一点儿都不贵 = không đắt chút nào"}]},
  {tag:"b13",title:"从…到…",pin:"cóng...dào...",hanviet:"tùng...đáo...",pattern:"从 + A + 到 + B",desc:"Diễn tả khoảng cách hoặc khoảng thời gian từ điểm A đến điểm B (từ...đến...).",examples:[{zh:"从家到公司虽然不太远，但是每天他都坐出租车上班。",pin:"Cóng jiā dào gōngsī suīrán bú tài yuǎn, dànshì měitiān tā dōu zuò chūzūchē shàngbān.",vn:"Từ nhà đến công ty mặc dù không xa lắm, nhưng mỗi ngày cô ấy đều đi taxi đi làm."},{zh:"从下午四点半到晚上七点是我的业余时间，我常去足球场踢球。",pin:"Cóng xiàwǔ sì diǎn bàn dào wǎnshang qī diǎn shì wǒ de yèyú shíjiān, wǒ cháng qù zúqiúchǎng tī qiú.",vn:"Từ 4 rưỡi chiều đến 7h tối là thời gian rảnh rỗi của tôi, tôi thường đi sân bóng đá đá bóng."},{zh:"从今天早上到现在，我的心情一直非常愉快。",pin:"Cóng jīntiān zǎoshang dào xiànzài, wǒ de xīnqíng yìzhí fēicháng yúkuài.",vn:"Từ sáng nay đến bây giờ, tâm trạng của tôi luôn vô cùng vui vẻ."}],common_error:"Học viên thường quên 到, chỉ nói '从家公司' — cần đủ cả 从 và 到 để chỉ rõ điểm đầu và điểm cuối của khoảng cách/thời gian.",related_patterns:[{title:"一直",pin:"yìzhí",hanviet:"nhất trực",desc:"luôn, suốt — thường dùng kèm 从…到… để nhấn mạnh tính liên tục trong khoảng đó"}]},
  {tag:"b13",title:"一直 + V",pin:"yìzhí",hanviet:"nhất trực",pattern:"一直 + Động từ / Tính từ",desc:"Diễn tả một hành động hoặc trạng thái diễn ra liên tục, không ngừng (luôn, suốt). Khi đứng trước động từ chỉ phương hướng như 走, 一直走 nghĩa là 'đi thẳng'.",examples:[{zh:"雨一直下一天一夜。",pin:"Yǔ yìzhí xià yì tiān yí yè.",vn:"Mưa suốt 1 ngày 1 đêm."},{zh:"从今天早上到现在，我的心情一直非常愉快。",pin:"Cóng jīntiān zǎoshang dào xiànzài, wǒ de xīnqíng yìzhí fēicháng yúkuài.",vn:"Từ sáng nay đến bây giờ, tâm trạng của tôi luôn vô cùng vui vẻ."},{zh:"你一直走到十字路口，会看到红绿灯，我站在那里等你。",pin:"Nǐ yìzhí zǒu dào shízìlùkǒu, huì kàndào hónglǜdēng, wǒ zhàn zài nàlǐ děng nǐ.",vn:"Bạn đi thẳng đến ngã tư, sẽ nhìn thấy đèn giao thông, tôi đứng ở đó đợi bạn."}],common_error:"一直走 (đi thẳng, chỉ đường) khác với 一直 + tính từ/trạng thái (luôn luôn như vậy) — cần phân biệt theo ngữ cảnh.",related_patterns:[{title:"从…到…",pin:"cóng...dào...",hanviet:"tùng...đáo...",desc:"từ...đến... — thường đi kèm 一直 để nhấn mạnh tính liên tục"}]},
  {tag:"b14",title:"往 + phương vị + V",pin:"wǎng",hanviet:"vãng",pattern:"往 + (前/后/左/右/上/下...) + Động từ chỉ hướng (走/看/拐...)",desc:"Giới từ 往 chỉ phương hướng của động tác, đặt trước phương vị từ và động từ để diễn tả 'đi/nhìn/rẽ về phía...'.",examples:[{zh:"你往下看，我就是拿雨伞的人。",pin:"Nǐ wǎng xià kàn, wǒ jiù shì ná yǔsǎn de rén.",vn:"Bạn nhìn xuống dưới, tôi chính là người mà cầm ô."},{zh:"你从红绿灯一直往前走大概500米就到我家了。",pin:"Nǐ cóng hónglǜdēng yìzhí wǎng qián zǒu dàgài wǔbǎi mǐ jiù dào wǒ jiā le.",vn:"Bạn từ đèn giao thông đi thẳng về phía trước khoảng 500 mét thì đến nhà tôi rồi."},{zh:"你一直走到十字路口就往左拐，银行在城市和博物馆中间。",pin:"Nǐ yìzhí zǒu dào shízìlùkǒu jiù wǎng zuǒ guǎi, yínháng zài chéngshì hé bówùguǎn zhōngjiān.",vn:"Bạn đi thẳng đến ngã tư thì rẽ trái, ngân hàng ở giữa siêu thị và bảo tàng."}],common_error:"Không nhầm 往 với 到: 往 chỉ hướng di chuyển (về phía), còn 到 chỉ điểm đến (đến nơi nào).",related_patterns:[{title:"一直",pin:"yìzhí",hanviet:"nhất trực",desc:"luôn, suốt, thẳng — kết hợp 一直往前走 = đi thẳng về phía trước"}]},
  {tag:"b14",title:"听说",pin:"tīngshuō",hanviet:"thính thuyết",pattern:"听说 + Mệnh đề",desc:"Dùng để dẫn lại thông tin nghe được từ người khác (nghe nói rằng...), không khẳng định chắc chắn về tính xác thực.",examples:[{zh:"听说新来的外国同学对打太极拳非常有兴趣。",pin:"Tīngshuō xīn lái de wàiguó tóngxué duì dǎ tàijíquán fēicháng yǒu xìngqù.",vn:"Nghe nói bạn học nước ngoài mà mới đến vô cùng hứng thú đối với đánh thái cực quyền."},{zh:"我听说那里的天气特别冷，所以出门的时候一定要穿厚衣服。",pin:"Wǒ tīngshuō nàlǐ de tiānqì tèbié lěng, suǒyǐ chūmén de shíhou yídìng yào chuān hòu yīfu.",vn:"Tôi nghe nói thời tiết ở đấy đặc biệt lạnh, nên khi ra ngoài nhất định phải mặc quần áo dày."}],common_error:"听说 dùng để dẫn nguồn tin nghe được, khác với 说 (tự mình nói) — chủ thể của 听说 là 'người nghe được tin', không phải người thực hiện hành động trong mệnh đề sau.",related_patterns:[{title:"对…感兴趣",pin:"duì...gǎn xìngqù",hanviet:"đối...cảm hứng thú",desc:"có hứng thú với... — thường xuất hiện cùng 听说 khi nói về sở thích của người khác"}]},
  {tag:"b15",title:"再 vs 又",pin:"zài vs yòu",hanviet:"tái / hựu",pattern:"再 + V (chưa xảy ra) ; 又 + V (đã xảy ra)",desc:"再 và 又 đều có thể dịch là 'lại', nhưng 再 dùng cho hành động/tình huống lặp lại CHƯA xảy ra (sắp tới), còn 又 dùng cho hành động/tình huống lặp lại ĐÃ xảy ra rồi. 再 còn có nghĩa 'thêm' (再 + tính từ + 一点 = thêm một chút). 又 còn dùng để tăng ngữ khí trong câu phủ định/nghi vấn.",examples:[{zh:"今天我去看他了，明天我再去。",pin:"Jīntiān wǒ qù kàn tā le, míngtiān wǒ zài qù.",vn:"Hôm nay tôi đi thăm anh ấy rồi, ngày mai tôi lại đi."},{zh:"他昨天没上课，今天又没上课。",pin:"Tā zuótiān méi shàngkè, jīntiān yòu méi shàngkè.",vn:"Anh ấy hôm qua không lên lớp, hôm nay lại không lên lớp."},{zh:"你再努力一点就好了。",pin:"Nǐ zài nǔlì yìdiǎn jiù hǎo le.",vn:"Bạn cố gắng thêm 1 chút thì tốt rồi."}],common_error:"Học viên thường dùng nhầm 又 cho việc CHƯA xảy ra hoặc 再 cho việc ĐÃ xảy ra. Quy tắc: 再 = lặp lại trong tương lai, 又 = lặp lại đã xảy ra trong quá khứ.",related_patterns:[{title:"遍 vs 次",pin:"biàn vs cì",hanviet:"biến / thứ",desc:"phân biệt hai lượng từ chỉ số lần"}]},
  {tag:"b15",title:"遍 vs 次",pin:"biàn vs cì",hanviet:"biến / thứ",pattern:"Số từ + 遍 / 次",desc:"Cả 遍 và 次 đều là lượng từ chỉ số lần thực hiện một hành động. 次 chỉ đơn giản đếm số lần, không quan tâm hành động có được thực hiện trọn vẹn hay không. 遍 nhấn mạnh mỗi lần thực hiện đều đi từ đầu đến cuối (ví dụ đọc hết cả cuốn sách).",examples:[{zh:"我看这本书三次了。",pin:"Wǒ kàn zhè běn shū sān cì le.",vn:"Tôi đã đọc cuốn sách này 3 lần."},{zh:"我看这本书三遍了。",pin:"Wǒ kàn zhè běn shū sān biàn le.",vn:"Tôi đã đọc cuốn sách này 3 lần (từ đầu đến cuối)."}],common_error:"次 và 遍 có thể thay nhau trong nhiều trường hợp, nhưng khi muốn nhấn mạnh tính trọn vẹn (đọc/xem hết từ đầu đến cuối) thì dùng 遍, còn 次 chỉ là đếm số lần thông thường.",related_patterns:[{title:"再 vs 又",pin:"zài vs yòu",hanviet:"tái / hựu",desc:"phân biệt hai cách nói 'lại'"}]},

// HELPERS

function saveKnown(){localStorage.setItem('hsk_known',JSON.stringify(known))}
function isKnown(id){return known.includes(id)}
function toggleKnown(id){
  if(isKnown(id)){known=known.filter(x=>x!==id)}else{known.push(id)}
  saveKnown();updateProgressPill();renderVocab();
}
function updateProgressPill(){
  document.getElementById('knownCount').textContent=known.length;
  document.getElementById('totalCount').textContent=VOCAB.length;
}
function getBaiClass(b){return`bai-${b}`}
function getBaiColor(b){const m={1:'var(--b1)',2:'var(--b2)',3:'var(--b3)',4:'var(--b4)',5:'var(--b5)',6:'var(--b6)',7:'var(--b7)',8:'var(--b8)',9:'var(--b9)',10:'var(--b10)',11:'var(--b11)',12:'var(--b12)',13:'var(--b13)',14:'var(--b14)',15:'var(--b15)'};return m[b]||'var(--b1)'}

// ============================================================
// TABS
// ============================================================
function switchTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  localStorage.setItem('hsk_active_tab',id);
  if(id==='flashcard')initFlashcard();
  if(id==='quiz')nextQuestion();
  if(id==='grammar')renderGrammar();
  if(id==='compare')renderCompare();
  if(id==='songs')renderSongs();
  if(id==='exercise')renderExercises();
}
function toggleDark(){document.documentElement.toggleAttribute('data-dark')}
function shuffleVocab(){
  for(let i=VOCAB.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[VOCAB[i],VOCAB[j]]=[VOCAB[j],VOCAB[i]];}
  renderVocab();
}

let _baiFilter='all';
function filterBai(bai,btn){
  _baiFilter=bai;
  document.querySelectorAll('#tab-vocab .badge-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderVocab();
}
function filterVocab(){renderVocab()}

function _initVoices(){
  const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  const novelty = ['Eddy','Flo','Grandma','Grandpa','Reed','Rocko','Sandy','Shelley','Jester','Bells','Bahh','Albert','Bad News','Boing','Bubbles','Cellos','Wobble','Trinoids','Zarvox','Whisper','Organ'];
  const isNovelty = v => novelty.some(n=>v.name.startsWith(n));
  _zhVoice = vs.find(v=>v.name==='Tingting')
           || vs.find(v=>v.name==='Meijia')
           || vs.find(v=>v.lang==='zh-CN' && !isNovelty(v))
           || vs.find(v=>v.lang==='zh-TW' && !isNovelty(v))
           || vs.find(v=>v.lang==='zh-CN')
           || vs.find(v=>v.lang==='zh-TW')
           || vs.find(v=>v.lang.startsWith('zh'))
           || null;
}
if(window.speechSynthesis){
  _initVoices();
  window.speechSynthesis.onvoiceschanged = _initVoices;
}
function speakChinese(text, event){
  if(event){ event.stopPropagation(); event.preventDefault(); }
  if(!window.speechSynthesis || !text) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.75;
  utter.pitch = 1;
  if(_zhVoice) utter.voice = _zhVoice;
  const btn = event && event.currentTarget;
  if(btn){ btn.classList.add('speaking'); utter.onend = ()=>btn.classList.remove('speaking'); utter.onerror = ()=>btn.classList.remove('speaking'); }
  window.speechSynthesis.speak(utter);
}

// Word tag renderer
function renderWordTags(list,cls){
  return list.map(t=>`<span class="word-tag ${cls}"><span class="tag-zh">${t.zh}</span>${t.pin?`<span class="tag-pin">${colorPinyin(t.pin)}</span>`:''  }${t.hanviet?`<span class="tag-hv">${t.hanviet}</span>`:''}<span class="tag-vn">${t.vn}</span></span>`).join('');
}

// Tone color mapping
function colorPinyin(pin){
  const map={'ā':'1','á':'2','ǎ':'3','à':'4','ē':'1','é':'2','ě':'3','è':'4','ī':'1','í':'2','ǐ':'3','ì':'4','ō':'1','ó':'2','ǒ':'3','ò':'4','ū':'1','ú':'2','ǔ':'3','ù':'4','ǖ':'1','ǘ':'2','ǚ':'3','ǜ':'4'};
  const colors={'1':'var(--t1)','2':'var(--t2)','3':'var(--t3)','4':'var(--t4)'};
  return pin.split(' ').map(syl=>{
    let tone='n';
    for(const c of syl)if(map[c]){tone=map[c];break;}
    const col=colors[tone]||'var(--tn)';
    return`<span style="color:${col}">${syl}</span>`;
  }).join(' ');
}

let _fcBai='all';
function fcFilter(bai,btn){
  _fcBai=bai;
  document.querySelectorAll('#tab-flashcard .badge-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  initFlashcard();
}
function initFlashcard(){
  let list=[...VOCAB];
  if(_fcBai!=='all'&&_fcBai!=='unknown')list=list.filter(w=>w.bai===_fcBai);
  if(_fcBai==='unknown')list=list.filter(w=>!isKnown(w.id));
  // shuffle
  for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]];}
  fcList=list;
  fcIndex=0;fcFlipped=false;
  renderFC();
}
function renderFC(){
  if(!fcList.length){
    document.getElementById('fcFrontHanzi').textContent='🎉';
    document.getElementById('fcFrontBai').textContent='';
    document.getElementById('fcCounter').textContent='0 / 0';
    return;
  }
  const w=fcList[fcIndex];
  document.getElementById('fcFrontHanzi').innerHTML=`<span style="font-family:var(--font-zh)">${w.hanzi}</span>`;
  document.getElementById('fcFrontBai').textContent=`Buổi ${w.bai}`;
  document.getElementById('fcFrontBai').className=`fc-front-bai ${getBaiClass(w.bai)}`;
  document.getElementById('fcCounter').textContent=`${fcIndex+1} / ${fcList.length}`;
  document.getElementById('fcProgressFill').style.width=`${((fcIndex+1)/fcList.length)*100}%`;
  // back
  document.getElementById('fcBack').innerHTML=`
    <div style="width:100%;text-align:center;margin-bottom:10px">
      <div class="fc-back-pinyin">${colorPinyin(w.pinyin)}</div>
      <div class="fc-back-hanviet">${w.hanviet}</div>
      <div class="fc-back-meaning">${w.meaning}</div>
    </div>
    <div class="fc-divider"></div>
    <div style="width:100%;margin-bottom:10px">
      <div class="section-title" style="margin-bottom:6px">🧩 Bộ thành phần</div>
      ${w.components.map(c=>`<div class="fc-component-row"><div class="comp-left"><span class="fc-comp-char">${c.char}</span>${c.pin?`<div class="comp-pin" style="text-align:center">${colorPinyin(c.pin)}</div>`:''  }${c.hanviet?`<div class="comp-hv">${c.hanviet}</div>`:''}</div><span class="fc-comp-text">${c.explain}</span></div>`).join('')}
    </div>
    <div class="fc-divider"></div>
    <div style="width:100%">
      <div class="section-title" style="margin-bottom:6px">💬 Ví dụ</div>
      ${w.examples.slice(0,2).map(e=>`<div class="fc-ex"><div class="fc-ex-zh">${e.zh}</div>${e.pin?`<div class="ex-pin">${colorPinyin(e.pin)}</div>`:''}<div class="fc-ex-vn">${e.vn}</div></div>`).join('')}
    </div>`;
  // unflip
  document.getElementById('fcScene').classList.remove('flipped');
  fcFlipped=false;
  updateFCStats();
}
function flipCard(){
  document.getElementById('fcScene').classList.toggle('flipped');
  fcFlipped=!fcFlipped;
}
function fcMove(dir){
  fcIndex=(fcIndex+dir+fcList.length)%fcList.length;
  renderFC();
}
function fcMark(know){
  const w=fcList[fcIndex];
  if(know&&!isKnown(w.id)){known.push(w.id);saveKnown();updateProgressPill();}
  if(!know&&isKnown(w.id)){known=known.filter(x=>x!==w.id);saveKnown();updateProgressPill();}
  updateFCStats();
  if(fcIndex<fcList.length-1){fcMove(1);}else{fcIndex=0;renderFC();}
}
function updateFCStats(){
  const kn=fcList.filter(w=>isKnown(w.id)).length;
  const rv=fcList.length-kn;
  document.getElementById('fc-known-cnt').textContent=kn;
  document.getElementById('fc-review-cnt').textContent=rv;
  document.getElementById('fc-remain-cnt').textContent=`${fcList.length} từ`;
}

function setQuizMode(mode,btn){
  quizMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  quizCorrect=0;quizWrong=0;quizStreak=0;
  document.getElementById('quizCorrect').textContent=0;
  document.getElementById('quizWrong').textContent=0;
  document.getElementById('quizStreak').textContent=0;
  nextQuestion();
}
function nextQuestion(){
  answered=false;
  document.getElementById('quizFeedback').style.display='none';
  document.getElementById('quizNext').style.display='none';
  // pick random word
  const pool=[...VOCAB];
  const correct=pool[Math.floor(Math.random()*pool.length)];
  // pick 3 distractors
  const others=pool.filter(w=>w.id!==correct.id).sort(()=>Math.random()-.5).slice(0,3);
  const allOpts=[correct,...others].sort(()=>Math.random()-.5);
  currentQuestion={correct,allOpts};
  renderQuiz(correct,allOpts);
}
function renderQuiz(correct,allOpts){
  const qEl=document.getElementById('quizQuestion');
  const oEl=document.getElementById('quizOptions');
  if(quizMode==='zh2vn'){
    qEl.innerHTML=`<div class="quiz-question-zh">${correct.hanzi}</div><div class="quiz-question-pin" style="margin-top:6px;color:var(--text3)">Nghĩa tiếng Việt là gì?</div>`;
    oEl.innerHTML=allOpts.map(o=>`<button class="quiz-opt" onclick="checkAnswer(${o.id})" data-id="${o.id}">${o.meaning}</button>`).join('');
  }else if(quizMode==='vn2zh'){
    qEl.innerHTML=`<div class="quiz-question-vn">${correct.meaning}</div><div class="quiz-question-pin" style="margin-top:4px;color:var(--text3)">Chữ Hán nào đúng?</div>`;
    oEl.innerHTML=allOpts.map(o=>`<button class="quiz-opt" onclick="checkAnswer(${o.id})" data-id="${o.id}"><span class="opt-zh">${o.hanzi}</span>${o.pinyin}</button>`).join('');
  }else if(quizMode==='zh2pin'){
    qEl.innerHTML=`<div class="quiz-question-zh">${correct.hanzi}</div><div class="quiz-question-vn" style="margin-top:4px;font-size:.9rem">${correct.meaning}</div><div class="quiz-question-pin" style="margin-top:4px;color:var(--text3)">Pinyin nào đúng?</div>`;
    oEl.innerHTML=allOpts.map(o=>`<button class="quiz-opt" onclick="checkAnswer(${o.id})" data-id="${o.id}">${o.pinyin}</button>`).join('');
  }else{
    qEl.innerHTML=`<div class="quiz-question-pin" style="font-size:1.6rem;font-weight:700;letter-spacing:1px">${correct.pinyin}</div><div class="quiz-question-pin" style="margin-top:4px;color:var(--text3)">Chữ Hán nào đúng?</div>`;
    oEl.innerHTML=allOpts.map(o=>`<button class="quiz-opt" onclick="checkAnswer(${o.id})" data-id="${o.id}"><span class="opt-zh">${o.hanzi}</span>${o.meaning}</button>`).join('');
  }
}
function checkAnswer(id){
  if(answered)return;answered=true;
  const correct=currentQuestion.correct;
  const isRight=id===correct.id;
  if(isRight){quizCorrect++;quizStreak++;}else{quizWrong++;quizStreak=0;}
  document.getElementById('quizCorrect').textContent=quizCorrect;
  document.getElementById('quizWrong').textContent=quizWrong;
  document.getElementById('quizStreak').textContent=quizStreak;
  // highlight
  document.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.disabled=true;
    const bid=parseInt(btn.dataset.id);
    if(bid===correct.id)btn.classList.add('correct');
    else if(bid===id)btn.classList.add('wrong');
  });
  const fb=document.getElementById('quizFeedback');
  fb.style.display='block';
  if(isRight){
    fb.className='quiz-feedback correct';
    fb.innerHTML=`✓ Đúng rồi! <strong>${correct.hanzi}</strong> (${correct.pinyin}) — ${correct.meaning}`;
  }else{
    fb.className='quiz-feedback wrong';
    fb.innerHTML=`✗ Sai. Đáp án đúng: <strong>${correct.hanzi}</strong> (${correct.pinyin}) — ${correct.meaning}`;
  }
  document.getElementById('quizNext').style.display='block';
}

function annotateZh(text){
  if(!text)return'';
  // Convert 汉字(pīnyīn) → hanzi + colored pinyin span
  return text.replace(/([\u4e00-\u9fff\u3400-\u4dbf\uff01-\uffee，。！？、：；""''（）【】《》·…—]+)\(([^)]{1,30})\)/g,function(m,zh,pin){
    return zh+'<span class="zh-ann-pin">'+colorPinyin(pin)+'</span>';
  });
}

// ---- shared helpers for interactive checking ----
function exNormalizeZh(s){
  return (s||'').replace(/[，。！？、；：“”‘’「」（）()\s]/g,'');
}
function exWordBank(words,sectionId){
  return `<div class="exercise-word-bank">${words.map(w=>`<span class="exercise-word-chip" draggable="true" data-w="${w}" ondragstart="exDragStart(event)" ondragend="this.classList.remove('dragging')" onclick="exPlaceWord('${sectionId}',this)">${w}</span>`).join('')}</div>`;
}
function exDragStart(e){
  e.dataTransfer.setData('text/plain',e.target.dataset.w);
  e.target.classList.add('dragging');
}
function exDragOver(e){e.preventDefault();e.currentTarget.classList.add('drop-hover')}
function exDragLeave(e){e.currentTarget.classList.remove('drop-hover')}
function exDrop(e,inputId){
  e.preventDefault();
  e.currentTarget.classList.remove('drop-hover');
  const word=e.dataTransfer.getData('text/plain');
  if(!word)return;
  const input=document.getElementById(inputId);
  input.value=word;
  input.classList.remove('correct','wrong');
}
function exPlaceWord(sectionId,chip){
  if(chip.classList.contains('used'))return;
  const inputs=[...document.querySelectorAll('#'+sectionId+' .exercise-blank-input')];
  const target=inputs.find(i=>!i.value.trim());
  if(!target)return;
  target.value=chip.dataset.w;
  target.classList.remove('correct','wrong');

function exCheckBlanks(sectionId){
  const inputs=[...document.querySelectorAll('#'+sectionId+' .exercise-blank-input')];
  if(!inputs.length)return;
  let correct=0;
  inputs.forEach(inp=>{
    const ok=inp.value.trim()===inp.dataset.answer;
    inp.classList.remove('correct','wrong');
    inp.classList.add(ok?'correct':'wrong');
    if(ok)correct++;
  });
  const res=document.getElementById(sectionId+'-result');
  if(res){
    res.textContent=`${correct}/${inputs.length} đúng`;
    res.className='exercise-result '+(correct===inputs.length?'ok':'bad');
  }
}
function exResetBlanks(sectionId){
  document.querySelectorAll('#'+sectionId+' .exercise-blank-input').forEach(inp=>{inp.value='';inp.classList.remove('correct','wrong')});
  document.querySelectorAll('#'+sectionId+' .exercise-word-chip').forEach(c=>c.classList.remove('used'));
  const res=document.getElementById(sectionId+'-result');
  if(res){res.textContent='';res.className='exercise-result'}
}
function exCheckFooter(sectionId){
  return `<div class="exercise-section-footer">
    <button class="exercise-check-btn" onclick="exCheckBlanks('${sectionId}')">✓ Kiểm tra</button>
    <button class="exercise-reset-btn" onclick="exResetBlanks('${sectionId}')">↺ Làm lại</button>
    <span class="exercise-result" id="${sectionId}-result"></span>
  </div>`;
}
function exCheckText(id){
  const inp=document.getElementById(id);
  const ok=exNormalizeZh(inp.value)===exNormalizeZh(inp.dataset.answer);
  inp.classList.remove('correct','wrong');
  inp.classList.add(ok?'correct':'wrong');
  const res=document.getElementById(id+'-result');
  if(res){
    res.textContent=ok?'✓ Chính xác!':'✗ Chưa đúng, thử lại hoặc xem đáp án';
    res.className='exercise-result '+(ok?'ok':'bad');
  }
}

function _exCharInfo(ch){
  const cm=_exComponentCharMap();
  if(cm.has(ch)){
    const c=cm.get(ch);
    const parts=(c.explain||'').split('→');
    return {pin:c.pin||'',hv:c.hanviet||'',vn:parts.length?parts[parts.length-1].trim():''};
  }
  if(EX_CHAR_DICT[ch])return EX_CHAR_DICT[ch];
  return {pin:'',hv:'',vn:''};
}
function wrapZhVocab(text){
  if(!text)return text;
  const map=_exMatchMap();
  return text.split(/(<[^>]+>)/g).map(part=>{
    if(part.charAt(0)==='<')return part;
    let out='',i=0;
    while(i<part.length){
      const ch=part[i];
      if(/[一-鿿]/.test(ch)){
        let matched=null;
        for(let len=Math.min(4,part.length-i);len>=1;len--){
          const sub=part.substr(i,len);
          if(map.has(sub)){matched=sub;break}
        }
        if(matched){
          const v=map.get(matched);
          const vn=(v.meaning||'').replace(/"/g,'&quot;');
          out+=`<span class="ex-word" data-zh="${matched}" data-pin="${v.pinyin}" data-hv="${v.hanviet||''}" data-vn="${vn}" onclick="showWordPopup(event,this)">${matched}</span>`;
          i+=matched.length;
        }else{
          const info=_exCharInfo(ch);
          const vn=(info.vn||'').replace(/"/g,'&quot;');
          out+=`<span class="ex-word" data-zh="${ch}" data-pin="${info.pin||''}" data-hv="${info.hv||''}" data-vn="${vn}" onclick="showWordPopup(event,this)">${ch}</span>`;
          i+=1;
        }
      }else{out+=ch;i+=1}
    }
    return out;
  }).join('');
}
// ---- order: tap words in the right order to build the sentence ----
function renderExOrder(id,items){
  return items.map((it,i)=>{
    const aid=`${id}-${i}-a`;
    const itemId=`${id}-${i}`;
    const words=it.q.split('/').map(w=>w.trim());
    const ans=exNormalizeZh(it.a);
    return `<div class="exercise-item">
      <div class="exercise-q"><b>${i+1}.</b> <span style="font-size:.78rem;color:var(--text3)">👉 Bấm vào các từ theo đúng thứ tự để ghép thành câu</span></div>
      <div class="exercise-order-area" id="${itemId}-area" data-answer="${ans}"></div>
      <div class="exercise-order-pool" id="${itemId}-pool">
        ${words.map(w=>`<span class="exercise-word-chip" data-w="${w}" onclick="exOrderMove(this,'${itemId}')">${w}</span>`).join('')}
      </div>
      <div class="exercise-section-footer">
        <button class="exercise-check-btn" onclick="exCheckOrder('${itemId}')">✓ Kiểm tra</button>
        <button class="exercise-reset-btn" onclick="exResetOrder('${itemId}')">↺ Làm lại</button>
        <span class="exercise-result" id="${itemId}-result"></span>
      </div>
      ${exAnswerBox(aid,`<div class="exercise-answer-zh">${wrapZhVocab(it.a)}</div><div class="exercise-answer-pin">${colorPinyin(it.pin)}</div><div class="exercise-answer-vn">${it.vn}</div>`)}
    </div>`;
  }).join('');
}
function exOrderMove(chip,itemId){
  const area=document.getElementById(itemId+'-area');
  const pool=document.getElementById(itemId+'-pool');
  if(chip.parentElement===pool)area.appendChild(chip);
  else pool.appendChild(chip);
  area.classList.remove('correct','wrong');
  const res=document.getElementById(itemId+'-result');
  if(res){res.textContent='';res.className='exercise-result'}
}
function exCheckOrder(itemId){
  const area=document.getElementById(itemId+'-area');
  const built=[...area.children].map(c=>c.dataset.w).join('');
  const ok=built.length>0&&built===area.dataset.answer;
  area.classList.remove('correct','wrong');
  area.classList.add(ok?'correct':'wrong');
  const res=document.getElementById(itemId+'-result');
  res.textContent=ok?'✓ Đúng rồi!':'✗ Chưa đúng, thử lại';
  res.className='exercise-result '+(ok?'ok':'bad');
}
function exResetOrder(itemId){
  const area=document.getElementById(itemId+'-area');
  const pool=document.getElementById(itemId+'-pool');
  [...area.children].forEach(c=>pool.appendChild(c));
  area.classList.remove('correct','wrong');
  const res=document.getElementById(itemId+'-result');
  if(res){res.textContent='';res.className='exercise-result'}
}

    });
    return `<div class="exercise-item">
      <div class="exercise-q"><b>${i+1}.</b> <span class="qzh">${q}</span></div>
      ${exAnswerBox(aid,`<div class="exercise-answer-zh">Đáp án: ${wrapZhVocab(it.a.join(' / '))}</div><div class="exercise-answer-pin">${colorPinyin(it.pin)}</div><div class="exercise-answer-vn">${it.vn}</div>`)}
    </div>`;
  }).join('');
  return `<div id="${id}">${bank}${items}${exCheckFooter(id)}</div>`;
}
// ---- clozepassage: numbered blanks inside one passage, drag/tap/type + check ----
function renderExClozePassage(id,sec){
  const bank=exWordBank(sec.bank,id);
  const passageHtml=wrapZhVocab(sec.passage).replace(/\((\d+)\)___/g,(m,num)=>{
    const idx=parseInt(num)-1;
    const bid=`${id}-${idx}-b`;
    const ans=sec.blanks[idx];
    return `(${num})<input class="exercise-blank-input" type="text" id="${bid}" data-answer="${ans}" ondrop="exDrop(event,'${bid}')" ondragover="exDragOver(event)" ondragleave="exDragLeave(event)" autocomplete="off" size="4">`;
  });
  const aid=`${id}-a`;
  let filled=sec.passage;
  sec.blanks.forEach((w,i)=>{
    filled=filled.replace(`(${i+1})___`,`<span class="exercise-blank">${w}</span>`);
  });
  return `<div id="${id}">${bank}<div class="exercise-item">
    <div class="exercise-q qzh">${passageHtml}</div>
    ${exCheckFooter(id)}
    ${exAnswerBox(aid,`<div class="exercise-answer-zh">${wrapZhVocab(filled)}</div><div class="exercise-answer-pin">${colorPinyin(sec.pin)}</div><div class="exercise-answer-vn">${sec.vn}</div>`)}
  </div></div>`;
}
// ---- correct (sửa lỗi sai): type the corrected sentence, then check ----
function renderExCorrect(id,sec){
  const example=sec.example?`<div class="exercise-item" style="border:1px dashed var(--border);background:transparent"><div class="exercise-example-label">Ví dụ</div><div class="exercise-correct-wrong qzh">${wrapZhVocab(sec.example.wrong)}</div><div class="exercise-answer-zh qzh">→ ${wrapZhVocab(sec.example.a)}</div></div>`:'';
  const items=sec.items.map((it,i)=>{
    const aid=`${id}-${i}-a`;
    const cid=`${id}-${i}-c`;
    return `<div class="exercise-item">
      <div class="exercise-q"><b>${i+1}.</b> <span class="exercise-correct-wrong qzh">${wrapZhVocab(it.wrong)}</span></div>
      <input class="exercise-line-input qzh" type="text" id="${cid}" data-answer="${it.a}" placeholder="Viết lại câu đúng..." autocomplete="off">
      <div class="exercise-section-footer">
        <button class="exercise-check-btn" onclick="exCheckText('${cid}')">✓ Kiểm tra</button>
        <span class="exercise-result" id="${cid}-result"></span>
      </div>
      ${exAnswerBox(aid,`<div class="exercise-answer-zh">${wrapZhVocab(it.a)}</div><div class="exercise-answer-pin">${colorPinyin(it.pin)}</div><div class="exercise-answer-vn">${it.vn}</div>`)}
    </div>`;
  }).join('');
  return example+items;
}
function renderExReading(id,sec){
  const pid=`${id}-passage`;
  const passage=`<div class="exercise-passage">
    <div class="exercise-passage-zh qzh">${wrapZhVocab(sec.passage.zh)}</div>
    <div class="exercise-passage-pin" id="${pid}-pin">${colorPinyin(sec.passage.pin)}</div>
    <div class="exercise-passage-vn" id="${pid}-vn">${sec.passage.vn}</div>
    <div class="exercise-passage-toggle">
      <button class="exercise-reveal-btn" onclick="toggleExPassage('${pid}-pin')">Pinyin</button>
      <button class="exercise-reveal-btn" onclick="toggleExPassage('${pid}-vn')">Dịch</button>
    </div>
  </div>`;
  let items;
  if(sec.qtype==='tf'){
    items=sec.items.map((it,i)=>{
      const qid=`${id}-${i}`;
      const correct=it.a==='Đúng';
      return `<div class="exercise-item">
        <div class="exercise-q"><b>${i+1}.</b> <span class="qzh">${wrapZhVocab(it.q)}</span></div>
        <div class="exercise-tf-btns" id="${qid}">
          <button class="exercise-tf-btn" onclick="checkExTF('${qid}',this,${correct},true)">✓ Đúng</button>
          <button class="exercise-tf-btn" onclick="checkExTF('${qid}',this,${correct},false)">✗ Sai</button>
        </div>
      </div>`;
    }).join('');
  }else{
    items=sec.items.map((it,i)=>{
      const aid=`${id}-${i}-a`;
      const cid=`${id}-${i}-c`;
      return `<div class="exercise-item">
        <div class="exercise-q"><b>${i+1}.</b> <span class="qzh">${wrapZhVocab(it.q)}</span></div>
        <input class="exercise-line-input qzh" type="text" id="${cid}" data-answer="${it.a}" placeholder="Trả lời bằng tiếng Trung (dựa vào đoạn văn)..." autocomplete="off">
        <div class="exercise-section-footer">
          <button class="exercise-check-btn" onclick="exCheckText('${cid}')">✓ Kiểm tra</button>
          <span class="exercise-result" id="${cid}-result"></span>
        </div>
        ${exAnswerBox(aid,`<div class="exercise-answer-zh">${wrapZhVocab(it.a)}</div>`)}
      </div>`;
    }).join('');
  }
  return passage+items;
}
function toggleExPassage(id){document.getElementById(id).classList.toggle('show')}
function checkExTF(qid,btn,correct,choice){
  const btns=document.getElementById(qid).querySelectorAll('.exercise-tf-btn');
  btns.forEach(b=>b.disabled=true);
  if(choice===correct){btn.classList.add('correct');}
  else{btn.classList.add('wrong');btns[correct?0:1].classList.add('correct');}
}
function renderExWrite(id,sec){
  const aid=`${id}-0`;
  const words=sec.words?`<div class="exercise-bank">${sec.words.map(w=>`<span class="exercise-bank-item">${wrapZhVocab(w)}</span>`).join('')}</div><div style="font-size:.78rem;color:var(--text2);margin-bottom:10px">${sec.wordsVn||''}</div>`:'';
  const topic=sec.topic?`<div class="exercise-q"><b>Đề bài:</b> <span class="qzh">${wrapZhVocab(sec.topic)}</span></div>`:'';
  return `<div class="exercise-item">
    ${topic}${words}
    <textarea class="exercise-input" rows="4" placeholder="Viết đoạn văn của bạn ở đây..."></textarea>
    <button class="exercise-reveal-btn" onclick="toggleExAnswer('${aid}')">👁 Xem bài mẫu</button>
    <div class="exercise-answer" id="${aid}">
      <div class="exercise-answer-zh qzh">${wrapZhVocab(sec.sample.zh)}</div>
      <div class="exercise-answer-pin">${colorPinyin(sec.sample.pin)}</div>
      <div class="exercise-answer-vn">${sec.sample.vn}</div>
    </div>
  </div>`;
}

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script>
const _hw={};
function toggleStrokes(id,hanzi,e){
  e.stopPropagation();
  const area=document.getElementById('stroke-'+id);
  if(area.classList.contains('active')){area.classList.remove('active');return;}
  area.classList.add('active');
  if(_hw[id])return _hw[id].forEach(w=>w.animateCharacter());
  _hw[id]=[...hanzi].map((char,i)=>{
    const w=HanziWriter.create('stroke-'+id+'-'+i,char,{
      width:90,height:90,padding:5,
      showOutline:true,
      strokeColor:'#cc2222',
      outlineColor:'#ddd',
      drawingWidth:3,
      strokeAnimationSpeed:0.8,
      delayBetweenStrokes:200
    });
    w.animateCharacter();
    return w;
  });
}
// ============================================================
// SONGS TAB
function openYtPopup(url){
  const w=640,h=400;
  const left=Math.round(screen.width/2-w/2);
  const top=Math.round(screen.height/2-h/2);
  window.open(url,'ytpopup',`width=${w},height=${h},top=${top},left=${left},toolbar=0,menubar=0,location=0,status=0`);
}
// ============================================================
let _currentSongId = null;

function renderSongs(){
  const list = document.getElementById('songsList');
  if(!list) return;
  list.innerHTML = SONGS.map(s=>`
    <div class="song-item${_currentSongId===s.id?' active':''}" onclick="playSong(${s.id})">
      <div class="song-item-title">${s.title}</div>
      <div class="song-item-artist">${s.artist}</div>
    </div>`).join('');
  if(_currentSongId){
    const s = SONGS.find(x=>x.id===_currentSongId);
    if(s) _renderSongContent(s);
  }
}

function playSong(id){
  _currentSongId = id;
  const s = SONGS.find(x=>x.id===id);
  if(!s) return;
  document.querySelectorAll('.song-item').forEach(el=>{
    el.classList.toggle('active', parseInt(el.getAttribute('onclick').match(/\d+/)[0])===id);
  });
  _renderSongContent(s);
}

function _renderSongContent(s){
  document.getElementById('songsEmpty').style.display='none';
  const player = document.getElementById('songsPlayer');
  player.style.display='block';
  document.getElementById('songsMeta').innerHTML=`
    <h2>${s.title} <span style="font-size:.85rem;font-weight:400;color:var(--text2)">${s.titlePin}</span></h2>
    <p><span style="font-weight:700;color:var(--text3);font-size:.7rem;letter-spacing:.5px">${s.titleHv}</span>&emsp;${s.artist}</p>`;
  const _ytId = (s.youtube.match(/[?&]v=([^&]+)/) || s.youtube.match(/youtu\.be\/([^?]+)/) || ['',''])[1];
  const _thumb = _ytId ? `https://img.youtube.com/vi/${_ytId}/hqdefault.jpg` : '';
  const _ytUrl = s.youtube;
  document.getElementById('songsYtWrap').innerHTML =
    `<div class="yt-thumb-wrap" onclick="openYtPopup('${_ytUrl}')">
       ${_thumb ? `<img src="${_thumb}" alt="${s.title}" onerror="this.style.display='none'">` : ''}
       <div class="yt-play-btn">
         <div class="yt-play-icon"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
         <span class="yt-play-label">▶ Bấm để nghe</span>
       </div>
     </div>`;
  const block = document.getElementById('lyricBlock');
  block.innerHTML = s.lyrics.map((line,li)=>{
    if(line===null) return '<div class="lyric-line-sep"></div>';
    const tokens = Array.isArray(line) ? line : line.t;
    const trans  = Array.isArray(line) ? '' : (line.tr||'');
    return '<div class="lyric-line-wrap">' +
      '<div class="lyric-line">' +
      tokens.map((tok,ti)=>{
        const da = `data-zh="${tok.zh}" data-pin="${tok.pin}" data-hv="${tok.hanviet}" data-vn="${tok.vn}" data-sid="${s.id}" data-li="${li}" data-ti="${ti}"`;
        return `<div class="lyric-token" ${da} onclick="showWordPopup(event,this)">
          <span class="lt-pin">${colorPinyin(tok.pin)}</span>
          <span class="lt-zh">${tok.zh}</span>
          <span class="lt-hv">${tok.hanviet||''}</span>
          <span class="lt-vn">${tok.vn}</span>
        </div>`;
      }).join('') +
      '</div>' +
      (trans ? `<div class="lyric-line-trans">💬 ${trans}</div>` : '') +
    '</div>';
  }).join('');
}

function showWordPopup(event, el){
  const popup = document.getElementById('wordPopup');
  const zh = el.dataset.zh || '';
  const pin = el.dataset.pin || '';
  const hv = el.dataset.hv || '';
  const vn = el.dataset.vn || '';

  document.getElementById('wpZh').textContent = zh;
  document.getElementById('wpPin').innerHTML = colorPinyin(pin);
  document.getElementById('wpHv').textContent = hv;
  document.getElementById('wpVn').textContent = vn;

  // ── Stroke order: 1 Hanzi Writer per character ──
  const strokesEl = document.getElementById('wpStrokes');
  const chars = [...zh];
  strokesEl.innerHTML = chars.map((_,i) =>
    '<div class="wp-stroke-char" id="wpsc-'+i+'"></div>'
  ).join('');
  if(typeof HanziWriter !== 'undefined'){
    chars.forEach((ch, i) => {
      try {
        const w = HanziWriter.create('wpsc-'+i, ch, {
          width:80, height:80, padding:5,
          showOutline:true,
          strokeColor:'#C0392B',
          outlineColor:'#ddd',
          drawingWidth:3,
          strokeAnimationSpeed:0.8,
          delayBetweenStrokes:150
        });
        w.animateCharacter();
      } catch(e){}
    });
  }

  // ── Look up token from SONGS array (has comp + exs) ──
  const sid = parseInt(el.dataset.sid||'0');
  const li  = parseInt(el.dataset.li||'0');
  const ti  = parseInt(el.dataset.ti||'0');
  const song = (typeof SONGS!=='undefined') ? SONGS.find(s=>s.id===sid) : null;
  const rawLine = song ? song.lyrics[li] : null;
  const tokArr  = rawLine ? (Array.isArray(rawLine) ? rawLine : rawLine.t) : null;
  const tok     = tokArr ? tokArr[ti] : null;

  // Fallback: look in VOCAB if not found in song token
  const vocabMatch = (typeof VOCAB!=='undefined') ? VOCAB.find(v=>v.hanzi===zh) : null;

  const compStr = (tok && tok.comp)
    ? tok.comp
    : (vocabMatch && vocabMatch.components ? vocabMatch.components.map(c=>`${c.char}(${c.pin||''}${c.hanviet?', '+c.hanviet:''}): ${c.explain||''}`).join(' · ') : null);
  const exsArr = (tok && tok.exs && tok.exs.length)
    ? tok.exs
    : (vocabMatch && vocabMatch.examples && vocabMatch.examples.length ? vocabMatch.examples.map(e=>`${e.zh}<span class="zh-ann-pin">${colorPinyin(e.pin||'')}</span> — ${e.vn||''}`) : null);

  const vocabSec = document.getElementById('wpVocabSections');
  const compEl   = document.getElementById('wpComponents');
  const exEl     = document.getElementById('wpExamples');

  if(compStr || exsArr){
    compEl.innerHTML = compStr ? compStr : '<span class="wp-none">—</span>';
    exEl.innerHTML   = exsArr
      ? exsArr.map(ex=>'<div class="wp-ex-item">'+annotateZh(ex)+'</div>').join('')
      : '<span class="wp-none">—</span>';
    vocabSec.style.display = '';
  } else {
    vocabSec.style.display = 'none';
  }

  // ── Position popup (measure after show) ──
  popup.style.left = '-9999px';
  popup.style.top = '-9999px';
  popup.style.display = 'block';
  const pw = popup.offsetWidth || 320;
  const ph = popup.offsetHeight || 300;
  const x = event.clientX, y = event.clientY;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x + 14;
  let top = y - Math.min(ph, vh*0.4);
  if(left+pw > vw-10) left = x - pw - 14;
  left = Math.max(10, Math.min(left, vw - pw - 10));
  if(top < 10) top = 10;
  if(top+ph > vh-10) top = vh - ph - 10;
  popup.style.left = left+'px';
  popup.style.top = top+'px';
  event.stopPropagation();
}

function closeWordPopup(){
  document.getElementById('wordPopup').style.display='none';
}

document.addEventListener('click', function(e){
  const popup = document.getElementById('wordPopup');
  if(popup && popup.style.display==='block' && !popup.contains(e.target)){
    popup.style.display='none';
  }
});
