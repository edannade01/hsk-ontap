<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK2 · Ôn Tập Buổi 1–15</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C0392B; --red-soft: #e74c3c; --red-bg: #fdf0ef;
  --b1: #2980B9; --b1-bg: #eaf4fb;
  --b2: #D35400; --b2-bg: #fef0e6;
  --b3: #27AE60; --b3-bg: #eafaf1;
  --b4: #8E44AD; --b4-bg: #f5eef8;
  --b5: #16A085; --b5-bg: #e8f8f5;
  --b6: #2980B9; --b6-bg: #eaf4fb;
  --b7: #D4AC0D; --b7-bg: #fef9e7;
  --b8: #D84315; --b8-bg: #fdf0ec;
  --b9: #AD1457; --b9-bg: #fce4ec;
  --b10: #00695C; --b10-bg: #e0f2f1;
  --b11: #4527A0; --b11-bg: #ede7f6;
  --b12: #0077B6; --b12-bg: #E1F5FE;
  --b13: #6D4C41; --b13-bg: #EFEBE9;
  --b14: #455A64; --b14-bg: #ECEFF1;
  --b15: #00ACC1; --b15-bg: #E0F7FA;
  --gold: #C9A227;
  --primary: #1565C0; --primary-bg: #EFF6FF;
  --bg: #f0f4f8; --surface: #FFFFFF; --surface2: #F4F6FA;
  --text: #1A1A2E; --text2: #666; --text3: #999;
  --border: #E2E8F0; --border2: #CBD5E1;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
  --shadow: 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  --radius: 16px; --radius-sm: 8px;
  --t1: #C0392B; --t2: #D35400; --t3: #27AE60; --t4: #2980B9; --tn: #888;
  --font-zh: 'Noto Serif SC', 'PingFang SC', 'Hiragino Sans GB', serif;
  --font: 'Inter', system-ui, sans-serif;
  --tab-h: 56px; --header-h: 64px;
}
.songs-layout{display:flex;gap:0;height:calc(100vh - 160px);overflow:hidden}
.songs-sidebar{width:220px;min-width:180px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.songs-sidebar-title{padding:14px 16px 10px;font-weight:700;font-size:.85rem;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border)}
.songs-list{flex:1;overflow-y:auto;padding:8px 0}
.song-item{padding:10px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.song-item:hover{background:var(--surface2)}
.song-item.active{background:var(--surface2);border-left-color:var(--accent)}
.song-item-title{font-size:.9rem;font-weight:600;color:var(--text)}
.song-item-artist{font-size:.75rem;color:var(--text2);margin-top:2px}
.songs-main{flex:1;overflow-y:auto;padding:20px 24px}
.songs-player{margin-bottom:20px}
.songs-meta h2{font-size:1.3rem;font-weight:700;color:var(--text);font-family:var(--font-zh);margin:0 0 4px}
.songs-meta p{font-size:.85rem;color:var(--text2);margin:0}
.songs-yt-wrap{border-radius:12px;overflow:hidden;box-shadow:var(--shadow);max-width:560px;margin-top:10px}
.songs-yt-wrap iframe{width:100%;height:315px;display:block;border:none}
.yt-thumb-wrap{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:12px;overflow:hidden;cursor:pointer}
.yt-thumb-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85}
.yt-play-btn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.yt-play-icon{width:64px;height:64px;background:#ff0000;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:.2s}
.yt-thumb-wrap:hover .yt-play-icon{background:#cc0000;transform:scale(1.1)}
.yt-play-icon svg{width:28px;height:28px;fill:#fff;margin-left:4px}
.yt-play-label{color:#fff;font-size:.8rem;font-weight:600;letter-spacing:.5px;text-shadow:0 1px 4px rgba(0,0,0,.8);background:rgba(0,0,0,.4);padding:4px 12px;border-radius:20px}
.yt-open-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:7px 16px;background:#ff0000;color:#fff;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;transition:.15s}
.yt-open-btn:hover{background:#cc0000}
.songs-empty{text-align:center;padding:60px 20px;color:var(--text2)}
.lyric-block{margin-top:8px}
.lyric-line{display:flex;flex-wrap:wrap;gap:4px 8px;margin-bottom:16px;align-items:flex-end}
.lyric-token{display:inline-flex;flex-direction:column;align-items:center;cursor:pointer;padding:4px 5px;border-radius:8px;transition:background .15s,transform .12s;user-select:none}
.lyric-token:hover{background:var(--surface2);transform:translateY(-3px)}
.lt-pin{font-size:.66rem;color:var(--text2);line-height:1.3;min-height:.9rem;text-align:center}
.lt-zh{font-family:var(--font-zh);font-size:1.45rem;line-height:1.2;color:var(--text)}
.lt-hv{font-size:.58rem;font-weight:600;color:var(--red);letter-spacing:.4px;text-align:center;opacity:.75;white-space:nowrap}
.lt-vn{font-size:.6rem;color:var(--text3);margin-top:1px;text-align:center;white-space:nowrap}
.lyric-line-sep{width:100%;height:1px;margin:2px 0 12px;border-top:1px dashed var(--border)}
.lyric-line-trans{width:100%;font-size:.88rem;color:var(--accent);font-style:italic;font-weight:500;padding:7px 12px 9px;margin-top:6px;line-height:1.6;background:var(--red-bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;letter-spacing:.01em}
[data-dark] .lyric-line-trans{background:rgba(255,255,255,.05)}
.word-popup{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);padding:20px 24px 18px;min-width:300px;max-width:380px;max-height:82vh;overflow-y:auto;text-align:center}
.word-popup-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:1rem;cursor:pointer;color:var(--text2);line-height:1}
.word-popup-close:hover{color:var(--text)}
.word-popup-zh{font-family:var(--font-zh);font-size:2.8rem;color:var(--text);line-height:1.1}
.word-popup-pin{font-size:1rem;color:var(--accent);margin-top:6px}
.word-popup-hv{display:inline-block;background:var(--surface2);color:var(--text2);font-size:.7rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 10px;border-radius:20px;margin:8px 0 4px}
.word-popup-vn{font-size:.95rem;color:var(--text);margin-top:4px}
.wp-divider{border:none;border-top:1px solid var(--border);margin:12px 0 10px}
.wp-section-label{font-size:.68rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);text-align:left;margin-bottom:8px}
.wp-strokes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:2px}
.wp-stroke-char{width:80px;height:80px;flex-shrink:0}
.wp-comp-text{font-size:.88rem;color:var(--text);line-height:1.6;text-align:left;display:block}
.wp-none{color:var(--text2);font-size:.85rem}
.wp-ex-item{font-size:.82rem;color:var(--text);text-align:left;padding:5px 0;border-bottom:1px solid var(--border);line-height:1.6}
.wp-ex-item:last-child{border-bottom:none}
@media(max-width:640px){.songs-layout{flex-direction:column;height:auto}.songs-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}.songs-sidebar-title{cursor:pointer;display:flex;align-items:center;justify-content:space-between}.songs-list-chevron{display:inline-block;transition:.3s;font-size:.9rem}.songs-sidebar.expanded .songs-list-chevron{transform:rotate(180deg)}.songs-list{max-height:260px;overflow-y:auto;transition:max-height .25s ease}.songs-sidebar.expanded .songs-list{max-height:600px}.lt-zh{font-size:1.15rem}}
[data-dark] {
  --bg: #0F0F18; --surface: #1C1C2E; --surface2: #252538;
  --primary-bg: #1a2a4a;
  --text: #F0F0F0; --text2: #AAA; --text3: #666;
  --border: #2C2C3E; --border2: #3A3A50;
  --red-bg: #2a1015; --b1-bg: #0f1f2e; --b2-bg: #2a1800; --b3-bg: #0f2a18; --b4-bg: #2a1535; --b5-bg: #0a2520;
  --b6-bg: #0f1e2e;
  --b7-bg: #2d2700;
  --b8-bg: #2d1205;
  --b9-bg: #3a0a1e;
  --b10-bg: #002b26;
  --b11-bg: #1a0a3a;
  --b12-bg: #002a3a;
  --b13-bg: #2a1f1a;
  --b14-bg: #1c2429;
  --b15-bg: #002b30;
  --shadow: 0 4px 16px rgba(0,0,0,.3);
}
[data-dark] header{background:var(--surface);border-bottom-color:var(--border)}
[data-dark] .tabs{background:var(--surface)}
[data-dark] .icon-btn{border-color:var(--border);background:var(--surface2);color:var(--text2)}
[data-dark] .progress-pill{background:var(--primary-bg);border-color:#1e3a6e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:#fff;z-index:100;display:flex;align-items:center;padding:0 20px;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-bottom:1px solid var(--border)}
.logo{font-family:var(--font-zh);color:var(--text);font-size:1.2rem;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.logo span{color:var(--text3);font-weight:400;font-size:.85rem;margin-left:2px}
header .spacer{flex:1}
.progress-pill{background:var(--primary-bg);border-radius:20px;padding:5px 14px;color:var(--primary);font-size:.8rem;display:flex;align-items:center;gap:6px;border:1px solid #BFDBFE;font-weight:500}
.progress-pill b{font-size:1rem;color:var(--primary)}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:.2s}
.icon-btn:hover{background:var(--border);color:var(--text)}

/* TABS */
.tabs{position:fixed;top:var(--header-h);left:0;right:0;height:var(--tab-h);background:#fff;border-bottom:1px solid var(--border);z-index:99;display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:none;padding:0 20px;height:100%;border:none;background:none;cursor:pointer;color:var(--text2);font-family:var(--font);font-size:.88rem;font-weight:500;display:flex;align-items:center;gap:7px;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;position:relative}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-btn:hover:not(.active){color:var(--text)}

/* MAIN */
main{margin-top:calc(var(--header-h) + var(--tab-h));padding:24px 20px;max-width:1100px;margin-left:auto;margin-right:auto}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* FILTERS */
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-input{width:100%;flex-basis:100%;padding:11px 20px;border:1.5px solid var(--border);border-radius:24px;background:var(--surface);color:var(--text);font-family:var(--font);font-size:.9rem;outline:none;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(21,101,192,.1)}
.badge-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:.8rem;font-weight:500;cursor:pointer;transition:.2s}
.badge-btn:hover,.badge-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.badge-btn.b1.active{background:var(--b1);border-color:var(--b1)}
.badge-btn.b2.active{background:var(--b2);border-color:var(--b2)}
.badge-btn.b3.active{background:var(--b3);border-color:var(--b3)}
.badge-btn.b4.active{background:var(--b4);border-color:var(--b4)}
.badge-btn.b5.active{background:var(--b5);border-color:var(--b5)}
.badge-btn.b6{border-color:var(--b6);color:var(--b6)}
.badge-btn.b6.active{background:var(--b6);border-color:var(--b6);color:#fff}
.badge-btn.b7{border-color:var(--b7);color:var(--b7)}
.badge-btn.b7.active{background:var(--b7);border-color:var(--b7);color:#3d2e00}
.badge-btn.b8{border-color:var(--b8);color:var(--b8)}
.badge-btn.b8.active{background:var(--b8);border-color:var(--b8);color:#fff}
.badge-btn.b9{border-color:var(--b9);color:var(--b9)}
.badge-btn.b9.active{background:var(--b9);border-color:var(--b9);color:#fff}
.badge-btn.b10{border-color:var(--b10);color:var(--b10)}
.badge-btn.b10.active{background:var(--b10);border-color:var(--b10);color:#fff}
.badge-btn.b11{border-color:var(--b11);color:var(--b11)}
.badge-btn.b11.active{background:var(--b11);border-color:var(--b11);color:#fff}
.badge-btn.b12{border-color:var(--b12);color:var(--b12)}
.badge-btn.b12.active{background:var(--b12);border-color:var(--b12);color:#fff}
.badge-btn.b13{border-color:var(--b13);color:var(--b13)}
.badge-btn.b13.active{background:var(--b13);border-color:var(--b13);color:#fff}
.badge-btn.b14{border-color:var(--b14);color:var(--b14)}
.badge-btn.b14.active{background:var(--b14);border-color:var(--b14);color:#fff}
.badge-btn.b15{border-color:var(--b15);color:var(--b15)}
.badge-btn.b15.active{background:var(--b15);border-color:var(--b15);color:#fff}

/* VOCAB GRID */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.vocab-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;overflow:hidden;transition:transform .18s,box-shadow .18s;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.vocab-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.vocab-card.known{border-color:#27AE60;background:linear-gradient(135deg,var(--surface),#f0faf4)}
[data-dark] .vocab-card.known{background:linear-gradient(135deg,var(--surface),#0f2a18)}
.card-bai{position:absolute;top:10px;right:10px;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.bai-1{background:var(--b1-bg);color:var(--b1)}
.bai-2{background:var(--b2-bg);color:var(--b2)}
.bai-3{background:var(--b3-bg);color:var(--b3)}
.bai-4{background:var(--b4-bg);color:var(--b4)}
.bai-5{background:var(--b5-bg);color:var(--b5)}
.bai-6{background:var(--b6-bg);color:var(--b6)}
.bai-7{background:var(--b7-bg);color:var(--b7)}
.bai-8{background:var(--b8-bg);color:var(--b8)}
.bai-9{background:var(--b9-bg);color:var(--b9)}
.bai-10{background:var(--b10-bg);color:var(--b10)}
.bai-11{background:var(--b11-bg);color:var(--b11)}
.bai-12{background:var(--b12-bg);color:var(--b12)}
.bai-13{background:var(--b13-bg);color:var(--b13)}
.bai-14{background:var(--b14-bg);color:var(--b14)}
.bai-15{background:var(--b15-bg);color:var(--b15)}
.known-badge{position:absolute;top:10px;left:10px;font-size:.7rem;background:#27AE60;color:#fff;padding:2px 7px;border-radius:10px;display:none}
.vocab-card.known .known-badge{display:block}
.card-front{padding:18px 18px 14px}
.hanzi-text{font-family:var(--font-zh);font-size:2.4rem;font-weight:700;line-height:1;color:var(--text);display:block;margin-bottom:6px}
.pinyin-text{font-size:.95rem;color:var(--text2);letter-spacing:.5px;margin-bottom:4px}
.hanviet-text{font-size:.7rem;font-weight:600;letter-spacing:1.5px;color:var(--red);text-transform:uppercase;opacity:.8}
.meaning-text{font-size:.85rem;color:var(--text);padding:10px 18px;border-top:1px solid var(--border);background:var(--surface2)}
.card-expanded{padding:14px 18px;border-top:1px solid var(--border);display:none}
.vocab-card.open .card-expanded{display:block}
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
.component-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.component-item{display:flex;align-items:flex-start;gap:8px}
.comp-char{font-family:var(--font-zh);font-size:1.4rem;font-weight:700;color:var(--red);min-width:30px;line-height:1}
.comp-explain{font-size:.8rem;color:var(--text2);line-height:1.4}
.examples-list{display:flex;flex-direction:column;gap:8px}
.example-item{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;border-left:3px solid var(--b1)}
.bai-2-ex .example-item{border-left-color:var(--b2)}
.bai-3-ex .example-item{border-left-color:var(--b3)}
.bai-4-ex .example-item{border-left-color:var(--b4)}
.bai-5-ex .example-item{border-left-color:var(--b5)}
.bai-6-ex .example-item{border-left-color:var(--b6)}
.bai-7-ex .example-item{border-left-color:var(--b7)}
.bai-8-ex .example-item{border-left-color:var(--b8)}
.bai-9-ex .example-item{border-left-color:var(--b9)}
.bai-10-ex .example-item{border-left-color:var(--b10)}
.bai-11-ex .example-item{border-left-color:var(--b11)}
.bai-12-ex .example-item{border-left-color:var(--b12)}
.bai-13-ex .example-item{border-left-color:var(--b13)}
.bai-14-ex .example-item{border-left-color:var(--b14)}
.bai-15-ex .example-item{border-left-color:var(--b15)}
.ex-zh{font-family:var(--font-zh);font-size:.9rem;color:var(--text);font-weight:500}
.ex-pin{font-size:.75rem;margin-top:2px;margin-bottom:2px;letter-spacing:.3px;line-height:1.4}
.ex-vn{font-size:.8rem;color:var(--text2);margin-top:2px}
.comp-pin{font-size:.65rem;text-align:center;margin-top:2px;letter-spacing:.5px}
.card-actions{display:flex;gap:8px;margin-top:12px}
.btn-know,.btn-review{flex:1;padding:8px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:.8rem;font-weight:600;transition:.2s}
.btn-know{background:#27AE60;color:#fff}
.btn-know:hover{background:#219a52}
.btn-review{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-review:hover{background:var(--border)}

/* WORD EXTENSION TAGS */
.expand-section{margin-top:10px}
.expand-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.expand-label.syn{color:#1a8a4a}
.expand-label.ant{color:var(--red)}
.expand-label.rel{color:var(--b1)}
.word-tags{display:flex;flex-wrap:wrap;gap:5px}
.word-tag{display:inline-flex;flex-direction:column;padding:5px 10px;border-radius:8px;cursor:default;line-height:1.3}
.word-tag .tag-zh{font-family:var(--font-zh);font-size:.95rem;font-weight:600}
.word-tag .tag-pin{font-size:.65rem;letter-spacing:.3px;margin-top:1px;opacity:.9}
.word-tag .tag-hv{font-size:.6rem;font-weight:700;letter-spacing:1px;opacity:.65;text-transform:uppercase;margin-top:1px}
.word-tag .tag-vn{font-size:.68rem;opacity:.75;margin-top:2px;border-top:1px solid rgba(0,0,0,.07);padding-top:2px}
.word-tag.syn{background:#eafaf1;color:#1a7a42;border:1px solid #b2dfcb}
.word-tag.ant{background:var(--red-bg);color:#9b1e15;border:1px solid #f5c6c3}
.word-tag.rel{background:var(--b1-bg);color:var(--b1);border:1px solid #aed6f1}
[data-dark] .word-tag.syn{background:#0f2a18;color:#5dba7d;border-color:#1e5c35}
[data-dark] .word-tag.ant{background:#2a1015;color:#e8796f;border-color:#5c1a1a}
[data-dark] .word-tag.rel{background:#0f1f2e;color:#5aade8;border-color:#1a3a5c}
/* COMPONENT LEFT BLOCK */
.comp-left{display:flex;flex-direction:column;align-items:center;min-width:44px;gap:1px}
.comp-hv{font-size:.58rem;font-weight:700;letter-spacing:1px;color:var(--red);opacity:.7;text-transform:uppercase;text-align:center}
/* GRAMMAR EXTENSION */
.grammar-ext{margin-top:12px;padding:10px 12px;border-radius:8px}
.grammar-ext.rel{background:var(--b1-bg);border-left:3px solid var(--b1)}
.grammar-ext.err{background:var(--red-bg);border-left:3px solid var(--red)}
[data-dark] .grammar-ext.rel{background:var(--b1-bg)}
[data-dark] .grammar-ext.err{background:var(--red-bg)}
.grammar-ext-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.grammar-ext-label.rel{color:var(--b1)}
.grammar-ext-label.err{color:var(--red)}
.grammar-ext-text{font-size:.82rem;color:var(--text2);line-height:1.6}
.grammar-rel-zh{font-family:var(--font-zh);font-size:.95rem;color:var(--text)}
.grammar-rel-pin{font-size:.78rem;color:var(--text2)}
.grammar-rel-hv{font-size:.68rem;font-weight:700;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;background:var(--surface2);padding:1px 5px;border-radius:4px}
.zh-ann-pin{font-size:.72rem;color:var(--text2);margin-left:1px}
.grammar-rel-item{margin-top:8px;padding:6px 8px;background:var(--surface2);border-radius:6px}
.grammar-rel-desc{font-size:.8rem;color:var(--text2);margin-top:2px}

/* FLASHCARD */
.fc-container{max-width:520px;margin:0 auto}
.fc-progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden}
.fc-progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .4s}
.fc-stats{display:flex;justify-content:space-between;margin-bottom:16px;font-size:.85rem;color:var(--text2)}
.fc-stats span{display:flex;align-items:center;gap:5px}
.fc-stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-know{background:#27AE60}
.dot-review{background:#E67E22}
.fc-scene{perspective:1000px;height:360px;margin-bottom:20px;cursor:pointer}
.fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.fc-scene.flipped .fc-card{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.fc-back{transform:rotateY(180deg);justify-content:flex-start;overflow-y:auto}
.fc-front-hanzi{font-family:var(--font-zh);font-size:5rem;font-weight:700;color:var(--text);line-height:1;text-align:center}
.fc-front-bai{margin-top:12px;font-size:.75rem;padding:3px 12px;border-radius:12px;font-weight:600}
.fc-hint{font-size:.8rem;color:var(--text3);margin-top:20px}
.fc-back-pinyin{font-size:1.4rem;color:var(--text2);margin-bottom:4px;font-weight:300;letter-spacing:1px}
.fc-back-hanviet{font-size:.7rem;font-weight:700;letter-spacing:2px;color:var(--red);margin-bottom:12px}
.fc-back-meaning{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:16px;text-align:center}
.fc-divider{width:100%;height:1px;background:var(--border);margin:12px 0}
.fc-component-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px;background:var(--surface2);border-radius:8px}
.fc-comp-char{font-family:var(--font-zh);font-size:1.6rem;color:var(--red);font-weight:700;min-width:36px}
.fc-comp-text{font-size:.78rem;color:var(--text2);line-height:1.4}
.fc-ex{background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:6px;width:100%}
.fc-ex-zh{font-family:var(--font-zh);font-size:.95rem;color:var(--text)}
.fc-ex-vn{font-size:.78rem;color:var(--text2);margin-top:3px}
.fc-btns{display:flex;gap:12px}
.btn-lg{flex:1;padding:14px;border-radius:var(--radius);border:none;cursor:pointer;font-size:.95rem;font-weight:600;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-know-lg{background:#27AE60;color:#fff}
.btn-know-lg:hover{background:#219a52}
.btn-review-lg{background:#E67E22;color:#fff}
.btn-review-lg:hover{background:#ca6a1a}
.fc-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.fc-nav-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:1.1rem;transition:.2s}
.fc-nav-btn:hover{border-color:var(--red);color:var(--red)}
.fc-counter{font-size:.85rem;color:var(--text2)}
.fc-filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

/* QUIZ */
.quiz-container{max-width:600px;margin:0 auto}
.quiz-mode-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.mode-btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:.8rem;font-weight:500;cursor:pointer;transition:.2s}
.mode-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.quiz-score{display:flex;gap:20px;margin-bottom:20px}
.score-item{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1.5px solid var(--border)}
.score-num{font-size:1.8rem;font-weight:700}
.score-num.correct{color:#27AE60}
.score-num.wrong{color:var(--red)}
.score-label{font-size:.75rem;color:var(--text2)}
.quiz-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:28px;margin-bottom:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.quiz-question-zh{font-family:var(--font-zh);font-size:3.5rem;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1}
.quiz-question-vn{font-size:1.1rem;color:var(--text);font-weight:500;margin-bottom:4px}
.quiz-question-pin{font-size:1rem;color:var(--text2)}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-opt{padding:14px 16px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:.9rem;cursor:pointer;text-align:left;transition:.2s;line-height:1.4}
.quiz-opt:hover:not(:disabled){border-color:var(--red);background:var(--red-bg)}
.quiz-opt.correct{background:#eafaf1;border-color:#27AE60;color:#1a7a42}
.quiz-opt.wrong{background:#fdf0ef;border-color:var(--red);color:var(--red)}
.quiz-opt:disabled{cursor:default}
.quiz-opt .opt-zh{font-family:var(--font-zh);font-size:1.1rem;font-weight:600;display:block;margin-bottom:2px}
.quiz-feedback{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:.9rem;display:none}
.quiz-feedback.correct{background:#eafaf1;border:1px solid #27AE60;color:#1a7a42}
.quiz-feedback.wrong{background:#fdf0ef;border:1px solid var(--red);color:var(--red)}
.quiz-next{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.95rem;font-weight:600;cursor:pointer;display:none;transition:.2s}
.quiz-next:hover{background:var(--red-soft)}

/* GRAMMAR */
.grammar-grid{display:flex;flex-direction:column;gap:14px}
.grammar-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.grammar-header{padding:16px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.grammar-title{font-size:.95rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px}
.grammar-pattern{font-family:var(--font-zh);font-size:.9rem;color:var(--red);background:var(--red-bg);padding:3px 10px;border-radius:6px}
.grammar-chevron{color:var(--text3);transition:.3s;font-size:.9rem}
.grammar-card.open .grammar-chevron{transform:rotate(180deg)}
.grammar-body{display:none;padding:0 18px 18px}
.grammar-card.open .grammar-body{display:block}
.grammar-desc{font-size:.85rem;color:var(--text2);margin-bottom:12px;line-height:1.6}
.grammar-examples{display:flex;flex-direction:column;gap:8px}
.grammar-ex{background:var(--surface2);border-radius:8px;padding:10px 12px;border-left:3px solid var(--red)}
.grammar-ex-zh{font-family:var(--font-zh);font-size:.95rem;color:var(--text);font-weight:500}
.grammar-ex-vn{font-size:.8rem;color:var(--text2);margin-top:3px}
.grammar-tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600;letter-spacing:.5px;background:var(--b1-bg);color:var(--b1)}
.grammar-tag.b2{background:var(--b2-bg);color:var(--b2)}
.grammar-tag.b3{background:var(--b3-bg);color:var(--b3)}
.grammar-tag.b4{background:var(--b4-bg);color:var(--b4)}
.grammar-tag.b5{background:var(--b5-bg);color:var(--b5)}
.grammar-tag.b6{background:var(--b6-bg);color:var(--b6)}
.grammar-tag.b7{background:var(--b7-bg);color:var(--b7)}
.grammar-tag.b8{background:var(--b8-bg);color:var(--b8)}
.grammar-tag.b9{background:var(--b9-bg);color:var(--b9)}
.grammar-tag.b10{background:var(--b10-bg);color:var(--b10)}
.grammar-tag.b11{background:var(--b11-bg);color:var(--b11)}
.grammar-tag.b12{background:var(--b12-bg);color:var(--b12)}
.grammar-tag.b13{background:var(--b13-bg);color:var(--b13)}
.grammar-tag.b14{background:var(--b14-bg);color:var(--b14)}
.grammar-tag.b15{background:var(--b15-bg);color:var(--b15)}

/* COMPARE */
.compare-grid{display:flex;flex-direction:column;gap:20px}
.compare-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.compare-title{padding:14px 18px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.compare-title .vs{color:var(--text3);font-weight:400;margin:0 4px}
.compare-cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:var(--border)}
.compare-col{background:var(--surface);padding:16px}
.compare-col-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.compare-hanzi{font-family:var(--font-zh);font-size:2rem;font-weight:700;color:var(--text)}
.compare-pin{font-size:.8rem;color:var(--text2)}
.compare-meaning{font-size:.85rem;color:var(--text);margin-bottom:10px;font-weight:500}
.compare-rule{font-size:.78rem;color:var(--text2);line-height:1.5;margin-bottom:8px;padding:6px 8px;background:var(--surface2);border-radius:6px}
.compare-ex{font-family:var(--font-zh);font-size:.85rem;color:var(--text);margin-top:4px}
.compare-ex-vn{font-size:.75rem;color:var(--text2)}
.highlight-red{color:var(--red);font-weight:700}
.highlight-b1{color:var(--b1);font-weight:700}
.highlight-b3{color:var(--b3);font-weight:700}

/* EXERCISES (BÀI TẬP) */
.exercise-grid{display:flex;flex-direction:column;gap:14px}
.exercise-bai-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.exercise-bai-header{padding:16px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px}
.exercise-bai-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px}
.exercise-bai-chevron{color:var(--text3);transition:.3s;font-size:.9rem}
.exercise-bai-card.open .exercise-bai-chevron{transform:rotate(180deg)}
.exercise-bai-body{display:none;padding:0 18px 18px}
.exercise-bai-card.open .exercise-bai-body{display:block}
.exercise-section{margin-top:16px}
.exercise-section-title{font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.exercise-bank{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.exercise-bank-item{font-family:var(--font-zh);font-size:.85rem;padding:4px 10px;background:var(--surface2);border-radius:6px;color:var(--text);border:1px solid var(--border)}
.exercise-item{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px}
.exercise-item:last-child{margin-bottom:0}
.exercise-q{font-size:.9rem;color:var(--text);margin-bottom:8px;line-height:1.7}
.exercise-q .qzh,.exercise-q.qzh{font-family:var(--font-zh)}
.exercise-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:.85rem;font-family:var(--font);background:var(--surface);color:var(--text);margin-bottom:8px;resize:vertical;min-height:70px;box-sizing:border-box}
.exercise-reveal-btn{padding:6px 14px;border-radius:16px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:.78rem;cursor:pointer;font-weight:600;transition:.2s}
.exercise-reveal-btn:hover{background:var(--red);color:#fff}
.exercise-answer{display:none;margin-top:10px;padding:10px 12px;background:var(--surface);border-left:3px solid #27AE60;border-radius:8px}
.exercise-answer.show{display:block}
.exercise-answer-zh{font-family:var(--font-zh);font-size:.95rem;color:var(--text);font-weight:500}
.exercise-answer-pin{font-size:.75rem;margin-top:2px;letter-spacing:.3px;line-height:1.5}
.exercise-answer-vn{font-size:.8rem;color:var(--text2);margin-top:3px}
.exercise-answer-hv{font-size:.65rem;font-weight:700;letter-spacing:1px;color:var(--red);text-transform:uppercase;margin-left:4px}
.exercise-mc-opts{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.exercise-mc-opt{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-zh);font-size:.9rem;cursor:pointer;text-align:left;transition:.2s}
.exercise-mc-opt:hover:not(:disabled){border-color:var(--red);background:var(--red-bg)}
.exercise-mc-opt.correct{background:#eafaf1;border-color:#27AE60;color:#1a7a42}
.exercise-mc-opt.wrong{background:#fdf0ef;border-color:var(--red);color:var(--red)}
.exercise-mc-opt:disabled{cursor:default}
.exercise-tf-btns{display:flex;gap:8px;margin-top:8px}
.exercise-tf-btn{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:.85rem;cursor:pointer;font-weight:600;transition:.2s}
.exercise-tf-btn:hover:not(:disabled){border-color:var(--red)}
.exercise-tf-btn.correct{background:#eafaf1;border-color:#27AE60;color:#1a7a42}
.exercise-tf-btn.wrong{background:#fdf0ef;border-color:var(--red);color:var(--red)}
.exercise-tf-btn:disabled{cursor:default}
.exercise-passage{background:var(--surface);border-radius:8px;padding:12px 14px;margin-bottom:12px;border-left:3px solid var(--b1)}
.exercise-passage-zh{font-family:var(--font-zh);font-size:.95rem;color:var(--text);line-height:1.9}
.exercise-passage-pin{font-size:.78rem;color:var(--text2);margin-top:8px;line-height:1.8;display:none}
.exercise-passage-vn{font-size:.82rem;color:var(--text2);margin-top:8px;display:none}
.exercise-passage-pin.show,.exercise-passage-vn.show{display:block}
.exercise-passage-toggle{margin-top:8px;display:flex;gap:8px}
.exercise-blank{display:inline-block;min-width:36px;padding:0 4px;border-bottom:2px solid var(--red);text-align:center;color:var(--red);font-weight:700}
.exercise-correct-wrong{font-family:var(--font-zh);font-size:.95rem;color:var(--red);text-decoration:line-through;margin-bottom:4px}
.exercise-example-label{font-size:.7rem;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}

/* EXERCISES - INTERACTIVE (drag & drop / type & check) */
.exercise-word-bank{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.exercise-word-chip{font-family:var(--font-zh);font-size:.85rem;padding:5px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);cursor:grab;user-select:none;transition:.15s}
.exercise-word-chip:hover{border-color:var(--red);background:var(--red-bg)}
.exercise-word-chip.used{opacity:.35;cursor:default;pointer-events:none}
.exercise-word-chip.dragging{opacity:.4}
.exercise-blank-input{display:inline-block;width:64px;text-align:center;border:none;border-bottom:2px solid var(--border);background:transparent;font-family:var(--font-zh);font-size:.95rem;color:var(--text);padding:2px 4px;margin:0 2px;border-radius:4px;transition:.15s}
.exercise-blank-input:focus{outline:none;border-bottom-color:var(--red);background:var(--red-bg)}
.exercise-blank-input.drop-hover{background:var(--red-bg)}
.exercise-blank-input.correct{border-bottom-color:#27AE60;background:#eafaf1;color:#1a7a42}
.exercise-blank-input.wrong{border-bottom-color:var(--red);background:#fdf0ef;color:var(--red)}
.exercise-line-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:.9rem;background:var(--surface);color:var(--text);margin-bottom:8px;box-sizing:border-box;transition:.15s}
.exercise-line-input:focus{outline:none;border-color:var(--red)}
.exercise-line-input.correct{border-color:#27AE60;background:#eafaf1}
.exercise-line-input.wrong{border-color:var(--red);background:#fdf0ef}
.exercise-check-btn{padding:6px 14px;border-radius:16px;border:none;background:var(--red);color:#fff;font-size:.78rem;cursor:pointer;font-weight:600;transition:.2s}
.exercise-check-btn:hover{background:var(--red-soft)}
.exercise-reset-btn{padding:6px 14px;border-radius:16px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:.78rem;cursor:pointer;font-weight:600;transition:.2s}
.exercise-reset-btn:hover{border-color:var(--text2)}
.exercise-section-footer{display:flex;align-items:center;gap:8px;margin:8px 0;flex-wrap:wrap}
.exercise-result{font-size:.78rem;font-weight:700}
.exercise-result.ok{color:#27AE60}
.exercise-result.bad{color:var(--red)}
.exercise-order-area{min-height:46px;border:2px dashed var(--border);border-radius:8px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;transition:.2s}
.exercise-order-area.correct{border-color:#27AE60;background:#eafaf1}
.exercise-order-area.wrong{border-color:var(--red);background:#fdf0ef}
.exercise-order-area .exercise-word-chip{cursor:pointer}
.exercise-order-pool{display:flex;flex-wrap:wrap;gap:6px}
.ex-word{cursor:pointer;border-bottom:1.5px solid var(--primary);border-radius:3px;transition:.15s}
.ex-word:hover{background:var(--primary-bg);color:var(--primary)}

/* RESPONSIVE */
@media(max-width:600px){
  .vocab-grid{grid-template-columns:1fr}
  .quiz-options{grid-template-columns:1fr}
  .hanzi-text{font-size:2rem}
  .fc-front-hanzi{font-size:3.5rem}
  main{padding:14px}
  header{padding:0 12px;gap:6px}
  .logo{font-size:1rem}
  .logo span{display:none}
  .progress-pill{font-size:.7rem;padding:4px 8px;gap:4px}
  .progress-pill b{font-size:.85rem}
  .icon-btn{width:32px;height:32px;font-size:.9rem}
  .tab-btn{padding:0 14px;font-size:.8rem;gap:5px}
  .grammar-header{align-items:flex-start}
  .grammar-title{flex-wrap:wrap;flex:1;min-width:0}
  .grammar-tag,.grammar-pattern{white-space:nowrap;flex-shrink:0}
}

/* ANIMATIONS */
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tab-panel.active{animation:slideIn .2s ease}
@keyframes pop{0%{transform:scale(.97)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.quiz-opt.correct,.quiz-opt.wrong{animation:pop .25s ease}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:3rem;display:block;margin-bottom:12px}

/* TOOLTIP */
.tip{position:relative}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:.7rem;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:.2s}
.tip:hover::after{opacity:1}
/* Simple vocab card */
/* Hanzi Writer */
.btn-stroke{margin-top:8px;background:transparent;border:1.5px solid var(--red);color:var(--red);border-radius:20px;padding:4px 14px;font-size:.75rem;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:4px}
.btn-stroke:hover{background:var(--red);color:#fff}
.stroke-area{display:none;justify-content:center;align-items:center;gap:16px;padding:12px 0 4px;border-top:1px solid var(--border);margin-top:8px}
.stroke-area.active{display:flex}
.stroke-char-box svg{display:block}

.btn-speak{background:none;border:1.5px solid var(--border);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:.2s;color:var(--text2);flex-shrink:0;padding:0}

.fc-speak-btn{margin-top:14px;padding:9px 22px;border-radius:24px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:.85rem;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;transition:.2s;font-weight:500}

  {id:197,bai:10,hanzi:"出汗",pinyin:"chūhàn",hanviet:"XUẤT HÃN",meaning:"ra mồ hôi",components:[{char:"出",pin:"chū",hanviet:"XUẤT",explain:"出(chū,bộ Xuất) → đi ra ngoài = ra, xuất"},{char:"汗",pin:"hàn",hanviet:"HÃN",explain:"氵(shuǐ,bộ Thủy-nước)+干(gān,khô) → nước tiết ra từ cơ thể = mồ hôi"}],examples:[{zh:"天气太热了，我走了一会儿就出汗了。",pin:"Tiānqì tài rè le, wǒ zǒu le yīhuìr jiù chūhàn le.",vn:"Thời tiết quá nóng, tôi đi một lúc đã ra mồ hôi rồi."},{zh:"运动的时候出汗是正常的现象。",pin:"Yùndòng de shíhou chūhàn shì zhèngcháng de xiànxiàng.",vn:"Khi vận động ra mồ hôi là hiện tượng bình thường."}],synonyms:[],antonyms:[],related:[{zh:"汗水",pin:"hànshuǐ",hanviet:"HÃN THỦY",vn:"mồ hôi (danh từ)"},{zh:"流汗",pin:"liúhàn",hanviet:"LƯU HÃN",vn:"đổ mồ hôi"}]},
  {id:198,bai:10,hanzi:"刷牙",pinyin:"shuāyá",hanviet:"LOÁT NHA",meaning:"đánh răng",components:[{char:"刷",pin:"shuā",hanviet:"LOÁT",explain:"刀(dāo,bộ Đao-dao)+帀(zā,quanh) → cọ xát = chải, đánh"},{char:"牙",pin:"yá",hanviet:"NHA",explain:"牙(yá,tượng hình răng) → răng"}],examples:[{zh:"每天早晚都要刷牙，这是好习惯。",pin:"Měi tiān zǎo wǎn dōu yào shuāyá, zhè shì hǎo xíguàn.",vn:"Mỗi ngày sáng tối đều phải đánh răng, đây là thói quen tốt."},{zh:"饭后刷牙对牙齿很有好处。",pin:"Fàn hòu shuāyá duì yáchǐ hěn yǒu hǎochù.",vn:"Đánh răng sau bữa ăn rất có lợi cho răng."}],synonyms:[],antonyms:[],related:[{zh:"刷牙洗脸",pin:"shuāyá xǐliǎn",hanviet:"LOÁT NHA TẨY KIỂM",vn:"đánh răng rửa mặt"},{zh:"牙刷",pin:"yáshuā",hanviet:"NHA LOÁT",vn:"bàn chải đánh răng"}]},
  {id:199,bai:10,hanzi:"作业",pinyin:"zuòyè",hanviet:"TÁC NGHIỆP",meaning:"bài tập (về nhà)",components:[{char:"作",pin:"zuò",hanviet:"TÁC",explain:"人(rén,người)+乍(zhà,đột ngột) → người làm việc = làm, tạo ra"},{char:"业",pin:"yè",hanviet:"NGHIỆP",explain:"业(yè,tượng hình trống nhạc) → sự nghiệp, công việc"}],examples:[{zh:"老师留了很多作业，我今晚要做到很晚。",pin:"Lǎoshī liú le hěn duō zuòyè, wǒ jīn wǎn yào zuò dào hěn wǎn.",vn:"Thầy giao rất nhiều bài tập, tối nay tôi phải làm đến rất khuya."},{zh:"做完作业以后，才能去看电视。",pin:"Zuòwán zuòyè yǐhòu, cái néng qù kàn diànshì.",vn:"Làm xong bài tập mới được đi xem tivi."}],synonyms:[{zh:"功课",pin:"gōngkè",hanviet:"CÔNG KHÓA",vn:"bài tập về nhà"}],antonyms:[],related:[{zh:"做作业",pin:"zuò zuòyè",hanviet:"TÁC TÁC NGHIỆP",vn:"làm bài tập"},{zh:"交作业",pin:"jiāo zuòyè",hanviet:"GIAO TÁC NGHIỆP",vn:"nộp bài tập"}]},
  {id:200,bai:10,hanzi:"然后",pinyin:"ránhòu",hanviet:"NHIÊN HẬU",meaning:"sau đó, rồi thì",components:[{char:"然",pin:"rán",hanviet:"NHIÊN",explain:"火(huǒ,lửa)+犬(quǎn,chó)+月(yuè,thịt) → như vậy, nhiên"},{char:"后",pin:"hòu",hanviet:"HẬU",explain:"彳(chì,bộ Xích)+口(kǒu,miệng)+一(yī,một) → đi sau = sau, phía sau"}],examples:[{zh:"我先洗澡，然后吃晚饭，最后复习功课。",pin:"Wǒ xiān xǐzǎo, ránhòu chī wǎnfàn, zuìhòu fùxí gōngkè.",vn:"Tôi tắm trước, sau đó ăn tối, cuối cùng ôn bài."},{zh:"到了上海以后，然后我们去了深圳。",pin:"Dào le Shànghǎi yǐhòu, ránhòu wǒmen qù le Shēnzhèn.",vn:"Đến Thượng Hải rồi, sau đó chúng tôi đến Thâm Quyến."}],synonyms:[{zh:"之后",pin:"zhīhòu",hanviet:"CHI HẬU",vn:"sau đó (văn viết)"}],antonyms:[{zh:"之前",pin:"zhīqián",hanviet:"CHI TIỀN",vn:"trước đó"}],related:[{zh:"首先",pin:"shǒuxiān",hanviet:"THỦ TIÊN",vn:"đầu tiên"},{zh:"最后",pin:"zuìhòu",hanviet:"TỐI HẬU",vn:"cuối cùng"}]},
  {id:201,bai:10,hanzi:"首先",pinyin:"shǒuxiān",hanviet:"THỦ TIÊN",meaning:"đầu tiên, trước hết",components:[{char:"首",pin:"shǒu",hanviet:"THỦ",explain:"首(shǒu,tượng hình đầu người) → đầu, đứng đầu"},{char:"先",pin:"xiān",hanviet:"TIÊN",explain:"人(rén,người)+儿(ér,chân)+土(tǔ,đất) → người đi trước = trước, tiên"}],examples:[{zh:"首先我们去上海，然后去深圳，最后回国。",pin:"Shǒuxiān wǒmen qù Shànghǎi, ránhòu qù Shēnzhèn, zuìhòu huí guó.",vn:"Đầu tiên chúng tôi đến Thượng Hải, sau đó đến Thâm Quyến, cuối cùng về nước."},{zh:"做菜首先要准备好食材。",pin:"Zuò cài shǒuxiān yào zhǔnbèi hǎo shícái.",vn:"Nấu ăn trước hết phải chuẩn bị đầy đủ nguyên liệu."}],synonyms:[{zh:"第一",pin:"dìyī",hanviet:"ĐỆ NHẤT",vn:"thứ nhất, đầu tiên"}],antonyms:[],related:[{zh:"然后",pin:"ránhòu",hanviet:"NHIÊN HẬU",vn:"sau đó"},{zh:"最后",pin:"zuìhòu",hanviet:"TỐI HẬU",vn:"cuối cùng"}]},

  {id:206,bai:10,hanzi:"精神",pinyin:"jīngshen",hanviet:"TINH THẦN",meaning:"tinh thần; tươi tỉnh",components:[{char:"精",pin:"jīng",hanviet:"TINH",explain:"米(mǐ,bộ Mễ-gạo)+青(qīng,xanh) → tinh chất của gạo = tinh tuý, tinh thần"},{char:"神",pin:"shén",hanviet:"THẦN",explain:"礻(shì,bộ Thị-thần)+申(shēn,sấm) → thần linh = thần, tinh thần"}],examples:[{zh:"睡了一个好觉之后，精神好多了。",pin:"Shuì le yī gè hǎo jiào zhīhòu, jīngshen hǎo duō le.",vn:"Sau khi ngủ một giấc ngon, tinh thần tốt hơn nhiều rồi."},{zh:"他今天看起来精神很好。",pin:"Tā jīntiān kànqilai jīngshen hěn hǎo.",vn:"Hôm nay trông anh ấy rất tươi tỉnh."}],synonyms:[{zh:"活力",pin:"huólì",hanviet:"HOẠT LỰC",vn:"sức sống, năng lượng"}],antonyms:[{zh:"疲惫",pin:"píbèi",hanviet:"PI BỐI",vn:"mệt mỏi, kiệt sức"}],related:[{zh:"有精神",pin:"yǒu jīngshen",hanviet:"HỮU TINH THẦN",vn:"có tinh thần, tươi tỉnh"},{zh:"精神好",pin:"jīngshen hǎo",hanviet:"TINH THẦN HẢO",vn:"tinh thần tốt"}]},
  {id:207,bai:10,hanzi:"爬",pinyin:"pá",hanviet:"BÁ",meaning:"leo, trèo, bò",components:[{char:"爬",pin:"pá",hanviet:"BÁ",explain:"爪(zhǎo,bộ Trảo-móng vuốt)+巴(bā,bám) → dùng vuốt bám leo = leo, trèo, bò"}],examples:[{zh:"每周末我都去爬山，对身体很有好处。",pin:"Měi zhōumò wǒ dōu qù pá shān, duì shēntǐ hěn yǒu hǎochù.",vn:"Mỗi cuối tuần tôi đều đi leo núi, rất có lợi cho sức khoẻ."},{zh:"小孩子会爬了以后，很快就会走路了。",pin:"Xiǎo háizi huì pá le yǐhòu, hěn kuài jiù huì zǒulù le.",vn:"Trẻ con biết bò rồi thì rất nhanh sẽ biết đi."}],synonyms:[],antonyms:[],related:[{zh:"爬山",pin:"pá shān",hanviet:"BÁ SƠN",vn:"leo núi"},{zh:"爬起来",pin:"pá qǐlái",hanviet:"BÁ KHỞI LAI",vn:"bò dậy, leo dậy"}]},

  {id:209,bai:10,hanzi:"初中",pinyin:"chūzhōng",hanviet:"SƠ TRUNG",meaning:"cấp 2 (trường THCS)",components:[{char:"初",pin:"chū",hanviet:"SƠ",explain:"刀(dāo,dao)+衣(yī,áo) → cắt vải may áo lần đầu = ban đầu, sơ"},{char:"中",pin:"zhōng",hanviet:"TRUNG",explain:"中(zhōng,tượng hình mũi tên xuyên tâm) → ở giữa, trung"}],examples:[{zh:"他初中的时候学习成绩很好。",pin:"Tā chūzhōng de shíhou xuéxí chéngjì hěn hǎo.",vn:"Hồi cấp 2 anh ấy học rất giỏi."},{zh:"初中有三年，高中也有三年。",pin:"Chūzhōng yǒu sān nián, gāozhōng yě yǒu sān nián.",vn:"Cấp 2 có 3 năm, cấp 3 cũng có 3 năm."}],synonyms:[],antonyms:[],related:[{zh:"小学",pin:"xiǎoxué",hanviet:"TIỂU HỌC",vn:"tiểu học"},{zh:"高中",pin:"gāozhōng",hanviet:"CAO TRUNG",vn:"cấp 3"},{zh:"大学",pin:"dàxué",hanviet:"ĐẠI HỌC",vn:"đại học"}]},
  {id:210,bai:10,hanzi:"高中",pinyin:"gāozhōng",hanviet:"CAO TRUNG",meaning:"cấp 3 (trường THPT)",components:[{char:"高",pin:"gāo",hanviet:"CAO",explain:"高(gāo,tượng hình tháp cao) → cao"},{char:"中",pin:"zhōng",hanviet:"TRUNG",explain:"中(zhōng,tượng hình mũi tên xuyên tâm) → ở giữa, trung"}],examples:[{zh:"我高中的时候非常喜欢学数学。",pin:"Wǒ gāozhōng de shíhou fēicháng xǐhuan xué shùxué.",vn:"Hồi cấp 3 tôi rất thích học Toán."},{zh:"高中毕业以后，他考上了重点大学。",pin:"Gāozhōng bìyè yǐhòu, tā kǎo shàng le zhòngdiǎn dàxué.",vn:"Sau khi tốt nghiệp cấp 3, anh ấy thi đỗ đại học trọng điểm."}],synonyms:[],antonyms:[{zh:"初中",pin:"chūzhōng",hanviet:"SƠ TRUNG",vn:"cấp 2"}],related:[{zh:"高中生",pin:"gāozhōngshēng",hanviet:"CAO TRUNG SINH",vn:"học sinh cấp 3"},{zh:"初中",pin:"chūzhōng",hanviet:"SƠ TRUNG",vn:"cấp 2"}]},
  {id:211,bai:10,hanzi:"出发",pinyin:"chūfā",hanviet:"XUẤT PHÁT",meaning:"xuất phát, khởi hành",components:[{char:"出",pin:"chū",hanviet:"XUẤT",explain:"出(chū,bộ Xuất) → đi ra ngoài = ra, xuất"},{char:"发",pin:"fā",hanviet:"PHÁT",explain:"癶(bō,bước chân)+弓(gōng,cung)+又(yòu,tay) → giương cung bắn = phát ra, xuất phát"}],examples:[{zh:"明天早上六点我们准时出发，不要迟到。",pin:"Míngtiān zǎoshang liù diǎn wǒmen zhǔnshí chūfā, bú yào chídào.",vn:"Sáng mai 6h chúng ta xuất phát đúng giờ, đừng đến trễ."},{zh:"出发之前，检查一下有没有带齐东西。",pin:"Chūfā zhīqián, jiǎnchá yīxià yǒu méiyǒu dài qí dōngxi.",vn:"Trước khi xuất phát, kiểm tra xem đã mang đầy đủ đồ chưa."}],synonyms:[{zh:"启程",pin:"qǐchéng",hanviet:"KHỞI TRÌNH",vn:"khởi hành, lên đường"}],antonyms:[{zh:"到达",pin:"dàodá",hanviet:"ĐÁO ĐẠT",vn:"đến nơi"}],related:[{zh:"准时出发",pin:"zhǔnshí chūfā",hanviet:"CHUẨN THỜI XUẤT PHÁT",vn:"xuất phát đúng giờ"},{zh:"出发前",pin:"chūfā qián",hanviet:"XUẤT PHÁT TIỀN",vn:"trước khi xuất phát"}]},
  {id:212,bai:10,hanzi:"前",pinyin:"qián",hanviet:"TIỀN",meaning:"trước; phía trước; trước khi",components:[{char:"前",pin:"qián",hanviet:"TIỀN",explain:"止(zhǐ,bộ Chỉ-dừng lại)+刀(dāo,dao) → bước về phía trước = trước, tiền"}],examples:[{zh:"睡觉前，我习惯喝一杯热牛奶。",pin:"Shuìjiào qián, wǒ xíguàn hē yī bēi rè niúnǎi.",vn:"Trước khi ngủ, tôi có thói quen uống một ly sữa nóng."},{zh:"这是十年前的照片，你认出我了吗？",pin:"Zhè shì shí nián qián de zhàopiàn, nǐ rèn chū wǒ le ma?",vn:"Đây là ảnh 10 năm trước, bạn nhận ra tôi không?"}],synonyms:[{zh:"以前",pin:"yǐqián",hanviet:"DĨ TIỀN",vn:"trước đây, hồi xưa"}],antonyms:[{zh:"后",pin:"hòu",hanviet:"HẬU",vn:"sau, phía sau"}],related:[{zh:"以前",pin:"yǐqián",hanviet:"DĨ TIỀN",vn:"trước đây"},{zh:"以后",pin:"yǐhòu",hanviet:"DĨ HẬU",vn:"sau này"},{zh:"V+前",pin:"V+qián",hanviet:"V+TIỀN",vn:"trước khi làm V"}]},
  {id:213,bai:10,hanzi:"更",pinyin:"gèng",hanviet:"CÁNH",meaning:"hơn, càng thêm",components:[{char:"更",pin:"gèng",hanviet:"CÁNH",explain:"更(gèng,tượng hình gậy gõ canh) → thêm nữa, càng = hơn, càng"}],examples:[{zh:"多锻炼会让你的身体更健康。",pin:"Duō duànliàn huì ràng nǐ de shēntǐ gèng jiànkāng.",vn:"Luyện tập nhiều hơn sẽ khiến sức khoẻ của bạn càng thêm khoẻ mạnh."},{zh:"今天比昨天更冷，你多穿点衣服吧。",pin:"Jīntiān bǐ zuótiān gèng lěng, nǐ duō chuān diǎn yīfu ba.",vn:"Hôm nay lạnh hơn hôm qua, bạn mặc thêm áo đi."}],synonyms:[{zh:"越来越",pin:"yuèláiyuè",hanviet:"VIỆT LAI VIỆT",vn:"ngày càng (xu hướng thay đổi)"}],antonyms:[],related:[{zh:"更加",pin:"gèngjiā",hanviet:"CÁNH GIA",vn:"càng thêm (nhấn mạnh)"},{zh:"越来越",pin:"yuèláiyuè",hanviet:"VIỆT LAI VIỆT",vn:"ngày càng..."}]},
  {id:214,bai:10,hanzi:"认出",pinyin:"rènchū",hanviet:"NHẬN XUẤT",meaning:"nhận ra (người/vật quen)",components:[{char:"认",pin:"rèn",hanviet:"NHẬN",explain:"讠(yán,bộ Ngôn-lời nói)+忍(rěn,nhẫn nại) → nhận biết = nhận ra"},{char:"出",pin:"chū",hanviet:"XUẤT",explain:"出(chū,bộ Xuất) → đi ra = nhận ra = phát hiện ra"}],examples:[{zh:"好多年没见了，我一下子没认出他来。",pin:"Hǎo duō nián méi jiàn le, wǒ yīxiàzi méi rèn chū tā lái.",vn:"Bao nhiêu năm không gặp, tôi không nhận ra anh ấy."},{zh:"她换了发型，我差点没认出她。",pin:"Tā huàn le fàxíng, wǒ chàdiǎn méi rèn chū tā.",vn:"Cô ấy đổi kiểu tóc, tôi suýt không nhận ra cô ấy."}],synonyms:[{zh:"认识",pin:"rènshi",hanviet:"NHẬN THỨC",vn:"nhận biết, quen biết"}],antonyms:[],related:[{zh:"认识",pin:"rènshi",hanviet:"NHẬN THỨC",vn:"quen biết, nhận biết"},{zh:"认不出",pin:"rèn bu chū",hanviet:"NHẬN BẤT XUẤT",vn:"không nhận ra"}]},
  {id:215,bai:10,hanzi:"集合",pinyin:"jíhé",hanviet:"TẬP HỢP",meaning:"tập hợp, tụ họp",components:[{char:"集",pin:"jí",hanviet:"TẬP",explain:"隹(zhuī,bộ Chuy-chim)+木(mù,cây) → nhiều chim đậu trên cây = tụ họp"},{char:"合",pin:"hé",hanviet:"HỢP",explain:"人(rén,người)+一(yī,một)+口(kǒu,miệng) → hội tụ = hợp, tập hợp"}],examples:[{zh:"大家在学校门口集合，然后一起出发。",pin:"Dàjiā zài xuéxiào ménkǒu jíhé, ránhòu yīqǐ chūfā.",vn:"Mọi người tập hợp ở cổng trường, sau đó cùng nhau xuất phát."},{zh:"十分钟后，我们在咖啡店集合。",pin:"Shí fēnzhōng hòu, wǒmen zài kāfēidiàn jíhé.",vn:"10 phút nữa, chúng ta tập hợp ở quán cà phê."}],synonyms:[{zh:"聚集",pin:"jùjí",hanviet:"TỤ TẬP",vn:"tụ tập, tập trung"}],antonyms:[],related:[{zh:"集合地点",pin:"jíhé dìdiǎn",hanviet:"TẬP HỢP ĐỊA ĐIỂM",vn:"địa điểm tập hợp"},{zh:"在...集合",pin:"zài...jíhé",hanviet:"TẠI...TẬP HỢP",vn:"tập hợp tại..."}]},
  {id:216,bai:10,hanzi:"办法",pinyin:"bànfǎ",hanviet:"BÁN PHÁP",meaning:"cách, biện pháp",components:[{char:"办",pin:"bàn",hanviet:"BÁN",explain:"力(lì,lực)+刀(dāo,dao) → dùng sức giải quyết = làm, bàn, xử lý"},{char:"法",pin:"fǎ",hanviet:"PHÁP",explain:"氵(shuǐ,bộ Thủy-nước)+去(qù,đi) → nước chảy theo đúng hướng = phép tắc, cách"}],examples:[{zh:"这个问题很难，我一时想不到好办法。",pin:"Zhège wèntí hěn nán, wǒ yīshí xiǎng bu dào hǎo bànfǎ.",vn:"Vấn đề này rất khó, nhất thời tôi không nghĩ ra cách nào tốt."},{zh:"只要用心，总会找到解决问题的办法。",pin:"Zhǐyào yòng xīn, zǒng huì zhǎodào jiějué wèntí de bànfǎ.",vn:"Chỉ cần dụng tâm, luôn sẽ tìm ra cách giải quyết vấn đề."}],synonyms:[{zh:"方法",pin:"fāngfǎ",hanviet:"PHƯƠNG PHÁP",vn:"phương pháp"},{zh:"方式",pin:"fāngshì",hanviet:"PHƯƠNG THỨC",vn:"phương thức, cách thức"}],antonyms:[],related:[{zh:"好办法",pin:"hǎo bànfǎ",hanviet:"HẢO BÁN PHÁP",vn:"cách hay"},{zh:"想办法",pin:"xiǎng bànfǎ",hanviet:"TƯỞNG BÁN PHÁP",vn:"nghĩ cách"}]},
  {id:217,bai:10,hanzi:"刻",pinyin:"kè",hanviet:"KHẮC",meaning:"khắc (1/4 giờ = 15 phút)",components:[{char:"刻",pin:"kè",hanviet:"KHẮC",explain:"亥(hài,can Chi)+刀(dāo,dao) → khắc bằng dao = khắc; đơn vị thời gian 15 phút"}],examples:[{zh:"差一刻八点，我们快点走吧。",pin:"Chā yī kè bā diǎn, wǒmen kuài diǎn zǒu ba.",vn:"8 giờ kém một khắc (7:45), chúng ta đi nhanh thôi."},{zh:"一刻钟就是十五分钟。",pin:"Yī kè zhōng jiùshì shíwǔ fēnzhōng.",vn:"Một khắc là 15 phút."}],synonyms:[],antonyms:[],related:[{zh:"一刻钟",pin:"yī kè zhōng",hanviet:"NHẤT KHẮC CHUNG",vn:"15 phút"},{zh:"差一刻",pin:"chā yī kè",hanviet:"SAI NHẤT KHẮC",vn:"kém một khắc (kém 15 phút)"}]},
  {id:218,bai:10,hanzi:"上车",pinyin:"shàngchē",hanviet:"THƯỢNG XA",meaning:"lên xe",components:[{char:"上",pin:"shàng",hanviet:"THƯỢNG",explain:"上(shàng,tượng hình điểm trên đường) → phía trên = lên"},{char:"车",pin:"chē",hanviet:"XA",explain:"车(chē,tượng hình bánh xe) → xe cộ"}],examples:[{zh:"大家都上车了，可以出发了。",pin:"Dàjiā dōu shàngchē le, kěyǐ chūfā le.",vn:"Mọi người đã lên xe hết rồi, có thể xuất phát được rồi."},{zh:"上车前先买票。",pin:"Shàngchē qián xiān mǎi piào.",vn:"Trước khi lên xe thì mua vé trước."}],synonyms:[],antonyms:[{zh:"下车",pin:"xiàchē",hanviet:"HẠ XA",vn:"xuống xe"}],related:[{zh:"下车",pin:"xiàchē",hanviet:"HẠ XA",vn:"xuống xe"},{zh:"开车",pin:"kāichē",hanviet:"KHAI XA",vn:"lái xe"}]},
  {id:219,bai:10,hanzi:"下车",pinyin:"xiàchē",hanviet:"HẠ XA",meaning:"xuống xe",components:[{char:"下",pin:"xià",hanviet:"HẠ",explain:"下(xià,tượng hình điểm dưới đường) → phía dưới = xuống"},{char:"车",pin:"chē",hanviet:"XA",explain:"车(chē,tượng hình bánh xe) → xe cộ"}],examples:[{zh:"下一站就下车，准备好行李。",pin:"Xià yī zhàn jiù xiàchē, zhǔnbèi hǎo xíngli.",vn:"Trạm tới thì xuống xe, chuẩn bị hành lý sẵn sàng."},{zh:"请在终点站下车。",pin:"Qǐng zài zhōngdiǎn zhàn xiàchē.",vn:"Xin vui lòng xuống xe ở trạm cuối."}],synonyms:[],antonyms:[{zh:"上车",pin:"shàngchē",hanviet:"THƯỢNG XA",vn:"lên xe"}],related:[{zh:"上车",pin:"shàngchē",hanviet:"THƯỢNG XA",vn:"lên xe"},{zh:"换车",pin:"huànchē",hanviet:"HOÁN XA",vn:"đổi xe, chuyển xe"}]},
  {id:220,bai:10,hanzi:"带",pinyin:"dài",hanviet:"ĐỚI",meaning:"mang, đem theo; dẫn, đưa",components:[{char:"带",pin:"dài",hanviet:"ĐỚI",explain:"带(dài,tượng hình dây đai) → dây đai = mang, đeo, dẫn"}],examples:[{zh:"出门别忘了带雨伞，今天会下雨。",pin:"Chū mén bié wàng le dài yǔsǎn, jīntiān huì xià yǔ.",vn:"Ra ngoài đừng quên mang ô, hôm nay sẽ mưa."},{zh:"妈妈带我去医院看病。",pin:"Māma dài wǒ qù yīyuàn kànbìng.",vn:"Mẹ dẫn tôi đến bệnh viện khám bệnh."}],synonyms:[{zh:"携带",pin:"xiédài",hanviet:"HỆ ĐỚI",vn:"mang theo (trang trọng)"}],antonyms:[],related:[{zh:"带路",pin:"dài lù",hanviet:"ĐỚI LỘ",vn:"dẫn đường"},{zh:"带来",pin:"dài lái",hanviet:"ĐỚI LAI",vn:"mang đến"},{zh:"带走",pin:"dài zǒu",hanviet:"ĐỚI TẨU",vn:"mang đi"}]},
  {id:221,bai:10,hanzi:"停车",pinyin:"tíngchē",hanviet:"ĐÌNH XA",meaning:"đỗ xe, dừng xe",components:[{char:"停",pin:"tíng",hanviet:"ĐÌNH",explain:"人(rén,người)+亭(tíng,lầu nghỉ) → người dừng ở lầu nghỉ = dừng lại"},{char:"车",pin:"chē",hanviet:"XA",explain:"车(chē,tượng hình bánh xe) → xe cộ"}],examples:[{zh:"这里不能停车，请往前开。",pin:"Zhèlǐ bù néng tíngchē, qǐng wǎng qián kāi.",vn:"Chỗ này không được đỗ xe, xin đi về phía trước."},{zh:"前面有停车场，把车停那里吧。",pin:"Qiánmiàn yǒu tíngchēchǎng, bǎ chē tíng nàlǐ ba.",vn:"Phía trước có bãi đậu xe, để xe ở đó nhé."}],synonyms:[],antonyms:[{zh:"开车",pin:"kāichē",hanviet:"KHAI XA",vn:"lái xe"}],related:[{zh:"停车场",pin:"tíngchēchǎng",hanviet:"ĐÌNH XA TRƯỜNG",vn:"bãi đậu xe"},{zh:"禁止停车",pin:"jìnzhǐ tíngchē",hanviet:"CẤM CHỈ ĐÌNH XA",vn:"cấm đậu xe"}]},
  {id:222,bai:10,hanzi:"允许",pinyin:"yǔnxǔ",hanviet:"DOÃN HỨA",meaning:"cho phép, được phép",components:[{char:"允",pin:"yǔn",hanviet:"DOÃN",explain:"厶(sī,tư)+儿(ér,người) → người chấp nhận = đồng ý, cho phép"},{char:"许",pin:"xǔ",hanviet:"HỨA",explain:"讠(yán,bộ Ngôn-lời)+午(wǔ,ngọ) → lời hứa = hứa, cho phép"}],examples:[{zh:"这里不允许吸烟，请到外面去。",pin:"Zhèlǐ bù yǔnxǔ xīyān, qǐng dào wàimiàn qù.",vn:"Nơi đây không được hút thuốc, xin ra ngoài."},{zh:"父母允许他一个人去旅行。",pin:"Fùmǔ yǔnxǔ tā yī gè rén qù lǚxíng.",vn:"Bố mẹ cho phép anh ấy một mình đi du lịch."}],synonyms:[{zh:"同意",pin:"tóngyì",hanviet:"ĐỒNG Ý",vn:"đồng ý, tán thành"}],antonyms:[{zh:"禁止",pin:"jìnzhǐ",hanviet:"CẤM CHỈ",vn:"cấm, không cho phép"}],related:[{zh:"不允许",pin:"bù yǔnxǔ",hanviet:"BẤT DOÃN HỨA",vn:"không được phép"},{zh:"允许+V",pin:"yǔnxǔ+V",hanviet:"DOÃN HỨA+V",vn:"cho phép làm V"}]},
  {id:223,bai:10,hanzi:"准时",pinyin:"zhǔnshí",hanviet:"CHUẨN THỜI",meaning:"đúng giờ, đúng hẹn",components:[{char:"准",pin:"zhǔn",hanviet:"CHUẨN",explain:"氵(shuǐ,nước)+隼(sǔn,chim ưng) → chuẩn xác = chính xác, chuẩn"},{char:"时",pin:"shí",hanviet:"THỜI",explain:"日(rì,mặt trời)+寺(sì,chùa) → mặt trời đi qua = thời gian, giờ"}],examples:[{zh:"他做事很准时，从来不迟到早退。",pin:"Tā zuòshì hěn zhǔnshí, cónglái bù chídào zǎotuì.",vn:"Anh ấy làm việc rất đúng giờ, chưa bao giờ đi trễ về sớm."},{zh:"请大家准时到场，不要让别人等。",pin:"Qǐng dàjiā zhǔnshí dào chǎng, bú yào ràng biérén děng.",vn:"Xin mọi người đến đúng giờ, đừng để người khác chờ."}],synonyms:[{zh:"守时",pin:"shǒushí",hanviet:"THỦ THỜI",vn:"giữ đúng giờ"}],antonyms:[{zh:"迟到",pin:"chídào",hanviet:"TRÌ ĐÁO",vn:"đến muộn, trễ giờ"}],related:[{zh:"迟到",pin:"chídào",hanviet:"TRÌ ĐÁO",vn:"đến trễ"},{zh:"按时",pin:"ànshí",hanviet:"PHÚC THỜI",vn:"đúng theo thời gian, đúng hạn"}]},
  {id:224,bai:11,hanzi:"叫",pinyin:"jiào",hanviet:"KHIẾU",meaning:"gọi; bảo/sai; khiến; cho phép",components:[{char:"叫",pin:"jiào",hanviet:"KHIẾU",explain:"口(kǒu,bộ Khẩu-miệng)+丩(jiū,xoắn) → miệng kêu to = gọi, kêu"}],examples:[{zh:"这个东西叫什么名字？",pin:"Zhège dōngxi jiào shénme míngzi?",vn:"Thứ này gọi là gì?"},{zh:"老师叫我们明天交作业。",pin:"Lǎoshī jiào wǒmen míngtiān jiāo zuòyè.",vn:"Thầy giáo bảo chúng tôi ngày mai nộp bài tập."}],synonyms:[{zh:"称",pin:"chēng",hanviet:"XƯNG",vn:"gọi, xưng (trang trọng)"}],antonyms:[],related:[{zh:"叫做",pin:"jiào zuò",hanviet:"KHIẾU TÁC",vn:"được gọi là"},{zh:"叫...做",pin:"jiào...zuò",hanviet:"KHIẾU...TÁC",vn:"bảo...làm"}]},
  {id:225,bai:11,hanzi:"让",pinyin:"ràng",hanviet:"NHƯỜNG",meaning:"để/cho phép; khiến; nhường nhịn",components:[{char:"让",pin:"ràng",hanviet:"NHƯỜNG",explain:"讠(yán,bộ Ngôn-lời)+襄(xiāng,giúp đỡ) → lời nhường nhịn = nhường, để cho"}],examples:[{zh:"妈妈让我每天练习中文。",pin:"Māma ràng wǒ měi tiān liànxí Zhōngwén.",vn:"Mẹ bảo tôi mỗi ngày luyện tập tiếng Trung."},{zh:"他的话让我很感动。",pin:"Tā de huà ràng wǒ hěn gǎndòng.",vn:"Lời nói của anh ấy khiến tôi rất xúc động."}],synonyms:[{zh:"叫",pin:"jiào",hanviet:"KHIẾU",vn:"bảo, khiến (tương tự)"}],antonyms:[],related:[{zh:"让+人+V",pin:"ràng+rén+V",hanviet:"NHƯỜNG+NHÂN+V",vn:"để/khiến ai đó làm gì"},{zh:"让步",pin:"ràngbù",hanviet:"NHƯỜNG BỘ",vn:"nhường bộ, nhượng bộ"}]},
  {id:226,bai:11,hanzi:"大家",pinyin:"dàjiā",hanviet:"ĐẠI GIA",meaning:"mọi người, tất cả mọi người",components:[{char:"大",pin:"dà",hanviet:"ĐẠI",explain:"大(dà,tượng hình người dang tay) → to lớn = đại, lớn"},{char:"家",pin:"jiā",hanviet:"GIA",explain:"宀(mián,mái nhà)+豕(shǐ,lợn) → nhà có lợn = gia đình, nhà; 大家 = mọi người"}],examples:[{zh:"大家都来了，我们可以开始了。",pin:"Dàjiā dōu lái le, wǒmen kěyǐ kāishǐ le.",vn:"Mọi người đều đến rồi, chúng ta có thể bắt đầu rồi."},{zh:"希望大家都能找到自己喜欢的工作。",pin:"Xīwàng dàjiā dōu néng zhǎodào zìjǐ xǐhuan de gōngzuò.",vn:"Hy vọng mọi người đều có thể tìm được công việc mình yêu thích."}],synonyms:[{zh:"所有人",pin:"suǒyǒu rén",hanviet:"SỞ HỮU NHÂN",vn:"tất cả mọi người"}],antonyms:[],related:[{zh:"大家都",pin:"dàjiā dōu",hanviet:"ĐẠI GIA ĐỀU",vn:"mọi người đều"},{zh:"大家好",pin:"dàjiā hǎo",hanviet:"ĐẠI GIA HẢO",vn:"xin chào mọi người"}]},
  {id:227,bai:11,hanzi:"老",pinyin:"lǎo",hanviet:"LÃO",meaning:"cũ (bạn bè); lâu năm; già",components:[{char:"老",pin:"lǎo",hanviet:"LÃO",explain:"老(lǎo,tượng hình ông già chống gậy) → già, lâu năm = cũ, lão"}],examples:[{zh:"他是我的老同学，我们认识二十年了。",pin:"Tā shì wǒ de lǎo tóngxué, wǒmen rènshi èrshí nián le.",vn:"Anh ấy là bạn học cũ của tôi, chúng tôi quen nhau đã 20 năm rồi."},{zh:"老朋友见面，有说不完的话。",pin:"Lǎo péngyou jiànmiàn, yǒu shuō bu wán de huà.",vn:"Bạn cũ gặp nhau, có nói mãi không hết chuyện."}],synonyms:[],antonyms:[{zh:"新",pin:"xīn",hanviet:"TÂN",vn:"mới"}],related:[{zh:"老朋友",pin:"lǎo péngyou",hanviet:"LÃO BẰNG HỮU",vn:"bạn cũ, bạn lâu năm"},{zh:"老同学",pin:"lǎo tóngxué",hanviet:"LÃO ĐỒNG HỌC",vn:"bạn học cũ"}]},
  {id:228,bai:11,hanzi:"谈",pinyin:"tán",hanviet:"ĐÀM",meaning:"nói chuyện, bàn bạc, tâm sự",components:[{char:"谈",pin:"tán",hanviet:"ĐÀM",explain:"讠(yán,bộ Ngôn-lời)+炎(yán,lửa bốc) → lời nói bốc lửa = nói hào hứng, bàn luận"}],examples:[{zh:"他们谈了很久，终于达成了协议。",pin:"Tāmen tán le hěn jiǔ, zhōngyú dáchéng le xiéyì.",vn:"Họ bàn bạc rất lâu, cuối cùng đã đạt được thỏa thuận."},{zh:"有时间的话，我想跟你谈谈我的想法。",pin:"Yǒu shíjiān de huà, wǒ xiǎng gēn nǐ tán tan wǒ de xiǎngfǎ.",vn:"Nếu có thời gian, tôi muốn tâm sự với bạn về suy nghĩ của tôi."}],synonyms:[{zh:"聊",pin:"liáo",hanviet:"LIÊU",vn:"tán gẫu, trò chuyện"},{zh:"讨论",pin:"tǎolùn",hanviet:"THẢO LUẬN",vn:"thảo luận"}],antonyms:[],related:[{zh:"谈话",pin:"tánhuà",hanviet:"ĐÀM THOẠI",vn:"nói chuyện, đàm thoại"},{zh:"谈谈",pin:"tán tan",hanviet:"ĐÀM ĐÀM",vn:"nói chuyện một chút, trao đổi"}]},
  {id:229,bai:11,hanzi:"自己",pinyin:"zìjǐ",hanviet:"TỰ KỶ",meaning:"bản thân, tự mình",components:[{char:"自",pin:"zì",hanviet:"TỰ",explain:"自(zì,tượng hình cái mũi) → tự mình = bản thân, tự"},{char:"己",pin:"jǐ",hanviet:"KỶ",explain:"己(jǐ,tượng hình sợi chỉ xoắn) → bản thân = mình, kỷ"}],examples:[{zh:"做错了就要自己承担后果。",pin:"Zuò cuò le jiù yào zìjǐ chéngdān hòuguǒ.",vn:"Làm sai thì phải tự mình chịu hậu quả."},{zh:"你要相信自己，不要总是依赖别人。",pin:"Nǐ yào xiāngxìn zìjǐ, bú yào zǒngshì yīlài biérén.",vn:"Bạn phải tin tưởng bản thân, đừng luôn luôn dựa vào người khác."}],synonyms:[{zh:"本人",pin:"běnrén",hanviet:"BẢN NHÂN",vn:"bản thân (trang trọng)"}],antonyms:[],related:[{zh:"自己+V",pin:"zìjǐ+V",hanviet:"TỰ KỶ+V",vn:"tự mình làm V"},{zh:"靠自己",pin:"kào zìjǐ",hanviet:"KÝ TỰ KỶ",vn:"dựa vào bản thân"}]},
  {id:230,bai:11,hanzi:"比较",pinyin:"bǐjiào",hanviet:"TỶ GIÁO",meaning:"so sánh; khá, tương đối",components:[{char:"比",pin:"bǐ",hanviet:"TỶ",explain:"比(bǐ,tượng hình hai người sát nhau) → đặt cạnh nhau so sánh = so sánh, hơn"},{char:"较",pin:"jiào",hanviet:"GIÁO",explain:"车(chē,xe)+交(jiāo,giao) → xe cộ giao nhau = so sánh, tương đối"}],examples:[{zh:"越南的气候比较热，不像北方那么冷。",pin:"Yuènán de qìhòu bǐjiào rè, bù xiàng běifāng nàme lěng.",vn:"Khí hậu Việt Nam khá nóng, không lạnh như miền Bắc."},{zh:"这两个方案，你觉得哪个比较好？",pin:"Zhè liǎng gè fāng'àn, nǐ juéde nǎ gè bǐjiào hǎo?",vn:"Hai phương án này, bạn thấy cái nào tốt hơn?"}],synonyms:[{zh:"相对",pin:"xiāngduì",hanviet:"TƯƠNG ĐỐI",vn:"tương đối, so với"}],antonyms:[],related:[{zh:"比较+ADJ",pin:"bǐjiào+ADJ",hanviet:"TỶ GIÁO+ADJ",vn:"khá/tương đối ADJ"},{zh:"和...比较",pin:"hé...bǐjiào",hanviet:"HOA...TỶ GIÁO",vn:"so sánh với..."}]},
  {id:231,bai:11,hanzi:"爱好",pinyin:"àihào",hanviet:"ÁI HẢO",meaning:"sở thích, niềm yêu thích",components:[{char:"爱",pin:"ài",hanviet:"ÁI",explain:"爫(zhǎo,móng)+冖(mì,bao phủ)+心(xīn,tim)+友(yǒu,bạn) → tình yêu thương = yêu, thích"},{char:"好",pin:"hào",hanviet:"HẢO",explain:"女(nǚ,phụ nữ)+子(zǐ,con) → tốt; yêu thích (đọc hào)"}],examples:[{zh:"我的爱好是打羽毛球和听音乐。",pin:"Wǒ de àihào shì dǎ yǔmáoqiú hé tīng yīnyuè.",vn:"Sở thích của tôi là chơi cầu lông và nghe nhạc."},{zh:"有了爱好，生活会变得更有意思。",pin:"Yǒu le àihào, shēnghuó huì biàn de gèng yǒu yìsi.",vn:"Có sở thích rồi, cuộc sống sẽ trở nên thú vị hơn."}],synonyms:[{zh:"兴趣",pin:"xìngqù",hanviet:"HỨNG THÚ",vn:"hứng thú, niềm yêu thích"}],antonyms:[],related:[{zh:"业余爱好",pin:"yèyú àihào",hanviet:"NGHIỆP DƯ ÁI HẢO",vn:"sở thích ngoài giờ"},{zh:"有爱好",pin:"yǒu àihào",hanviet:"HỮU ÁI HẢO",vn:"có sở thích"}]},
  {id:232,bai:11,hanzi:"京剧",pinyin:"jīngjù",hanviet:"KINH KỊCH",meaning:"kinh kịch (opera Bắc Kinh)",components:[{char:"京",pin:"jīng",hanviet:"KINH",explain:"京(jīng,tượng hình tòa nhà lớn trên gò) → kinh đô, Bắc Kinh"},{char:"剧",pin:"jù",hanviet:"KỊCH",explain:"豕(shǐ,lợn)+虎(hǔ,hổ)+刀(dāo,dao) → cuộc đấu kịch tính = kịch, vở diễn"}],examples:[{zh:"京剧是中国最有代表性的传统艺术之一。",pin:"Jīngjù shì Zhōngguó zuì yǒu dàibiǎoxìng de chuántǒng yìshù zhīyī.",vn:"Kinh kịch là một trong những loại hình nghệ thuật truyền thống tiêu biểu nhất của Trung Quốc."},{zh:"爷爷非常喜欢看京剧，每天都看。",pin:"Yéye fēicháng xǐhuan kàn jīngjù, měi tiān dōu kàn.",vn:"Ông nội rất thích xem kinh kịch, ngày nào cũng xem."}],synonyms:[],antonyms:[],related:[{zh:"看京剧",pin:"kàn jīngjù",hanviet:"KHÁN KINH KỊCH",vn:"xem kinh kịch"},{zh:"戏剧",pin:"xìjù",hanviet:"HÝ KỊCH",vn:"kịch, sân khấu"}]},
  {id:233,bai:11,hanzi:"唯一",pinyin:"wéiyī",hanviet:"DUY NHẤT",meaning:"duy nhất, chỉ có một",components:[{char:"唯",pin:"wéi",hanviet:"DUY",explain:"口(kǒu,miệng)+隹(zhuī,chim) → chỉ có tiếng chim = chỉ, duy"},{char:"一",pin:"yī",hanviet:"NHẤT",explain:"一(yī,tượng hình một vạch) → một, duy nhất"}],examples:[{zh:"这是唯一的解决办法，没有其他选择。",pin:"Zhè shì wéiyī de jiějué bànfǎ, méiyǒu qítā xuǎnzé.",vn:"Đây là cách giải quyết duy nhất, không có lựa chọn nào khác."},{zh:"他是家里唯一的儿子，父母很宠他。",pin:"Tā shì jiālǐ wéiyī de érzi, fùmǔ hěn chǒng tā.",vn:"Anh ấy là con trai duy nhất trong nhà, bố mẹ rất cưng chiều."}],synonyms:[{zh:"仅仅",pin:"jǐnjǐn",hanviet:"CẬN CẬN",vn:"chỉ, chỉ có (nhấn mạnh)"}],antonyms:[],related:[{zh:"唯一的",pin:"wéiyī de",hanviet:"DUY NHẤT ĐỚI",vn:"duy nhất (tính từ)"},{zh:"独一无二",pin:"dú yī wú èr",hanviet:"ĐỘC NHẤT VÔ NHỊ",vn:"độc nhất vô nhị"}]},

  {id:244,bai:12,hanzi:"业余",pinyin:"yèyú",hanviet:"NGHIỆP DƯ",meaning:"ngoài giờ; lúc rảnh rỗi; nghiệp dư (không chuyên)",components:[{char:"业",pin:"yè",hanviet:"NGHIỆP",explain:"业(yè,bộ Nhất) - nghề nghiệp, công việc"},{char:"余",pin:"yú",hanviet:"DƯ",explain:"人(rén,bộ Nhân-người)+余(yú,DƯ-dư thừa) - dư ra, thừa ra"}],examples:[{zh:"业余时间我只喜欢躺在床上看电影。",pin:"Yèyú shíjiān wǒ zhǐ xǐhuān tǎng zài chuáng shàng kàn diànyǐng.",vn:"Thời gian rảnh tôi chỉ thích nằm trên giường xem phim."},{zh:"现在有很多业余的画家，他们的作品没有什么特色。",pin:"Xiànzài yǒu hěn duō yèyú de huàjiā, tāmen de zuòpǐn méiyǒu shénme tèsè.",vn:"Hiện nay có rất nhiều họa sĩ nghiệp dư, tác phẩm của họ không có gì đặc sắc."}],synonyms:[],antonyms:[{zh:"专业",pin:"zhuānyè",hanviet:"CHUYÊN NGHIỆP",vn:"chuyên nghiệp, chuyên ngành"}],related:[{zh:"业余时间",pin:"yèyú shíjiān",hanviet:"NGHIỆP DƯ THỜI GIAN",vn:"thời gian rảnh rỗi"},{zh:"业余爱好",pin:"yèyú àihào",hanviet:"NGHIỆP DƯ ÁI HẢO",vn:"sở thích lúc rảnh"},{zh:"业余生活",pin:"yèyú shēnghuó",hanviet:"NGHIỆP DƯ SINH HOẠT",vn:"cuộc sống ngoài giờ"}]},

  {id:249,bai:12,hanzi:"感兴趣",pinyin:"gǎn xìngqù",hanviet:"CẢM HỨNG THÚ",meaning:"có hứng thú; cảm thấy thú vị",components:[{char:"感",pin:"gǎn",hanviet:"CẢM",explain:"咸(xián,HÀM-mặn)+心(xīn,bộ Tâm) - cảm xúc, rung cảm"},{char:"兴",pin:"xìng",hanviet:"HỨNG",explain:"兴(xīng/xìng,HỨNG/HƯNG) - hứng khởi, phấn chấn"},{char:"趣",pin:"qù",hanviet:"THÚ",explain:"走(zǒu,bộ Tẩu-đi)+取(qǔ,THỦ-lấy) - thú vị, hứng thú"}],examples:[{zh:"如果你对学习中文感兴趣，就要多听、多说，别怕错误。",pin:"Rúguǒ nǐ duì xuéxí Zhōngwén gǎn xìngqù, jiù yào duō tīng, duō shuō, bié pà cuòwù.",vn:"Nếu bạn có hứng thú với việc học tiếng Trung, hãy nghe nhiều, nói nhiều, đừng sợ sai."},{zh:"我对这样的作品一点兴趣也没有。",pin:"Wǒ duì zhèyàng de zuòpǐn yìdiǎn xìngqù yě méiyǒu.",vn:"Tôi không có một chút hứng thú nào với những tác phẩm như vậy."}],synonyms:[{zh:"有兴趣",pin:"yǒu xìngqù",hanviet:"HỮU HỨNG THÚ",vn:"có hứng thú"}],antonyms:[{zh:"不感兴趣",pin:"bù gǎn xìngqù",hanviet:"BẤT CẢM HỨNG THÚ",vn:"không có hứng thú"},{zh:"没有兴趣",pin:"méiyǒu xìngqù",hanviet:"MỘT HỮU HỨNG THÚ",vn:"không có hứng thú"}],related:[{zh:"兴趣",pin:"xìngqù",hanviet:"HỨNG THÚ",vn:"hứng thú (danh từ)"},{zh:"爱好",pin:"àihào",hanviet:"ÁI HẢO",vn:"sở thích"},{zh:"对…感兴趣",pin:"duì…gǎnxìngqù",hanviet:"ĐỐI…CẢM HỨNG THÚ",vn:"có hứng thú với…"}]},

   related_patterns:[{title:"由于…因此…",pin:"yóuyú…yīncǐ…",hanviet:"DO YU…NHÂN THỬ…",desc:"Phiên bản trang trọng (văn viết)",ex:{zh:"由于天气不好，因此取消了活动。",pin:"Yóuyú tiānqì bù hǎo, yīncǐ qǔxiāo le huódòng.",vn:"Vì thời tiết không tốt, nên đã hủy hoạt động."}},{title:"既然…就…",pin:"jìrán…jiù…",hanviet:"KÝ NHIÊN…TẮC…",desc:"Đã vậy thì… (điều đã rõ ràng)",ex:{zh:"既然你不想去，就别去了。",pin:"Jìrán nǐ bù xiǎng qù, jiù bié qù le.",vn:"Đã không muốn đi thì thôi."}}]},
  {tag:"b1",title:"有时候……有时候",pattern:"有时候+A，有时候+B",
   desc:"Đôi khi A, đôi khi B. Diễn đạt hai việc xen kẽ nhau.",
   examples:[{zh:"有时候我做家务，有时候我自己学习。",pin:"Yǒushíhou wǒ zuò jiāwù, yǒushíhou wǒ zìjǐ xuéxí.",vn:"Đôi khi tôi làm việc nhà, đôi khi tôi tự học."},{zh:"有时候喜欢热闹，有时候喜欢安静。",pin:"Yǒushíhou xǐhuān rènào, yǒushíhou xǐhuān ānjìng.",vn:"Đôi khi thích náo nhiệt, đôi khi thích yên tĩnh."}],
   common_error:"✅ Có thể dùng một mình: 我有时候去书店(Wǒ yǒushíhou qù shūdiàn)。(Tôi đôi khi đi hiệu sách.)<br>✅ Cặp đôi 有时候…有时候(yǒushíhou…yǒushíhou)… nhấn mạnh sự xen kẽ đối lập.",
   related_patterns:[{title:"偶尔",pin:"ǒu'ěr",hanviet:"NGẪu NHĨ",desc:"Thỉnh thoảng (ít hơn 有时候(yǒushíhou))",ex:{zh:"我偶尔喝咖啡。",pin:"Wǒ ǒu'ěr hē kāfēi.",vn:"Tôi thỉnh thoảng uống cà phê."}},{title:"总是",pin:"zǒngshì",hanviet:"TỔNG THỊ",desc:"Luôn luôn (đối lập với 有时候(yǒushíhou))",ex:{zh:"他总是迟到。",pin:"Tā zǒngshì chídào.",vn:"Anh ấy luôn đến muộn."}}]},
  {tag:"b3",title:"V + 出来",pattern:"动词+出来",
   desc:"...ra. Hành động đi ra ngoài hoặc xuất hiện.\n• 想出来(xiǎng chūlái) — nghĩ ra\n• 做出来(zuò chūlái) — làm ra",
   examples:[{zh:"他想出来很多好的办法。",pin:"Tā xiǎng chūlái hěn duō hǎo de bànfǎ.",vn:"Anh ấy nghĩ ra rất nhiều cách hay."},{zh:"这件事是他做出来的。",pin:"Zhè jiàn shì shì tā zuò chūlái de.",vn:"Việc này là anh ấy làm ra."}],
   common_error:"❌ Phân biệt 出来(chūlái) (kết quả hiện ra) vs. 出去(chūqù) (di chuyển ra ngoài):<br>想出来(xiǎng chūlái) ≠ 走出去(zǒu chūqù). 出来(chūlái) chỉ hướng từ trong ra, hoặc kết quả xuất hiện.",
   related_patterns:[{title:"V+起来",pin:"V+qǐlái",hanviet:"V+KHỞI LAI",desc:"Bắt đầu và tiếp tục",ex:{zh:"他突然笑起来了。",pin:"Tā tūrán xiào qǐlái le.",vn:"Anh ấy bỗng nhiên bật cười."}},{title:"V+进去",pin:"V+jìnqù",hanviet:"V+TẤN KHỨ",desc:"Đưa vào bên trong",ex:{zh:"把书放进去。",pin:"Bǎ shū fàng jìnqù.",vn:"Đặt sách vào bên trong."}}]},
  {tag:"b2",title:"应该多 + V",pattern:"应该+多+动词",
   desc:"Nên làm thêm cái gì đó.\n• 多(duō) + V = làm thêm\n• V + 多(duō) = làm quá nhiều (nghĩa khác!)",
   examples:[{zh:"你应该多练习口语，这样才能跟中国人交流。",pin:"Nǐ yīnggāi duō liànxí kǒuyǔ, zhèyàng cái néng gēn Zhōngguórén jiāoliú.",vn:"Bạn nên luyện tập khẩu ngữ thêm."},{zh:"你应该多复习生词，这样才不会忘记。",pin:"Nǐ yīnggāi duō fùxí shēngcí, zhèyàng cái bù huì wàngjì.",vn:"Bạn nên ôn từ mới thêm, như vậy mới không quên."}],
   common_error:"❌ Nhầm vị trí 多(duō):<br>多吃水果(duō chī shuǐguǒ) (nên ăn thêm trái cây ✅) ≠ 吃多了水果(chī duō le shuǐguǒ) (ăn quá nhiều trái cây ✅ nhưng khác nghĩa).<br>多(duō)+V = khuyến khích; V+多(duō) = làm thái quá.",
   related_patterns:[{title:"应该少+V",pin:"yīnggāi shǎo+V",hanviet:"ỨNG CÁI THIỂU+V",desc:"Nên làm ít lại",ex:{zh:"你应该少吃糖。",pin:"Nǐ yīnggāi shǎo chī táng.",vn:"Bạn nên ăn ít đường lại."}},{title:"多…一点儿",pin:"duō…yīdiǎnr",hanviet:"ĐA…NHẤT ĐIỂM NHI",desc:"Làm nhiều hơn một chút",ex:{zh:"多说一点儿。",pin:"Duō shuō yīdiǎnr.",vn:"Nói thêm một chút."}}]},
  {tag:"b4",title:"S + 对 + O + 好/不好",pattern:"S+对+O+好",
   desc:"Tốt/không tốt đối với ai/cái gì.",
   examples:[{zh:"参加体育活动对身体很好。",pin:"Cānjiā tǐyù huódòng duì shēntǐ hěn hǎo.",vn:"Tham gia hoạt động thể dục rất tốt cho sức khỏe."},{zh:"抽烟对身体不好。",pin:"Chōuyān duì shēntǐ bù hǎo.",vn:"Hút thuốc không tốt cho sức khỏe."}],
   common_error:"❌ Phân biệt 对(duì) và 对于(duìyú):<br>对我好(duì wǒ hǎo) (tốt với tôi — quan hệ cảm xúc) vs. 对于这个问题(duìyú zhège wèntí) (về vấn đề này — trừu tượng).<br>对(duì) dùng rộng hơn; 对于(duìyú) thường đứng đầu câu.",
   related_patterns:[{title:"对…有好处/坏处",pin:"duì…yǒu hǎochù/huàichù",hanviet:"ĐỐI…HỮU HẢO XỨ/HOẠI XỨ",desc:"Có lợi/hại cho",ex:{zh:"运动对身体有好处。",pin:"Yùndòng duì shēntǐ yǒu hǎochù.",vn:"Vận động có lợi cho sức khỏe."}},{title:"对…感兴趣",pin:"duì…gǎn xìngqù",hanviet:"ĐỐI…CẢM HỨNG THÚ",desc:"Hứng thú với",ex:{zh:"他对汉语很感兴趣。",pin:"Tā duì Hànyǔ hěn gǎn xìngqù.",vn:"Anh ấy rất hứng thú với tiếng Trung."}}]},
  {tag:"b5",title:"越来越 + ADJ",pattern:"越来越+形容词",
   desc:"Càng ngày càng + tính từ. Diễn đạt sự thay đổi theo chiều hướng tăng dần.",
   examples:[{zh:"现在越来越多的青年人有自己的事业。",pin:"Xiànzài yuè lái yuè duō de qīngnián rén yǒu zìjǐ de shìyè.",vn:"Bây giờ càng ngày càng nhiều người trẻ có sự nghiệp."},{zh:"他的汉语越来越好了。",pin:"Tā de Hànyǔ yuè lái yuè hǎo le.",vn:"Tiếng Trung của anh ấy càng ngày càng tốt."}],
   common_error:"❌ Không dùng với số lượng cụ thể: 越来越三个人(yuèláiyuè sān gè rén) (sai).<br>❌ Không kết hợp với so sánh nhất: 越来越最好(yuèláiyuè zuì hǎo) (sai).<br>✅ Dùng với tính từ/trạng từ: 越来越好/多/少/快(yuèláiyuè hǎo/duō/shǎo/kuài)",
   related_patterns:[{title:"越…越…",pin:"yuè…yuè…",hanviet:"VIỆT…VIỆT…",desc:"Càng…càng… (liên kết 2 vế)",ex:{zh:"越学越有趣。",pin:"Yuè xué yuè yǒuqù.",vn:"Càng học càng thú vị."}},{title:"愈来愈",pin:"yùláiyù",hanviet:"DU LAI DU",desc:"Phiên bản văn viết/formal của 越来越(yuèláiyuè), nghĩa hoàn toàn giống."}]},
  {tag:"b5",title:"从来没 + V + 过",pattern:"从来没+动词+过",
   desc:"Chưa từng làm gì. Nhấn mạnh chưa bao giờ có kinh nghiệm đó.",
   examples:[{zh:"我从来没坐过飞机。",pin:"Wǒ cónglái méi zuòguò fēijī.",vn:"Tôi chưa từng ngồi máy bay."},{zh:"他从来没去过中国。",pin:"Tā cónglái méi qùguò Zhōngguó.",vn:"Anh ấy chưa từng đến Trung Quốc."}],
   common_error:"❌ Phân biệt 从来不(cónglái bù) vs. 从来没+过(cónglái méi+guò):<br>从来不(cónglái bù)+V = không bao giờ làm (thói quen): 我从来不喝酒(Wǒ cónglái bù hē jiǔ)。<br>从来没+V+过(cónglái méi+guò) = chưa từng trải nghiệm: 我从来没喝过酒(Wǒ cónglái méi hē guò jiǔ)。",
   related_patterns:[{title:"已经…了",pin:"yǐjīng…le",hanviet:"DĨ KINH…",desc:"Đã làm rồi (xác nhận kinh nghiệm)",ex:{zh:"我已经去过了。",pin:"Wǒ yǐjīng qùguò le.",vn:"Tôi đã đến rồi."}},{title:"还没…过",pin:"hái méi…guò",hanviet:"HOÀN MỘT…QUÁ",desc:"Vẫn chưa từng",ex:{zh:"我还没去过北京。",pin:"Wǒ hái méi qùguò Běijīng.",vn:"Tôi vẫn chưa đến Bắc Kinh lần nào."}}]},
  {tag:"b4",title:"V + 完 / V + 成",pattern:"动词+完/成",
   desc:"• V + 完(wán) → làm xong (hoàn thành, không còn gì)\n• V + 成(chéng) → biến thành, dịch thành (kết quả thay đổi dạng)",
   examples:[{zh:"这个礼物你包裹完了吗？",pin:"Zhège lǐwù nǐ bāoguǒ wán le ma?",vn:"Bạn gói xong món quà này chưa?"},{zh:"这本小说已经翻译成越南语了。",pin:"Zhè běn xiǎoshuō yǐjīng fānyì chéng Yuènányǔ le.",vn:"Cuốn tiểu thuyết này đã dịch thành tiếng Việt rồi."}],
   common_error:"❌ Nhầm 完(wán) với 成(chéng):<br>写完作业(xiě wán zuòyè) (viết xong bài — hoàn thành) vs. 翻译成越南语(fānyì chéng Yuènányǔ) (dịch thành tiếng Việt — thay đổi kết quả).<br>完(wán) = hết/xong; 成(chéng) = thành/trở thành.",
   related_patterns:[{title:"V+好",pin:"V+hǎo",hanviet:"V+HẢO",desc:"Làm xong cẩn thận/đúng ý",ex:{zh:"准备好了吗？",pin:"Zhǔnbèi hǎo le ma?",vn:"Chuẩn bị tốt chưa?"}},{title:"V+到",pin:"V+dào",hanviet:"V+ĐÁO",desc:"Làm đến một điểm",ex:{zh:"学到第十课了。",pin:"Xué dào dì shí kè le.",vn:"Học đến bài 10 rồi."}}]},
  {tag:"b4",title:"如果……就/吧",pattern:"如果+条件，就+结果",
   desc:"Nếu... thì... Diễn đạt điều kiện.",
   examples:[{zh:"如果今天你去图书馆，顺便替我还书吧。",pin:"Rúguǒ jīntiān nǐ qù túshūguǎn, shùnbiàn tì wǒ huán shū ba.",vn:"Nếu hôm nay bạn đi thư viện, tiện thể trả sách cho tôi nhé."},{zh:"如果你不去，我自己去。",pin:"Rúguǒ nǐ bù qù, wǒ zìjǐ qù.",vn:"Nếu bạn không đi, tôi tự đi."}],
   common_error:"✅ 就(jiù) trong mệnh đề kết quả thường có nhưng không bắt buộc.<br>✅ 吧(ba) cuối câu dùng khi đưa ra gợi ý nhẹ nhàng.<br>❌ Không nhầm với 既然…就(jìrán…jiù) (đã vậy thì — điều đã xảy ra): 既然你来了，就坐吧(Jìrán nǐ lái le, jiù zuò ba)。",
   related_patterns:[{title:"要是…的话",pin:"yàoshi…dehuà",hanviet:"YÊU THỊ…ĐỀ HỘA",desc:"Phiên bản khẩu ngữ của 如果(rúguǒ)",ex:{zh:"要是你去的话，告诉我。",pin:"Yàoshi nǐ qù dehuà, gàosu wǒ.",vn:"Nếu bạn đi thì nói tôi biết."}},{title:"只要…就…",pin:"zhǐyào…jiù…",hanviet:"CHỈ YẾU…TẮC…",desc:"Chỉ cần…là…",ex:{zh:"只要努力，就会成功。",pin:"Zhǐyào nǔlì, jiù huì chénggōng.",vn:"Chỉ cần cố gắng là sẽ thành công."}}]},

  {tag:"b1",title:"跟……一起 + V",pattern:"A+跟+B+一起+动词",
   desc:"A cùng B cùng nhau làm gì. Dùng 跟(gēn) để chỉ đối tượng đi cùng, 一起(yīqǐ) nhấn mạnh 'cùng nhau'.",
   examples:[{zh:"我跟他一起去中国旅游。",pin:"Wǒ gēn tā yīqǐ qù Zhōngguó lǚyóu.",vn:"Tôi cùng anh ấy đi du lịch Trung Quốc."},{zh:"明天咱们一起去玩儿吧。",pin:"Míngtiān zánmen yīqǐ qù wánr ba.",vn:"Ngày mai chúng mình cùng đi chơi nhé."}],

   related_patterns:[{title:"和……一起",pin:"hé……yīqǐ",hanviet:"HÒA……NHẤT KHỞI",desc:"Phiên bản văn viết của 跟(gēn)",ex:{zh:"我和朋友一起学习。",pin:"Wǒ hé péngyou yīqǐ xuéxí.",vn:"Tôi cùng bạn bè học bài."}},{title:"一起 + V + 吧",pin:"yīqǐ+V+ba",hanviet:"NHẤT KHỞI+V",desc:"Rủ rê, lời mời",ex:{zh:"一起去吧！",pin:"Yīqǐ qù ba!",vn:"Cùng đi thôi!"}}]},

   related_patterns:[{title:"以前/以后",pin:"yǐqián/yǐhòu",hanviet:"DĨ TIỀN/DĨ HẬU",desc:"Trước/Sau khi (không dùng 的时候(de shíhou))",ex:{zh:"上课以前，好好预习。",pin:"Shàngkè yǐqián, hǎohǎo yùxí.",vn:"Trước khi lên lớp, hãy chuẩn bị bài kỹ."}},{title:"…时",pin:"…shí",hanviet:"…THỜI",desc:"Văn viết ngắn gọn hơn 的时候(de shíhou)",ex:{zh:"他回家时，我在学习。",pin:"Tā huí jiā shí, wǒ zài xuéxí.",vn:"Khi anh ấy về nhà, tôi đang học."}}]},
  {tag:"b2",title:"V + 过",pattern:"动词+过（经验）",

   examples:[{zh:"你读过这篇课文的内容了吗？",pin:"Nǐ dúguo zhè piān kèwén de nèiróng le ma?",vn:"Bạn đã đọc qua nội dung bài đọc này chưa?"},{zh:"我从来没坐过飞机。",pin:"Wǒ cónglái méi zuòguò fēijī.",vn:"Tôi chưa từng ngồi máy bay."}],
   common_error:"❌ Phân biệt V+了(le) (hoàn thành lần này) vs V+过(guò) (kinh nghiệm đã từng):<br>我吃了(Wǒ chī le)。(Tôi ăn rồi — lần này) vs 我吃过了(Wǒ chī guò le)。(Tôi đã từng ăn qua).<br>V+过(guò) thường dùng với 没有(méiyǒu) để phủ định: 我没去过(Wǒ méi qùguò)。",
   related_patterns:[{title:"还没+V+过",pin:"hái méi+V+guò",hanviet:"HOÀN MỘT+V+QUÁ",desc:"Vẫn chưa từng",ex:{zh:"我还没去过北京。",pin:"Wǒ hái méi qùguò Běijīng.",vn:"Tôi vẫn chưa đến Bắc Kinh lần nào."}},{title:"已经+V+过+了",pin:"yǐjīng+V+guò+le",hanviet:"DĨ KINH+V+QUÁ",desc:"Đã từng rồi (xác nhận)",ex:{zh:"我已经去过了。",pin:"Wǒ yǐjīng qùguò le.",vn:"Tôi đã từng đến rồi."}}]},
